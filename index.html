<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube Digest — Tork Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F3F0;
    --sidebar: #0F1923;
    --card: #FFFFFF;
    --text: #1A1A1A;
    --muted: #888;
    --border: #E8E6E1;
    --accent-5: #D4740E;
    --accent-4: #B85A0B;
    --accent-3: #2D8A56;
    --accent-2: #7A8A99;
    --accent-1: #AAA;
    --pinned: #5E35B1;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; display:flex; min-height:100vh; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width:220px; background:var(--sidebar); padding:28px 0; position:fixed; top:0; left:0; height:100vh;
    display:flex; flex-direction:column; z-index:10; transition: transform 0.3s;
  }
  .sidebar-brand { padding:0 20px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .sidebar-brand h1 { font-family:'Instrument Serif',serif; font-size:20px; color:#F0F4F8; font-weight:400; }
  .sidebar-brand p { font-size:9px; color:#5A7A9B; text-transform:uppercase; letter-spacing:2px; margin-top:4px; }

  .sidebar-section { padding:16px 20px 8px; }
  .sidebar-section-title { font-size:9px; color:#4A6A82; text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:8px; }

  .sidebar-link {
    display:block; padding:8px 20px; font-size:13px; color:#7A96AD; text-decoration:none;
    transition: all 0.15s; cursor:pointer; border-left:2px solid transparent;
  }
  .sidebar-link:hover { color:#E8EDF2; background:rgba(255,255,255,0.04); }
  .sidebar-link.active { color:#F0F4F8; border-left-color:var(--accent-5); background:rgba(255,255,255,0.06); font-weight:600; }
  .sidebar-link .count { font-size:10px; color:#4A6A82; font-family:'JetBrains Mono',monospace; float:right; }
  .sidebar-link.active .count { color:var(--accent-5); }

  .company-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:6px; }

  /* ===== MAIN ===== */
  .main { margin-left:220px; flex:1; padding:32px 40px 60px; max-width:840px; }

  .page-header { margin-bottom:24px; padding-bottom:20px; border-bottom:2px solid var(--border); }
  .page-header h2 { font-family:'Instrument Serif',serif; font-size:28px; font-weight:400; color:var(--text); }
  .page-header .meta { font-size:13px; color:var(--muted); margin-top:6px; }

  .date-picker { margin-bottom:20px; }
  .date-picker select {
    font-family:'DM Sans',sans-serif; font-size:13px; padding:8px 12px; border:1px solid var(--border);
    border-radius:6px; background:white; color:var(--text); cursor:pointer; min-width:200px;
  }

  /* ===== CARDS ===== */
  .card {
    background:var(--card); border-radius:10px; padding:24px; margin-bottom:16px;
    border:1px solid var(--border); transition:box-shadow 0.2s;
  }
  .card:hover { box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .card.pinned-card { border-left:3px solid var(--pinned); }
  .card.score-5 { border-left:3px solid var(--accent-5); }
  .card.score-4 { border-left:3px solid var(--accent-4); }
  .card.score-3 { border-left:3px solid var(--accent-3); }
  .card.score-2 { opacity:0.75; }
  .card.score-1 { opacity:0.6; }

  .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .channel-info { display:flex; align-items:center; gap:8px; }
  .avatar { width:24px; height:24px; border-radius:50%; }
  .avatar-letter {
    display:inline-flex; width:24px; height:24px; border-radius:50%; background:#EBEBEB;
    align-items:center; justify-content:center; font-size:10px; color:#999;
  }
  .channel-name { font-size:12px; color:var(--muted); }

  .badge {
    padding:4px 10px; border-radius:4px; font-size:10px; font-weight:700;
    letter-spacing:0.8px; font-family:'JetBrains Mono',monospace;
  }
  .badge-pinned { background:#EDE7F6; color:var(--pinned); }
  .badge-5 { background:#FFF5EB; color:var(--accent-5); }
  .badge-4 { background:#FFF8F0; color:var(--accent-4); }
  .badge-3 { background:#EEFBF3; color:var(--accent-3); }
  .badge-2 { background:#F3F5F7; color:var(--accent-2); }
  .badge-1 { background:#F5F5F5; color:var(--accent-1); }

  .tags { margin-bottom:12px; line-height:2; }
  .tag {
    display:inline-block; padding:3px 10px; border-radius:4px; font-size:10px;
    margin:0 4px 4px 0; background:#F0F0F0; color:#777;
  }
  .tag.core { font-weight:700; }
  .tag.core.s5 { background:#FFF5EB; color:var(--accent-5); }
  .tag.core.s4 { background:#FFF8F0; color:var(--accent-4); }
  .tag.core.s3 { background:#EEFBF3; color:var(--accent-3); }
  .tag.pinned-t { background:#EDE7F6; color:var(--pinned); font-weight:600; }
  .tag.dur { background:#F5F5F5; color:#777; }

  .card-title {
    display:block; font-family:'Instrument Serif',serif; font-size:19px; color:var(--text);
    text-decoration:none; line-height:1.35; margin-bottom:8px;
  }
  .card-title:hover { color:var(--accent-5); }

  .visao { font-size:14px; color:#555; line-height:1.65; font-style:italic; margin-bottom:14px; }

  .pontos { list-style:none; padding:0; margin:0 0 12px; }
  .pontos li {
    padding:5px 0 5px 18px; font-size:13px; line-height:1.55; color:#555; position:relative;
  }
  .pontos li::before {
    content:"\25C6"; position:absolute; left:0; font-size:8px; top:8px; color:var(--accent-5);
  }
  .card.score-3 .pontos li::before { color:var(--accent-3); }
  .card.score-4 .pontos li::before { color:var(--accent-4); }
  .card.score-2 .pontos li::before { color:var(--accent-2); }
  .card.score-1 .pontos li::before { color:var(--accent-1); }
  .card.pinned-card .pontos li::before { color:var(--pinned); }

  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .motivo { font-size:11px; color:#AAA; }
  .transcript-btn {
    font-size:11px; color:var(--accent-5); text-decoration:none; font-weight:600;
    padding:4px 10px; border:1px solid var(--accent-5); border-radius:4px; transition:all 0.15s;
  }
  .transcript-btn:hover { background:var(--accent-5); color:white; }

  /* Daily Brief sections */
  .section-label { font-size:10px; color:var(--pinned); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin:16px 0 8px; }
  .manchete { font-size:14px; font-weight:700; color:var(--text); margin:14px 0 6px; }
  .manchete::before { content:"\2192 "; color:var(--pinned); }
  .sub-bullets { list-style:disc; padding-left:20px; margin:4px 0 12px; }
  .sub-bullets li { font-size:12px; color:#555; line-height:1.55; padding:2px 0; }
  .section-divider { border:none; border-top:1px solid var(--border); margin:20px 0; }

  /* Details */
  details summary { cursor:pointer; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; padding:6px 0; }
  details summary:hover { color:#555; }

  /* Empty state */
  .empty { text-align:center; padding:60px 0; color:var(--muted); font-size:15px; }

  /* Footer */
  .footer { text-align:center; padding:32px 0; color:#CCC; font-size:11px; }

  /* Mobile */
  .menu-toggle { display:none; position:fixed; top:12px; left:12px; z-index:20; background:var(--sidebar); color:white; border:none; padding:8px 12px; border-radius:6px; font-size:18px; cursor:pointer; }
  @media(max-width:768px) {
    .sidebar { transform:translateX(-100%); }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; padding:20px 16px 40px; }
    .menu-toggle { display:block; }
  }
</style>
</head>
<body>

<button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>

<nav class="sidebar">
  <div class="sidebar-brand">
    <p>Tork Capital</p>
    <h1>YouTube Digest</h1>
  </div>

  <div class="sidebar-section">
    <p class="sidebar-section-title">Navegacao</p>
    <a class="sidebar-link active" data-view="today" onclick="switchView('today')">Hoje <span class="count" id="count-today">—</span></a>
    <a class="sidebar-link" data-view="archive" onclick="switchView('archive')">Arquivo</a>
  </div>

  <div class="sidebar-section">
    <p class="sidebar-section-title">Posicoes Core</p>
    <a class="sidebar-link" data-view="company" data-company="Meta" onclick="switchView('company','Meta')"><span class="company-dot" style="background:var(--accent-5)"></span>Meta</a>
    <a class="sidebar-link" data-view="company" data-company="Nvidia" onclick="switchView('company','Nvidia')"><span class="company-dot" style="background:var(--accent-5)"></span>Nvidia</a>
    <a class="sidebar-link" data-view="company" data-company="Amazon" onclick="switchView('company','Amazon')"><span class="company-dot" style="background:var(--accent-5)"></span>Amazon</a>
    <a class="sidebar-link" data-view="company" data-company="OpenAI" onclick="switchView('company','OpenAI')"><span class="company-dot" style="background:var(--accent-5)"></span>OpenAI</a>
    <a class="sidebar-link" data-view="company" data-company="Microsoft" onclick="switchView('company','Microsoft')"><span class="company-dot" style="background:var(--accent-5)"></span>Microsoft</a>
    <a class="sidebar-link" data-view="company" data-company="TSMC" onclick="switchView('company','TSMC')"><span class="company-dot" style="background:var(--accent-5)"></span>TSMC</a>
    <a class="sidebar-link" data-view="company" data-company="Anthropic" onclick="switchView('company','Anthropic')"><span class="company-dot" style="background:var(--accent-5)"></span>Anthropic</a>
    <a class="sidebar-link" data-view="company" data-company="Google" onclick="switchView('company','Google')"><span class="company-dot" style="background:var(--accent-5)"></span>Google</a>
  </div>
</nav>

<div class="main" id="main-content">
  <div class="page-header">
    <h2 id="page-title">Carregando...</h2>
    <p class="meta" id="page-meta"></p>
  </div>
  <div id="date-picker-container" style="display:none">
    <div class="date-picker">
      <select id="date-select" onchange="loadDate(this.value)"></select>
    </div>
  </div>
  <div id="cards-container"></div>
  <div class="footer">
    <p>Gerado com Claude AI · YouTube Data API</p>
    <p>Tork Capital</p>
  </div>
</div>

<script>
const CORE = ['Meta','META','Nvidia','NVDA','Amazon','AMZN','OpenAI','Microsoft','MSFT','TSMC','TSM','Anthropic','Google','GOOGL'];
const SCORE_LABELS = {5:'CORE',4:'ADJACENTE',3:'RELEVANTE',2:'TANGENCIAL',1:'CONTEXTO'};

let allData = {};  // date -> data
let dateList = []; // sorted dates

async function init() {
  // Load manifest
  try {
    const resp = await fetch('data/manifest.json?t='+Date.now());
    dateList = await resp.json();
  } catch(e) {
    dateList = [];
  }
  // Load all data files
  for (const d of dateList) {
    try {
      const resp = await fetch('data/'+d+'.json?t='+Date.now());
      allData[d] = await resp.json();
    } catch(e) {}
  }
  // Populate date picker
  const sel = document.getElementById('date-select');
  dateList.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
  switchView('today');
}

function switchView(view, company) {
  // Update sidebar active
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  const selector = company 
    ? `.sidebar-link[data-company="${company}"]`
    : `.sidebar-link[data-view="${view}"]`;
  const active = document.querySelector(selector);
  if (active) active.classList.add('active');

  document.getElementById('date-picker-container').style.display = view === 'archive' ? 'block' : 'none';

  if (view === 'today') {
    const latest = dateList[0];
    if (latest && allData[latest]) {
      renderDay(allData[latest], latest);
    } else {
      document.getElementById('page-title').textContent = 'Nenhum digest disponivel';
      document.getElementById('page-meta').textContent = '';
      document.getElementById('cards-container').innerHTML = '<p class="empty">Execute o script para gerar o primeiro digest.</p>';
    }
    document.getElementById('count-today').textContent = latest && allData[latest] ? allData[latest].summaries.length + allData[latest].daily_brief.length : '0';
  } else if (view === 'archive') {
    const sel = document.getElementById('date-select');
    loadDate(sel.value || dateList[0]);
  } else if (view === 'company') {
    renderCompany(company);
  }
  // Close mobile sidebar
  document.querySelector('.sidebar').classList.remove('open');
}

function loadDate(date) {
  if (allData[date]) renderDay(allData[date], date);
}

function renderDay(data, date) {
  const total = data.daily_brief.length + data.summaries.length + data.skipped.length;
  const count = data.daily_brief.length + data.summaries.length;
  document.getElementById('page-title').textContent = 'Digest — ' + date;
  document.getElementById('page-meta').textContent = count + ' resumos de ' + total + ' videos';

  let html = '';
  let idx = 0;

  // ---- TOC ----
  html += '<div style="padding:16px 0 20px;border-bottom:2px solid var(--border);margin-bottom:8px">';
  html += '<p style="font-size:9px;color:#BBB;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:12px;font-family:DM Sans,sans-serif">Neste digest</p>';
  
  // Daily Brief TOC entries
  data.daily_brief.forEach((s,i) => {
    const titulo = esc(s.titulo_formatado || s.title || 'AI Daily Brief');
    let tags = '';
    (s.empresas||[]).slice(0,4).forEach(e => { tags += '<span class="tag pinned-t" style="font-size:9px;padding:1px 6px;margin-right:3px">'+esc(e)+'</span>'; });
    const temas = (s.temas_episodio||[]).slice(0,3).join(', ');
    const brief = temas.length > 120 ? temas.substring(0,120)+'...' : temas;
    html += '<a href="#v'+i+'" style="display:block;padding:8px 0;text-decoration:none;border-bottom:1px solid #F0F0F0">';
    html += '<span style="color:var(--pinned);font-size:13px;font-weight:600">'+titulo+'</span>';
    html += '<br/><span style="display:inline-block;margin-top:4px">'+tags+'</span>';
    if (brief) html += '<br/><span style="color:#888;font-size:11px;font-style:italic">'+esc(brief)+'</span>';
    html += '</a>';
  });

  // Regular video TOC entries
  const sorted = [...data.summaries].sort((a,b) => (b.relevancia||1) - (a.relevancia||1));
  sorted.forEach((s,i) => {
    const vidIdx = data.daily_brief.length + i;
    const score = Math.min(Math.max(s.relevancia||1,1),5);
    const colors = {5:'var(--accent-5)',4:'var(--accent-4)',3:'var(--accent-3)',2:'var(--accent-2)',1:'var(--accent-1)'};
    const accent = colors[score];
    let tags = '';
    const empresas = s.empresas || [];
    const coreT = empresas.filter(e => CORE.some(c => e.toLowerCase().includes(c.toLowerCase())));
    const otherT = empresas.filter(e => !CORE.some(c => e.toLowerCase().includes(c.toLowerCase())));
    [...coreT,...otherT].slice(0,4).forEach(e => {
      const isCore = CORE.some(c => e.toLowerCase().includes(c.toLowerCase()));
      tags += '<span class="tag'+(isCore?' core s'+score:'')+'" style="font-size:9px;padding:1px 6px;margin-right:3px">'+esc(e)+'</span>';
    });
    let visao = s.visao_geral || '';
    if (visao.length > 140) visao = visao.substring(0,140) + '...';
    html += '<a href="#v'+vidIdx+'" style="display:block;padding:8px 0;text-decoration:none;border-bottom:1px solid #F5F5F5">';
    html += '<span style="color:#333;font-size:13px">'+esc(s.title)+'</span>';
    html += ' <span style="color:'+accent+';font-size:10px;font-weight:700;font-family:JetBrains Mono,monospace">'+score+'/5</span>';
    html += '<br/><span style="display:inline-block;margin-top:4px">'+tags+'</span>';
    if (visao) html += '<br/><span style="color:#888;font-size:11px;font-style:italic">'+esc(visao)+'</span>';
    html += '</a>';
  });
  html += '</div>';

  // ---- Cards ----
  data.daily_brief.forEach(s => { html += renderDailyBriefCard(s, date); });
  data.summaries.sort((a,b) => (b.relevancia||1) - (a.relevancia||1));
  data.summaries.forEach(s => { html += renderVideoCard(s, date); });
  if (data.skipped.length) {
    html += '<div style="padding:16px 0;border-top:1px solid var(--border);margin-top:8px"><p style="font-size:10px;color:#BBB;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:8px">Sem resumo</p>';
    data.skipped.forEach(v => {
      html += '<p style="font-size:12px;margin:4px 0"><a href="'+v.url+'" target="_blank" style="color:#666;text-decoration:none">'+esc(v.title)+'</a> <span style="color:#BBB">— '+esc(v.channel)+'</span></p>';
    });
    html += '</div>';
  }
  document.getElementById('cards-container').innerHTML = html || '<p class="empty">Nenhum video neste dia.</p>';
}

function renderCompany(company) {
  document.getElementById('page-title').textContent = company;
  document.getElementById('page-meta').textContent = 'Todos os videos mencionando ' + company;

  const aliases = {
    'Meta': ['Meta','META'], 'Nvidia': ['Nvidia','NVDA'], 'Amazon': ['Amazon','AMZN','AWS'],
    'OpenAI': ['OpenAI','GPT','ChatGPT'], 'Microsoft': ['Microsoft','MSFT','Azure','Copilot'],
    'TSMC': ['TSMC','TSM'], 'Anthropic': ['Anthropic','Claude'], 'Google': ['Google','GOOGL','Alphabet','Gemini','DeepMind']
  };
  const terms = aliases[company] || [company];

  let matches = [];
  dateList.forEach(date => {
    const data = allData[date];
    if (!data) return;
    [...data.daily_brief, ...data.summaries].forEach(s => {
      const empresas = (s.empresas || []).join(' ').toLowerCase();
      const title = (s.title || s.titulo_formatado || '').toLowerCase();
      if (terms.some(t => empresas.includes(t.toLowerCase()) || title.includes(t.toLowerCase()))) {
        matches.push({...s, _date: date});
      }
    });
  });

  // Sort by date desc, then relevance
  matches.sort((a,b) => b._date.localeCompare(a._date) || (b.relevancia||0) - (a.relevancia||0));

  let html = '';
  if (matches.length === 0) {
    html = '<p class="empty">Nenhum video encontrado mencionando ' + company + '.</p>';
  } else {
    matches.forEach(s => {
      const dateTag = '<span class="tag dur">'+s._date+'</span>';
      if (s.noticias_principais) {
        html += renderDailyBriefCard(s, s._date, dateTag);
      } else {
        html += renderVideoCard(s, s._date, dateTag);
      }
    });
  }
  document.getElementById('cards-container').innerHTML = html;
}

function renderVideoCard(s, date, extraTag) {
  const score = Math.min(Math.max(s.relevancia||1,1),5);
  const label = SCORE_LABELS[score];
  const thumb = s.channel_thumb;
  const avatar = thumb ? '<img src="'+thumb+'" class="avatar"/>' : '<span class="avatar-letter">'+(s.channel||'?')[0]+'</span>';

  let tags = '';
  if (s.duration_label) tags += '<span class="tag dur">'+s.duration_label+'</span>';
  if (extraTag) tags += extraTag;
  const empresas = s.empresas || [];
  const coreT = empresas.filter(e => CORE.some(c => e.toLowerCase().includes(c.toLowerCase())));
  const otherT = empresas.filter(e => !CORE.some(c => e.toLowerCase().includes(c.toLowerCase())));
  [...coreT, ...otherT].slice(0,5).forEach(e => {
    const isCore = CORE.some(c => e.toLowerCase().includes(c.toLowerCase()));
    tags += '<span class="tag'+(isCore?' core s'+score:'')+'">' + esc(e) + '</span>';
  });

  let points = '';
  (s.pontos||[]).slice(0,6).forEach(p => { points += '<li>'+esc(p)+'</li>'; });

  const transcriptBtn = s.has_transcript && s.transcript_file
    ? '<a class="transcript-btn" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>&#8595; Transcript</a>'
    : '';

  return `<div class="card score-${score}">
    <div class="card-top">
      <div class="channel-info">${avatar}<span class="channel-name">${esc(s.channel)}</span></div>
      <span class="badge badge-${score}">${score}/5 ${label}</span>
    </div>
    <div class="tags">${tags}</div>
    <a href="${s.url}" class="card-title" target="_blank">${esc(s.title)}</a>
    ${s.visao_geral ? '<p class="visao">'+esc(s.visao_geral)+'</p>' : ''}
    <details open><summary>Principais pontos</summary><ul class="pontos">${points}</ul></details>
    <div class="card-footer">
      <span class="motivo">${esc(s.motivo_relevancia||'')}</span>
      ${transcriptBtn}
    </div>
  </div>`;
}

function renderDailyBriefCard(s, date, extraTag) {
  const titulo = s.titulo_formatado || s.title || 'AI Daily Brief';
  let tags = '';
  if (s.duration_label) tags += '<span class="tag dur">'+s.duration_label+'</span>';
  if (extraTag) tags += extraTag;
  (s.empresas||[]).slice(0,6).forEach(e => { tags += '<span class="tag pinned-t">'+esc(e)+'</span>'; });

  let temas = '';
  (s.temas_episodio||[]).forEach(t => { temas += '<li>'+esc(t)+'</li>'; });

  let noticias = '';
  (s.noticias_principais||[]).forEach(n => {
    noticias += '<p class="manchete">'+esc(n.manchete)+'</p><ul class="sub-bullets">';
    (n.contexto||[]).slice(0,5).forEach(b => { noticias += '<li>'+esc(b)+'</li>'; });
    noticias += '</ul>';
  });

  let temasProf = '';
  (s.temas_principais||[]).forEach(tp => {
    temasProf += '<p class="manchete">'+esc(tp.tema)+'</p><ul class="sub-bullets">';
    (tp.analise||[]).slice(0,10).forEach(b => { temasProf += '<li>'+esc(b)+'</li>'; });
    temasProf += '</ul>';
  });

  const transcriptBtn = s.has_transcript && s.transcript_file
    ? '<a class="transcript-btn" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>&#8595; Transcript</a>'
    : '';

  return `<div class="card pinned-card">
    <div class="card-top">
      <div class="channel-info"><span class="channel-name" style="color:var(--pinned);font-weight:600">The AI Daily Brief</span></div>
      <span class="badge badge-pinned">PINNED</span>
    </div>
    <div class="tags">${tags}</div>
    <a href="${s.url||'#'}" class="card-title" target="_blank">${esc(titulo)}</a>
    <details open><summary class="section-label">Temas do Episodio</summary><ul class="pontos">${temas}</ul></details>
    <details open><summary class="section-label">1) Noticias Principais</summary>${noticias}</details>
    <hr class="section-divider"/>
    <details open><summary class="section-label">2) Temas Principais</summary>${temasProf}</details>
    <div class="card-footer"><span></span>${transcriptBtn}</div>
  </div>`;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

init();
</script>
</body>
</html>
