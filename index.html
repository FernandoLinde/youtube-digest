<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube Digest — Tork Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Libre+Franklin:wght@300;400;500;600;700&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --paper: #FFFFFF;
    --ink: #1A1A1A;
    --ink-light: #4A4A4A;
    --ink-muted: #8A8A8A;
    --ink-faint: #B8B8B8;
    --rule: #D4D0C8;
    --rule-light: #E8E5DE;
    --accent: #C5402E;
    --accent-warm: #D4740E;
    --green: #2D6E45;
    --blue-muted: #4A6580;
    --pinned: #5E35B1;
    --pinned-bg: #F6F3FF;
    --s5: #C5402E; --s5-bg: #FEF5F3;
    --s4: #B8610A; --s4-bg: #FFF8F0;
    --s3: #2D6E45; --s3-bg: #F2F9F5;
    --s2: #7A8088; --s2-bg: #F5F5F6;
    --s1: #A0A0A0; --s1-bg: #FAFAFA;
    --display: 'Playfair Display', Georgia, serif;
    --body: 'Newsreader', Georgia, serif;
    --sans: 'Libre Franklin', Helvetica, Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
  body { background:var(--cream); color:var(--ink); font-family:var(--body); font-size:15px; line-height:1.6; }

  /* ===== NAV BAR ===== */
  .navbar {
    background:var(--ink); padding:0 32px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100; height:44px;
  }
  .nav-brand { font-family:var(--sans); font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:2.5px; font-weight:600; }
  .nav-links { display:flex; gap:0; }
  .nav-link {
    font-family:var(--sans); font-size:11px; color:rgba(255,255,255,0.45); text-decoration:none;
    padding:12px 14px; font-weight:500; letter-spacing:0.3px; cursor:pointer;
    border-bottom:2px solid transparent; transition:all 0.15s;
  }
  .nav-link:hover { color:rgba(255,255,255,0.8); }
  .nav-link.active { color:#fff; border-bottom-color:var(--accent); }
  .nav-sep { width:1px; background:rgba(255,255,255,0.1); margin:10px 0; }

  /* ===== CONTAINER ===== */
  .container { max-width:740px; margin:0 auto; padding:0 24px; }

  /* ===== MASTHEAD ===== */
  .masthead { text-align:center; padding:36px 0 20px; border-bottom:3px double var(--rule); }
  .masthead h1 { font-family:var(--display); font-size:36px; font-weight:700; color:var(--ink); letter-spacing:-0.5px; line-height:1.15; }
  .masthead .edition { font-family:var(--sans); font-size:11px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:2px; margin-top:6px; }

  /* ===== STATS DASHBOARD ===== */
  .dashboard { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; border-bottom:1px solid var(--rule); }
  .dash-cell { padding:18px 16px; text-align:center; }
  .dash-cell:not(:last-child) { border-right:1px solid var(--rule-light); }
  .dash-num { font-family:var(--display); font-size:32px; font-weight:700; line-height:1; }
  .dash-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.8px; color:var(--ink-muted); margin-top:4px; }

  .holdings-bar { padding:14px 0; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .holdings-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); font-weight:600; margin-right:4px; }
  .holding-pill { font-family:var(--sans); font-size:10px; padding:3px 10px; border-radius:3px; font-weight:600; cursor:pointer; transition:all 0.12s; text-decoration:none; }
  .holding-pill.mentioned { background:var(--s5-bg); color:var(--s5); }
  .holding-pill.quiet { background:var(--cream); color:var(--ink-faint); border:1px solid var(--rule-light); }
  .holding-pill:hover { opacity:0.8; }

  /* ===== DATE PICKER ===== */
  .datepick { padding:12px 0; border-bottom:1px solid var(--rule); }
  .datepick select { font-family:var(--sans); font-size:12px; padding:6px 10px; border:1px solid var(--rule); border-radius:4px; background:white; color:var(--ink); }

  /* ===== SECTION HEADERS ===== */
  .section-header { padding:20px 0 8px; }
  .section-title { font-family:var(--sans); font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--ink-muted); font-weight:600; }
  .section-rule { border:none; border-top:1px solid var(--rule); margin-top:6px; }

  /* ===== TOC / INDEX ===== */
  .index { padding:0 0 8px; border-bottom:1px solid var(--rule); }
  .idx-entry { display:block; text-decoration:none; padding:10px 0; border-bottom:1px solid var(--rule-light); transition:background 0.1s; }
  .idx-entry:last-child { border-bottom:none; }
  .idx-entry:hover { background:rgba(0,0,0,0.015); }
  .idx-row1 { display:flex; align-items:baseline; gap:8px; }
  .idx-title { font-family:var(--display); font-size:15px; font-weight:500; color:var(--ink); flex:1; }
  .idx-score { font-family:var(--sans); font-size:10px; font-weight:700; }
  .idx-channel { font-family:var(--sans); font-size:11px; color:var(--ink-faint); }
  .idx-tags { margin-top:4px; display:flex; flex-wrap:wrap; gap:4px; }
  .idx-brief { font-family:var(--body); font-size:13px; color:var(--ink-light); margin-top:4px; line-height:1.5; }
  .idx-entry.pinned .idx-title { color:var(--pinned); }

  /* ===== TAGS ===== */
  .t { display:inline-block; font-family:var(--sans); font-size:9px; font-weight:600; padding:2px 7px; border-radius:2px; letter-spacing:0.3px; }
  .t-dur { background:var(--rule-light); color:var(--ink-muted); }
  .t-core { font-weight:700; }
  .t-5 { background:var(--s5-bg); color:var(--s5); } .t-4 { background:var(--s4-bg); color:var(--s4); }
  .t-3 { background:var(--s3-bg); color:var(--s3); } .t-pin { background:var(--pinned-bg); color:var(--pinned); }
  .t-def { background:var(--rule-light); color:var(--ink-muted); }

  /* ===== ARTICLE CARDS ===== */
  .article { padding:24px 0; border-bottom:1px solid var(--rule); }
  .art-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .art-channel { font-family:var(--sans); font-size:11px; color:var(--ink-muted); display:flex; align-items:center; gap:6px; }
  .art-av { width:20px; height:20px; border-radius:50%; }
  .art-badge { font-family:var(--sans); font-size:9px; font-weight:700; padding:2px 8px; border-radius:2px; letter-spacing:0.5px; }
  .b5 { background:var(--s5-bg); color:var(--s5); } .b4 { background:var(--s4-bg); color:var(--s4); }
  .b3 { background:var(--s3-bg); color:var(--s3); } .b2 { background:var(--s2-bg); color:var(--s2); }
  .b1 { background:var(--s1-bg); color:var(--s1); } .bp { background:var(--pinned-bg); color:var(--pinned); }

  .art-tags { margin:8px 0; display:flex; flex-wrap:wrap; gap:4px; }
  .art-headline { font-family:var(--display); font-size:20px; font-weight:600; line-height:1.3; margin-bottom:8px; }
  .art-headline a { color:var(--ink); text-decoration:none; }
  .art-headline a:hover { color:var(--accent); }
  .art-visao { font-family:var(--body); font-size:14px; color:var(--ink-light); line-height:1.65; margin-bottom:12px; }

  /* Low relevance muted */
  .article.muted .art-headline a { color:var(--ink-muted); }
  .article.muted .art-visao { color:var(--ink-faint); }

  /* Expandable points */
  details { margin:4px 0; }
  details summary {
    font-family:var(--sans); font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:1px; color:var(--ink-faint); cursor:pointer; padding:4px 0;
    list-style:none; display:flex; align-items:center; gap:4px;
  }
  details summary::-webkit-details-marker { display:none; }
  details summary::before { content:"▸"; font-size:9px; transition:transform 0.15s; }
  details[open] summary::before { transform:rotate(90deg); }

  .pts { list-style:none; padding:8px 0 4px; }
  .pts li { padding:4px 0 4px 16px; font-size:13px; line-height:1.55; color:var(--ink-light); position:relative; }
  .pts li::before { content:""; position:absolute; left:2px; top:11px; width:5px; height:1px; }
  .article.s5 .pts li::before { background:var(--s5); } .article.s4 .pts li::before { background:var(--s4); }
  .article.s3 .pts li::before { background:var(--s3); } .article.s2 .pts li::before { background:var(--s2); }
  .article.s1 .pts li::before { background:var(--s1); } .article.pin .pts li::before { background:var(--pinned); }

  /* Card footer */
  .art-foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .art-motivo { font-family:var(--sans); font-size:11px; color:var(--ink-faint); flex:1; margin-right:12px; }
  .dl-link { font-family:var(--sans); font-size:10px; color:var(--accent); text-decoration:none; font-weight:600; padding:3px 8px; border:1px solid var(--accent); border-radius:3px; transition:all 0.12s; white-space:nowrap; }
  .dl-link:hover { background:var(--accent); color:white; }

  /* Daily Brief specifics */
  .db-sec { font-family:var(--sans); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--pinned); margin:14px 0 6px; }
  .db-hl { font-family:var(--sans); font-size:13px; font-weight:700; color:var(--ink); margin:10px 0 4px; }
  .db-hl::before { content:"→ "; color:var(--pinned); }
  .db-ul { list-style:disc; padding-left:18px; margin:4px 0 8px; }
  .db-ul li { font-size:12.5px; color:var(--ink-light); line-height:1.55; padding:1px 0; }
  .db-hr { border:none; border-top:1px solid var(--rule-light); margin:16px 0; }

  /* Skipped */
  .skipped { padding:16px 0; }
  .skipped a { font-family:var(--body); font-size:13px; color:var(--ink-muted); text-decoration:none; }
  .skipped a:hover { color:var(--accent); }

  /* Footer */
  .footer { text-align:center; padding:32px 0 24px; }
  .footer p { font-family:var(--sans); font-size:10px; color:var(--ink-faint); letter-spacing:0.5px; }
  .footer .ft-rule { border:none; border-top:3px double var(--rule); margin-bottom:20px; }

  /* ===== COMPANY BRIEF PANEL ===== */
  .co-brief { background:var(--paper); border:1px solid var(--rule); border-radius:6px; padding:28px; margin-bottom:20px; }
  .co-brief-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--rule-light); }
  .co-brief-title { font-family:var(--display); font-size:20px; font-weight:600; }
  .co-impact { font-family:var(--sans); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:4px 12px; border-radius:3px; }
  .co-impact.bullish { background:#F0FAF4; color:var(--green); }
  .co-impact.bearish { background:var(--s5-bg); color:var(--s5); }
  .co-impact.neutral { background:var(--rule-light); color:var(--ink-muted); }

  .co-section { margin-bottom:16px; }
  .co-section-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); font-weight:600; margin-bottom:6px; }
  .co-resumo { font-family:var(--body); font-size:14px; color:var(--ink-light); line-height:1.65; }
  .co-impacts { list-style:none; padding:0; }
  .co-impacts li { font-family:var(--body); font-size:13px; color:var(--ink-light); line-height:1.55; padding:4px 0 4px 0; border-bottom:1px solid var(--rule-light); }
  .co-impacts li:last-child { border-bottom:none; }
  .co-narrativa { font-family:var(--body); font-size:14px; color:var(--ink-light); line-height:1.7; }
  .co-tendencias { list-style:none; padding:0; }
  .co-tendencias li { font-family:var(--body); font-size:13px; color:var(--ink-light); line-height:1.5; padding:5px 0 5px 14px; position:relative; }
  .co-tendencias li::before { content:"→"; position:absolute; left:0; color:var(--accent-warm); font-size:12px; }

  .co-date-label { font-family:var(--sans); font-size:11px; color:var(--ink-faint); font-weight:600; margin-bottom:10px; margin-top:20px; padding-bottom:6px; border-bottom:1px solid var(--rule-light); }

  /* ===== ROLLING BRIEF ===== */
  .rolling-brief { background:var(--paper); border:1px solid var(--rule); border-radius:6px; padding:24px 28px; margin:20px 0; }
  .rolling-tese { font-family:var(--body); font-size:15px; color:var(--ink); line-height:1.7; }

  .sentiment-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .sentiment-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--sans); font-size:10px; font-weight:700; color:white; cursor:default; position:relative; }
  .sentiment-dot.s-bullish { background:var(--green); }
  .sentiment-dot.s-bearish { background:var(--s5); }
  .sentiment-dot.s-neutral { background:var(--ink-faint); }
  .sentiment-dot .tip { display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:var(--ink); color:white; font-size:10px; padding:3px 8px; border-radius:3px; white-space:nowrap; z-index:10; }
  .sentiment-dot:hover .tip { display:block; }

  .trend-pills { display:flex; flex-wrap:wrap; gap:6px; }
  .trend-pill { font-family:var(--sans); font-size:11px; padding:5px 14px; background:#FFF3E6; color:var(--accent-warm); border-radius:12px; font-weight:500; }

  .timeline-list { list-style:none; padding:0; border-left:2px solid var(--rule-light); margin-left:8px; }
  .timeline-list li { padding:6px 0 6px 18px; font-family:var(--body); font-size:13px; color:var(--ink-light); line-height:1.5; position:relative; }
  .timeline-list li::before { content:""; position:absolute; left:-5px; top:13px; width:8px; height:8px; border-radius:50%; background:var(--rule); }
  .timeline-date { font-family:var(--sans); font-size:10px; color:var(--ink-faint); font-weight:600; margin-right:8px; }

  .rb-section { margin-bottom:16px; }
  .rb-section:last-child { margin-bottom:0; }
  .rb-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); font-weight:600; margin-bottom:8px; }

  /* Floating back-to-top */
  .btt { position:fixed; bottom:20px; right:20px; width:32px; height:32px; border-radius:50%; background:var(--ink); color:white; border:none; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; z-index:50; }
  .btt.show { opacity:0.6; }
  .btt:hover { opacity:1; }

  /* ===== SELL-SIDE ===== */
  .ss-tabs { display:flex; gap:0; border-bottom:1px solid var(--rule); margin:20px 0 0; }
  .ss-tab { font-family:var(--sans); font-size:12px; font-weight:500; padding:10px 16px; cursor:pointer; color:var(--ink-muted); border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.1s; }
  .ss-tab:hover { color:var(--ink); }
  .ss-tab.active { color:var(--ink); border-bottom-color:var(--ink); font-weight:600; }
  .ss-tab .ss-tab-count { font-size:11px; font-weight:400; color:var(--ink-faint); margin-left:3px; }

  .ss-stats { display:flex; gap:0; border-bottom:1px solid var(--rule); padding:16px 0; }
  .ss-stats .dash-cell { flex:1; padding:0 24px; text-align:left; }
  .ss-stats .dash-cell:not(:last-child) { border-right:1px solid var(--rule); }
  .ss-stats .dash-cell:first-child { padding-left:0; }

  .ss-filters { padding:12px 0; border-bottom:none; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ss-pill { font-family:var(--sans); font-size:11px; padding:4px 12px; border-radius:4px; font-weight:400; cursor:pointer; transition:background 0.1s; border:none; background:var(--cream); color:var(--ink-muted); }
  .ss-pill:hover { background:var(--rule-light); color:var(--ink-light); }
  .ss-pill.active { background:var(--ink); color:white; }
  .ss-pill .ss-pill-n { font-weight:400; opacity:0.5; margin-left:2px; }

  .ss-email { padding:10px 12px; margin:0 -12px; border-bottom:1px solid var(--rule-light); border-radius:4px; transition:background 0.1s; }
  .ss-email:last-child { border-bottom:none; }
  .ss-email:hover { background:rgba(0,0,0,0.015); }
  .ss-email.expanded { background:var(--paper); border:1px solid var(--rule); margin-bottom:8px; box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .ss-row1 { display:flex; align-items:center; gap:6px; }
  .ss-bank { font-family:var(--sans); font-size:10px; font-weight:600; color:var(--ink-muted); white-space:nowrap; }
  .ss-time { font-family:var(--sans); font-size:10px; color:var(--ink-faint); margin-left:auto; white-space:nowrap; }
  .ss-oneliner { font-family:var(--body); font-size:13px; color:var(--ink); line-height:1.5; margin:3px 0; }
  .ss-oneliner.collapsed { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ss-row3 { display:flex; align-items:center; gap:4px; flex-wrap:wrap; margin-top:2px; }
  .ss-tags { display:flex; flex-wrap:wrap; gap:3px; }
  .ss-co-tag { font-family:var(--sans); font-size:9px; font-weight:600; padding:3px 9px; border-radius:4px; background:#FFF5EB; color:#B8610A; }
  .ss-type-tag { font-family:var(--sans); font-size:9px; font-weight:600; padding:3px 9px; border-radius:4px; background:#F0F0F2; color:#6B6B76; }
  .ss-expand-btn { font-family:var(--sans); font-size:10px; font-weight:500; color:var(--ink-faint); cursor:pointer; padding:2px 0; transition:color 0.1s; border:none; background:none; }
  .ss-expand-btn:hover { color:var(--ink); }

  /* Email reader panel */
  .ss-reader { margin-top:12px; padding-top:12px; border-top:1px solid var(--rule-light); }
  .ss-reader-subject { font-family:var(--sans); font-size:14px; font-weight:600; color:var(--ink); line-height:1.4; margin-bottom:8px; }
  .ss-reader-meta { font-family:var(--sans); font-size:11px; color:var(--ink-faint); margin-bottom:12px; display:flex; gap:12px; flex-wrap:wrap; }
  .ss-reader-links { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .ss-reader-link { font-family:var(--sans); font-size:11px; color:var(--blue-muted); text-decoration:none; font-weight:500; padding:5px 12px; background:rgba(74,101,128,0.06); border-radius:4px; transition:all 0.12s; display:inline-flex; align-items:center; gap:4px; }
  .ss-reader-link:hover { background:rgba(74,101,128,0.12); color:var(--ink); }
  .ss-reader-link::before { content:"↗"; font-size:10px; }
  .ss-reader-body { font-family:var(--body); font-size:13px; color:var(--ink-light); line-height:1.7; max-height:500px; overflow-y:auto; padding:16px 20px; background:var(--cream); border-radius:6px; border:1px solid var(--rule-light); white-space:pre-wrap; word-wrap:break-word; }
  .ss-reader-body a { color:var(--blue-muted); text-decoration:underline; text-decoration-color:rgba(74,101,128,0.3); text-underline-offset:2px; transition:text-decoration-color 0.1s; }
  .ss-reader-body a:hover { text-decoration-color:var(--blue-muted); }
  .ss-reader-iframe { width:100%; min-height:400px; max-height:600px; border:1px solid var(--rule-light); border-radius:6px; background:white; }

  .ss-event { display:flex; align-items:center; gap:10px; padding:8px 10px; margin:0 -10px; border-radius:4px; transition:background 0.1s; flex-wrap:nowrap; }
  .ss-event:hover { background:rgba(0,0,0,0.015); }
  .ss-ev-date { font-family:var(--sans); font-size:11px; font-weight:600; color:var(--pinned); white-space:nowrap; min-width:110px; }
  .ss-ev-bank { font-family:var(--sans); font-size:11px; font-weight:500; color:var(--ink-muted); white-space:nowrap; }
  .ss-ev-sep { color:var(--ink-faint); margin:0 2px; font-size:12px; }
  .ss-ev-sector { font-family:var(--sans); font-size:9px; font-weight:600; padding:3px 9px; border-radius:4px; background:#ECF5EF; color:#2D6E45; white-space:nowrap; }
  .ss-ev-format { font-family:var(--sans); font-size:9px; font-weight:600; padding:3px 9px; border-radius:4px; white-space:nowrap; }
  .ss-ev-format.virtual { background:#F0F0F2; color:#6B6B76; }
  .ss-ev-format.in-person { background:#FFF5EB; color:var(--accent-warm); }
  .ss-ev-format.hybrid { background:#F0ECFF; color:var(--pinned); }
  .ss-ev-title { font-family:var(--body); font-size:13px; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }

  .ss-ev-title a:hover { text-decoration-color:var(--ink); }
  .ics-btn { font-family:var(--sans); font-size:9px; font-weight:600; padding:3px 8px; border-radius:4px; border:1px solid var(--rule); background:white; color:var(--ink-muted); cursor:pointer; transition:all 0.12s; white-space:nowrap; text-decoration:none; }
  .ics-btn:hover { background:var(--ink); color:white; border-color:var(--ink); }

  .ss-date-row { padding:8px 0; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ss-date-pill { font-family:var(--sans); font-size:11px; padding:4px 12px; border-radius:4px; cursor:pointer; border:none; background:var(--cream); color:var(--ink-muted); transition:background 0.1s; }
  .ss-date-pill:hover { background:var(--rule-light); }
  .ss-date-pill.active { background:var(--ink); color:white; }

  .ss-search { padding:10px 0; }
  .ss-search input { font-family:var(--sans); font-size:13px; width:100%; padding:8px 12px; border:1px solid var(--rule); border-radius:4px; background:white; color:var(--ink); outline:none; transition:border-color 0.15s; }
  .ss-search input:focus { border-color:var(--accent); }
  .ss-search input::placeholder { color:var(--ink-faint); }

  /* ===== CALENDAR ===== */
  .cal-nav { display:flex; align-items:center; gap:16px; padding:20px 0 12px; }
  .cal-nav-btn { font-family:var(--sans); font-size:18px; background:none; border:none; padding:4px 8px; cursor:pointer; color:var(--ink-muted); transition:color 0.1s; line-height:1; }
  .cal-nav-btn:hover { color:var(--ink); }
  .cal-month { font-family:var(--display); font-size:20px; font-weight:600; color:var(--ink); }
  .cal-filter-wrap { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .cal-filter-search { font-family:var(--sans); font-size:12px; padding:6px 10px; border:1px solid var(--rule); border-radius:4px; background:white; color:var(--ink); width:200px; outline:none; }
  .cal-filter-search:focus { border-color:var(--accent); }
  .cal-filter-search::placeholder { color:var(--ink-faint); }
  .cal-filter-dropdown { position:relative; }
  .cal-filter-list { display:none; position:absolute; right:0; top:100%; margin-top:4px; background:white; border:1px solid var(--rule); border-radius:6px; box-shadow:0 8px 24px rgba(0,0,0,0.08); max-height:300px; overflow-y:auto; width:240px; z-index:10; padding:4px; }
  .cal-filter-list.open { display:block; }
  .cal-filter-opt { font-family:var(--sans); font-size:12px; padding:6px 10px; border-radius:4px; cursor:pointer; color:var(--ink-light); transition:background 0.08s; }

  .cal-filter-opt.active { background:var(--ink); color:white; }
  .cal-filter-opt.header { font-size:10px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.5px; cursor:default; padding:8px 10px 4px; }
  .cal-filter-opt.header:hover { background:none; }
  .cal-active-filter { font-family:var(--sans); font-size:11px; color:var(--ink-muted); padding:4px 10px; background:var(--cream); border-radius:4px; display:flex; align-items:center; gap:6px; }
  .cal-active-filter .cal-clear { cursor:pointer; color:var(--ink-faint); font-size:14px; line-height:1; }
  .cal-active-filter .cal-clear:hover { color:var(--ink); }
  .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:0; padding:12px 0 0; border-bottom:1px solid var(--rule); }
  .cal-wd { font-family:var(--sans); font-size:10px; font-weight:500; color:var(--ink-muted); text-align:left; padding:0 8px 8px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0; }
  .cal-cell { min-height:100px; padding:8px; border-bottom:1px solid var(--rule-light); border-right:1px solid var(--rule-light); transition:background 0.08s; cursor:pointer; }
  .cal-cell:nth-child(7n) { border-right:none; }
  .cal-cell:hover { background:rgba(0,0,0,0.015); }
  .cal-cell.other-month { opacity:0.25; }
  .cal-cell.today { background:rgba(197,64,46,0.04); }
  .cal-cell.today .cal-day { color:var(--accent); }
  .cal-cell.selected { background:var(--cream); }
  .cal-day { font-family:var(--sans); font-size:12px; font-weight:500; color:var(--ink); margin-bottom:4px; }
  .cal-dots { display:flex; gap:2px; margin-bottom:3px; }
  .cal-dot { display:inline-block; width:5px; height:5px; border-radius:50%; }
  .cal-dot.email { background:var(--ink-faint); }
  .cal-dot.event { background:var(--pinned); }
  .cal-dot.idate { background:var(--accent-warm); }
  .cal-item { font-family:var(--sans); font-size:10px; color:var(--ink-light); line-height:1.35; padding:1px 3px; margin:1px 0; border-radius:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cal-item.ev { background:rgba(94,53,177,0.08); color:var(--pinned); }
  .cal-item.id { background:rgba(212,116,14,0.1); color:var(--accent-warm); }
  .cal-item.em { background:var(--rule-light); color:var(--ink-muted); }
  .cal-detail { margin-top:16px; padding:20px; background:var(--cream); border-radius:8px; }
  .cal-detail-title { font-family:var(--display); font-size:17px; font-weight:600; color:var(--ink); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--rule); }
  .cal-detail-item { font-family:var(--body); font-size:13px; color:var(--ink-light); padding:8px 0; border-bottom:1px solid var(--rule-light); display:flex; align-items:baseline; gap:8px; }
  .cal-detail-item:last-child { border-bottom:none; }
  .cal-detail-type { font-size:9px; font-weight:600; padding:3px 9px; border-radius:4px; white-space:nowrap; }

  /* ===== HOLDINGS DASHBOARD ===== */
  .holdings-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px 0; }
  .hold-card { background:var(--paper); border:1px solid var(--rule); border-radius:6px; padding:18px 20px; cursor:pointer; transition:all 0.15s; }
  .hold-card:hover { border-color:var(--ink-faint); box-shadow:0 2px 8px rgba(0,0,0,0.04); }
  .hold-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .hold-name { font-family:var(--display); font-size:17px; font-weight:600; color:var(--ink); }
  .hold-badge { font-family:var(--sans); font-size:9px; font-weight:700; padding:3px 9px; border-radius:4px; text-transform:uppercase; letter-spacing:0.5px; }
  .hold-badge.bullish { background:#ECF5EF; color:var(--green); }
  .hold-badge.bearish { background:#FEF0ED; color:var(--accent); }
  .hold-badge.neutral { background:var(--rule-light); color:var(--ink-muted); }
  .hold-tese { font-family:var(--body); font-size:12px; color:var(--ink-light); line-height:1.55; margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .hold-dots { display:flex; gap:3px; margin-bottom:8px; }
  .hold-dot { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:700; color:white; }
  .hold-dot.s-bullish { background:var(--green); }
  .hold-dot.s-bearish { background:var(--accent); }
  .hold-dot.s-neutral { background:var(--ink-faint); }
  .hold-trend { font-family:var(--sans); font-size:10px; color:var(--accent-warm); padding:3px 10px; background:#FFF3E6; border-radius:10px; display:inline-block; }
  .hold-meta { font-family:var(--sans); font-size:10px; color:var(--ink-faint); margin-top:8px; }

  /* ===== SEARCH ===== */
  .search-box { padding:20px 0; }
  .search-input { width:100%; font-family:var(--sans); font-size:15px; padding:12px 16px; border:2px solid var(--rule); border-radius:6px; background:white; color:var(--ink); outline:none; transition:border-color 0.15s; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--ink-faint); }
  .search-filters { display:flex; gap:6px; flex-wrap:wrap; padding:8px 0; }
  .search-result { padding:14px 0; border-bottom:1px solid var(--rule-light); }
  .search-result:last-child { border-bottom:none; }
  .sr-row1 { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .sr-source { font-family:var(--sans); font-size:9px; font-weight:600; padding:3px 9px; border-radius:4px; }
  .sr-source.yt { background:#FEF0ED; color:var(--accent); }
  .sr-source.ss { background:#ECF5EF; color:var(--green); }
  .sr-source.cb { background:#F0ECFF; color:var(--pinned); }
  .sr-date { font-family:var(--sans); font-size:10px; color:var(--ink-faint); }
  .sr-bank { font-family:var(--sans); font-size:10px; font-weight:500; color:var(--ink-muted); }
  .sr-title { font-family:var(--display); font-size:15px; font-weight:500; color:var(--ink); line-height:1.4; }
  .sr-title a { color:var(--ink); text-decoration:none; }
  .sr-title a:hover { color:var(--accent); }
  .sr-snippet { font-family:var(--body); font-size:12px; color:var(--ink-light); line-height:1.55; margin-top:3px; }
  .sr-snippet mark { background:#FFF3C4; color:var(--ink); padding:0 2px; border-radius:2px; }
  .sr-companies { display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; }
  .sr-count { font-family:var(--sans); font-size:12px; color:var(--ink-muted); padding:12px 0; }

  /* ===== TRENDS ===== */
  .trend-row { display:flex; align-items:center; gap:8px; padding:6px 0; }
  .trend-label { font-family:var(--sans); font-size:12px; color:var(--ink-light); min-width:110px; text-align:right; }
  .trend-bar-wrap { flex:1; height:20px; background:var(--rule-light); border-radius:3px; overflow:hidden; }
  .trend-bar { height:100%; border-radius:3px; transition:width 0.3s; }
  .trend-count { font-family:var(--sans); font-size:11px; color:var(--ink-muted); min-width:28px; }
  .trend-day { font-family:var(--sans); font-size:11px; font-weight:500; color:var(--ink-muted); padding:12px 0 4px; }

  /* Mobile */
  .mob-menu { display:none; }
  @media(max-width:700px) {
    .navbar { padding:0 12px; }
    .container { padding:0 16px; }
    .masthead h1 { font-size:28px; }
    .dashboard { grid-template-columns:1fr 1fr 1fr; }
    .dash-num { font-size:24px; }
    .nav-links { overflow-x:auto; }
    .ss-stats { flex-direction:column; gap:0; }
    .ss-stats .dash-cell { padding:10px 0; border-right:none!important; border-bottom:1px solid var(--rule); }
    .ss-event { flex-wrap:wrap; }
    .ss-ev-title { white-space:normal; }
    .cal-grid { grid-template-columns:1fr!important; }
    .cal-cell { min-height:auto!important; }
    .holdings-grid { grid-template-columns:1fr; }
  }
</style>

<body>

<!-- NAV -->
<nav class="navbar">
  <span class="nav-brand">Tork Capital</span>
  <div class="nav-links">
    <a class="nav-link active" data-v="today" onclick="go('today')">Hoje</a>
    <a class="nav-link" data-v="holdings" onclick="go('holdings')">Holdings</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="sellside" onclick="go('sellside')">Sell Side</a>
    <a class="nav-link" data-v="calendar" onclick="go('calendar')">Calendar</a>
    <a class="nav-link" data-v="trends" onclick="go('trends')">Trends</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="search" onclick="go('search')">Search</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="archive" onclick="go('archive')">Arquivo</a>
    <div class="nav-sep" id="co-sep"></div>
    <span id="co-nav-links"></span>
  </div>
</nav>

<div class="container">
  <div class="masthead">
    <h1 id="pg-title">YouTube Digest</h1>
    <p class="edition" id="pg-meta"></p>
  </div>

  <div id="dash-area"></div>
  <div id="filter-area"></div>
  <div id="datepick-area" style="display:none"><div class="datepick"><select id="datesel" onchange="loadDate(this.value)"></select></div></div>
  <div id="out"></div>

  <div class="footer">
    <hr class="ft-rule"/>
    <p>Gerado com Gemini AI · YouTube Data API</p>
    <p style="margin-top:4px">Tork Capital Research</p>
  </div>
</div>

<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#9650;</button>

<script>
const CORE=['Meta','META','Nvidia','NVDA','Amazon','AMZN','OpenAI','Microsoft','MSFT','TSMC','TSM','Anthropic','Google','GOOGL'];
let CORE_NAMES=['Meta','Nvidia','Amazon','OpenAI','Microsoft','TSMC','Anthropic','Google'];
const SL={5:'CORE',4:'ADJ',3:'REL',2:'TAN',1:'CTX'};
const ALIAS={'Meta':['Meta','META'],'Nvidia':['Nvidia','NVDA'],'Amazon':['Amazon','AMZN','AWS'],'OpenAI':['OpenAI','GPT','ChatGPT'],'Microsoft':['Microsoft','MSFT','Azure','Copilot'],'TSMC':['TSMC','TSM'],'Anthropic':['Anthropic','Claude'],'Google':['Google','GOOGL','Alphabet','Gemini','DeepMind']};
const SC={5:'var(--s5)',4:'var(--s4)',3:'var(--s3)',2:'var(--s2)',1:'var(--s1)'};

let D={},DL=[],RollingData={},SS={},SSL=[];
let CoIndex={},Agg={},SearchIdx={};
let _curView='today',_curDate=null,_searchQ='',_channelF='';
let ssDate='',ssTab='research',ssFilter='all',ssBank='all',ssSearch='';
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('show',window.scrollY>300)});

async function fetchDay(date){
  if(D[date])return D[date];
  try{const r=await fetch('data/'+date+'.json?t='+Date.now());if(r.ok){D[date]=await r.json();return D[date]}}catch(e){}
  return null;
}
async function fetchSellside(date){
  if(SS[date])return SS[date];
  try{const r=await fetch('data/sellside_'+date+'.json?t='+Date.now());if(r.ok){SS[date]=await r.json();return SS[date]}}catch(e){}
  return null;
}

async function init(){
  // 1. Load manifest (handle both old array and new object format)
  try{
    const r=await fetch('data/manifest.json?t='+Date.now());
    const raw=await r.json();
    if(Array.isArray(raw)){
      DL=raw;
      // Old format — also load sellside manifest separately
      try{const r2=await fetch('data/sellside_manifest.json?t='+Date.now());SSL=await r2.json()}catch(e){SSL=[]}
    } else {
      DL=(raw.youtube||[]).map(x=>x.date);
      SSL=(raw.sellside||[]).map(x=>x.date);
    }
  }catch(e){DL=[];SSL=[]}

  // 2. Load only today's data + aggregates (parallel)
  const todayYT=DL[0], todaySS=SSL[0];
  const fetches=[];
  if(todayYT) fetches.push(fetchDay(todayYT));
  if(todaySS) fetches.push(fetchSellside(todaySS));
  fetches.push(fetch('data/company_rolling.json?t='+Date.now()).then(r=>r.ok?r.json():{}).then(d=>{RollingData=d}).catch(()=>{}));
  fetches.push(fetch('data/company_index.json?t='+Date.now()).then(r=>r.ok?r.json():{}).then(d=>{CoIndex=d}).catch(()=>{}));
  fetches.push(fetch('data/sellside_aggregate.json?t='+Date.now()).then(r=>r.ok?r.json():{}).then(d=>{Agg=d}).catch(()=>{}));
  await Promise.allSettled(fetches);

  // 3. Populate date dropdown and render
  const s=document.getElementById('datesel');
  DL.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;s.appendChild(o)});
  buildDynamicNav();
  go('today');
}

function buildDynamicNav(){
  // Use CoIndex if available, fall back to scanning loaded data
  const counts={};
  if(Object.keys(CoIndex).length){
    for(const cn of Object.keys(CoIndex)){counts[cn]=(CoIndex[cn]||[]).length}
  } else {
    DL.forEach(date=>{
      const data=D[date];if(!data)return;
      [...data.daily_brief,...data.summaries].forEach(s=>{
        (s.empresas||[]).forEach(emp=>{
          for(const cn of Object.keys(ALIAS)){
            if(ALIAS[cn].some(a=>emp.toLowerCase().includes(a.toLowerCase()))){counts[cn]=(counts[cn]||0)+1}
          }
        });
      });
    });
  }
  const top=Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8).map(x=>x[0]);
  if(top.length) CORE_NAMES=top;
  const container=document.getElementById('co-nav-links');
  const sep=document.getElementById('co-sep');
  if(!top.length){sep.style.display='none';return;}
  container.innerHTML=top.map(cn=>'<a class="nav-link" data-co="'+cn+'" onclick="go(\'co\',\''+cn+'\')">'+cn+'</a>').join('');
}

function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

async function go(v,co){
  _searchQ='';_channelF='';
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  const sel=co?`.nav-link[data-co="${co}"]`:`.nav-link[data-v="${v}"]`;
  document.querySelector(sel)?.classList.add('active');
  document.getElementById('datepick-area').style.display=v==='archive'?'block':'none';
  document.getElementById('filter-area').innerHTML='';
  if(v==='today'){
    _curView='today';
    // Today's data is already loaded in init; find first date with content
    let found=DL.find(d=>D[d]&&(D[d].daily_brief.length||D[d].summaries.length));
    if(!found&&DL[0]){
      // Try lazy-loading the first date
      document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Carregando...</p>';
      const data=await fetchDay(DL[0]);
      if(data&&(data.daily_brief.length||data.summaries.length)) found=DL[0];
    }
    if(found){_curDate=found;renderDay(D[found],found)}
    else{document.getElementById('pg-title').textContent='YouTube Digest';document.getElementById('pg-meta').textContent='';document.getElementById('dash-area').innerHTML='';document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum digest disponivel.</p>'}
  }
  else if(v==='holdings'){_curView='holdings';renderHoldings()}
  else if(v==='sellside'){_curView='sellside';await renderSellSide()}
  else if(v==='calendar'){_curView='calendar';renderCalendar()}
  else if(v==='trends'){_curView='trends';renderTrends()}
  else if(v==='search'){_curView='search';await renderSearch()}
  else if(v==='archive'){_curView='archive';const d=document.getElementById('datesel').value||DL[0];_curDate=d;await loadDate(d)}
  else if(v==='co'){_curView='co';renderCo(co)}
}
async function loadDate(d){
  _curDate=d;
  if(!D[d]){
    document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Carregando...</p>';
    await fetchDay(d);
  }
  if(D[d])renderDay(D[d],d);
  else document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Dados nao encontrados para '+d+'.</p>';
}

function buildFilters(data){
  // Collect unique channels
  const channels=new Set();
  [...data.daily_brief,...data.summaries].forEach(s=>{if(s.channel)channels.add(s.channel)});
  const chArr=[...channels].sort();
  if(!chArr.length){document.getElementById('filter-area').innerHTML='';return;}
  let h='<div class="yt-filters">';
  h+='<input type="text" class="yt-search" id="yt-search" placeholder="Buscar videos por titulo, empresa, canal..." value="'+e(_searchQ)+'">';
  h+='<div class="ch-pills">';
  h+='<span class="ch-pill'+(!_channelF?' active':'')+'" data-ch="">Todos</span>';
  chArr.forEach(ch=>{h+='<span class="ch-pill'+(ch===_channelF?' active':'')+'" data-ch="'+e(ch)+'">'+e(ch)+'</span>'});
  h+='</div></div>';
  document.getElementById('filter-area').innerHTML=h;
  // Wire up events (separate from render to avoid losing focus)
  document.getElementById('yt-search').addEventListener('input',function(){_searchQ=this.value;applyFilters(data,_curDate)});
  document.querySelectorAll('.ch-pill').forEach(p=>{
    p.addEventListener('click',function(){_channelF=this.dataset.ch;document.querySelectorAll('.ch-pill').forEach(x=>x.classList.remove('active'));this.classList.add('active');applyFilters(data,_curDate)});
  });
}

function matchesSearch(s,q){
  if(!q)return true;
  const lq=q.toLowerCase();
  const haystack=[(s.title||''),(s.titulo_formatado||''),(s.visao_geral||''),(s.channel||''),(s.empresas||[]).join(' ')].join(' ').toLowerCase();
  return lq.split(/\s+/).every(w=>haystack.includes(w));
}

function applyFilters(data,date){
  const filtered={
    daily_brief:data.daily_brief.filter(s=>{
      if(_channelF&&(s.channel||'The AI Daily Brief')!==_channelF)return false;
      return matchesSearch(s,_searchQ);
    }),
    summaries:data.summaries.filter(s=>{
      if(_channelF&&s.channel!==_channelF)return false;
      return matchesSearch(s,_searchQ);
    }),
    skipped:_searchQ||_channelF?[]:data.skipped
  };
  renderDayContent(filtered,date);
}

function renderDay(data,date){
  const all=[...data.daily_brief,...data.summaries];
  const tot=all.length+data.skipped.length;
  document.getElementById('pg-title').textContent='YouTube Digest';
  document.getElementById('pg-meta').textContent=date+' · '+all.length+' resumos de '+tot+' videos';

  // Dashboard
  const mentioned=new Set();
  all.forEach(s=>{(s.empresas||[]).forEach(emp=>{CORE_NAMES.forEach(cn=>{if((ALIAS[cn]||[cn]).some(a=>emp.toLowerCase().includes(a.toLowerCase())))mentioned.add(cn)})})});
  const topVideo=data.summaries.sort((a,b)=>(b.relevancia||1)-(a.relevancia||1))[0];

  let dash='<div class="dashboard">';

// ===== CALENDAR / ICS HELPERS =====
function generateICS(title, dateStr, durationMin, description, location, url){
  // Generate a standard .ics file content
  const uid=Math.random().toString(36).substr(2,12)+'@torkcapital';
  const now=new Date();
  const stamp=now.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');

  let dtStart='',dtEnd='';
  if(dateStr){
    const d=new Date(dateStr.replace(' ','T'));
    if(!isNaN(d)){
      dtStart=d.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
      const end=new Date(d.getTime()+(durationMin||60)*60000);
      dtEnd=end.toISOString().replace(/[-:]/g,'').replace(/\.\d+/,'');
    }
  }
  if(!dtStart) return null;

  // Escape special chars for iCal
  const esc=s=>(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');

  let ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Tork Capital//Digest//EN\r\nBEGIN:VEVENT\r\n';
  ics+='UID:'+uid+'\r\n';
  ics+='DTSTAMP:'+stamp+'\r\n';
  ics+='DTSTART:'+dtStart+'\r\n';
  ics+='DTEND:'+dtEnd+'\r\n';
  ics+='SUMMARY:'+esc(title)+'\r\n';
  if(description) ics+='DESCRIPTION:'+esc(description)+'\r\n';
  if(location) ics+='LOCATION:'+esc(location)+'\r\n';
  if(url) ics+='URL:'+esc(url)+'\r\n';
  ics+='END:VEVENT\r\nEND:VCALENDAR';
  return ics;
}

function downloadICS(title, dateStr, durationMin, description, location, url){
  const ics=generateICS(title, dateStr, durationMin, description, location, url);
  if(!ics){alert('Data do evento nao disponivel.');return}
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(title||'event').replace(/[^a-zA-Z0-9 ]/g,'').substring(0,40).trim()+'.ics';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ===== SELL-SIDE HELPERS =====
function stripFwdHeaders(s){
  if(!s)return'';
  // Remove De:/From:/Enviado:/Sent:/Para:/To:/Assunto:/Subject:/Cc: header blocks
  return s.replace(/^(?:De|From|Enviado|Enviada em|Sent|Para|To|Assunto|Subject|Cc|Cco|Bcc)\s*:.*$/gmi,'')
    .replace(/_{5,}/g,'')  // Remove long underscore separators
    .replace(/\n{4,}/g,'\n\n')  // Collapse excessive blank lines
    .trim();
}
function eLinks(s){if(!s)return'';let t=e(s);t=t.replace(/https?:\/\/[^\s<]+/g,function(raw){const url=raw.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/[).,;:!?\]}>]+$/,'');const display=url.length>70?url.substring(0,67)+'...':url;return'<a href="'+url.replace(/"/g,'%22')+'" target="_blank" rel="noopener" style="color:var(--blue-muted);text-decoration:underline;text-decoration-color:var(--ink-faint);text-underline-offset:2px;word-break:break-all">'+e(display)+'</a>'});return t}

function _linkLabel(url,subject){
  const u=url.toLowerCase();
  if(/\.pdf/i.test(u)){const m=url.match(/([^/]+\.pdf)/i);return m?m[1].replace(/%20/g,' ').replace(/\.pdf$/i,''):'PDF'}
  if(/zoom\.us|teams\.microsoft|webex/i.test(u))return'Zoom/Call link';
  if(/jotform|register|signup|eventbrite/i.test(u))return'Registration';
  if(/btgpactual.*report/i.test(u))return'BTG Report';
  if(/matrix\.ms\.com|morganstanley/i.test(u))return'MS Research';
  if(/jpmorgan|jpmresearch/i.test(u))return'JPM Research';
  if(/goldmansachs|gs\.com/i.test(u))return'GS Research';
  if(/research|report|article|webapp/i.test(u))return'Full Report';
  if(/podcast|audio/i.test(u))return'Podcast';
  const dm=url.match(/https?:\/\/(?:www\.)?([^/]+)/);
  if(dm)return dm[1].split('.')[0];
  return'Link';
}

function _extractKeyLinks(bodyText,subject){
  const linkRx=/https?:\/\/[^\s<>")\]]+/g;
  const rawLinks=(bodyText.match(linkRx)||[]);
  const noise=/wf\/open|url8477|urldefense|unsubscribe|\.png|\.jpg|\.gif|\.jpeg|sendgrid|mailchimp|click\.|open\?upn|pixel|tracking|beacon|assets\/20|mailing.*distribution|extelinsights.*voting|Disclaimers|Overview\.aspx/i;
  const seen=new Set();
  return rawLinks.filter(l=>{if(noise.test(l))return false;const norm=l.replace(/[?#].*$/,'');if(seen.has(norm))return false;seen.add(norm);return true}).slice(0,6);
}

  const showing=reader.style.display!=='none';

  card.classList.toggle('expanded',!showing);
  // Update button text
  const btn=card.querySelector('.ss-expand-btn');
  if(btn) btn.textContent=showing?'▸ Ler email':'▾ Fechar';
  // Update one-liner collapse
  const oneliner=card.querySelector('.ss-oneliner');
  if(oneliner) oneliner.classList.toggle('collapsed',showing);
}

// ===== CALENDAR =====
let calMonth=new Date().getMonth(),calYear=new Date().getFullYear(),calFilter='',calDetail=null,calSearchQ='';

function getAllSSItems(){
  // Use aggregate if available (no need to load all sell-side JSONs)
  if(Agg.all_events||Agg.all_important_dates){
    return {
      emails:[], // emails not in aggregate — calendar dots use daily_stats counts
      events:Agg.all_events||[],
      dates:Agg.all_important_dates||[]
    };
  }
  // Fallback: scan loaded data
  let items={emails:[],events:[],dates:[]};
  SSL.forEach(d=>{const data=SS[d];if(!data)return;(data.emails||[]).forEach(em=>items.emails.push({...em,_src:d}));(data.events||[]).forEach(ev=>items.events.push({...ev,_src:d}));(data.important_dates||[]).forEach(id=>items.dates.push({...id,_src:d}))});
  return items;
}

function renderCalendar(opts){
  opts=opts||{};
  if(opts.month!==undefined){calMonth=opts.month;calYear=opts.year}
  if(opts.filter!==undefined){calFilter=opts.filter;calSearchQ=''}
  if(opts.detail!==undefined)calDetail=calDetail===opts.detail?null:opts.detail;

  document.getElementById('pg-title').textContent='Calendar';
  document.getElementById('pg-meta').textContent='';
  document.getElementById('datepick-area').style.display='none';
  document.getElementById('dash-area').innerHTML='';
  document.getElementById('filter-area').innerHTML='';

  const items=getAllSSItems();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const wdays=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  const allCos=new Set();const allSectors=new Set();
  [items.emails,items.events,items.dates].forEach(arr=>arr.forEach(x=>{(x.companies||[]).forEach(c=>allCos.add(c));allSectors.add(x.sector||'Other')}));

  let h='';
  const pm=calMonth===0?11:calMonth-1,py=calMonth===0?calYear-1:calYear;
  const nm=calMonth===11?0:calMonth+1,ny=calMonth===11?calYear+1:calYear;

  h+='<div class="cal-nav">';
  h+='<button class="cal-nav-btn" onclick="renderCalendar({month:'+pm+',year:'+py+'})">&#8249;</button>';
  h+='<span class="cal-month">'+months[calMonth]+' '+calYear+'</span>';
  h+='<button class="cal-nav-btn" onclick="renderCalendar({month:'+nm+',year:'+ny+'})">&#8250;</button>';

  h+='<div class="cal-filter-wrap">';
  if(calFilter){const label=calFilter.startsWith('sector:')?calFilter.slice(7):calFilter.slice(3);h+='<div class="cal-active-filter">'+e(label)+' <span class="cal-clear" onclick="renderCalendar({filter:\'\'})">&times;</span></div>'}
  h+='<div class="cal-filter-dropdown">';
  h+='<input class="cal-filter-search" id="cal-search" placeholder="Filter by company or sector..." value="'+e(calSearchQ)+'" onfocus="document.getElementById(\'cal-dd\').classList.add(\'open\')" />';
  h+='<div class="cal-filter-list" id="cal-dd">';
  const q=calSearchQ.toLowerCase();
  const filtSectors=[...allSectors].sort().filter(s=>!q||s.toLowerCase().includes(q));
  const filtCos=[...allCos].sort().filter(c=>!q||c.toLowerCase().includes(q));
  if(filtSectors.length){h+='<div class="cal-filter-opt header">Sectors</div>';filtSectors.slice(0,10).forEach(s=>{h+='<div class="cal-filter-opt'+(calFilter==='sector:'+s?' active':'')+'" onmousedown="renderCalendar({filter:\'sector:'+s.replace(/'/g,"\\'")+'\'})">'+e(s)+'</div>'})}
  if(filtCos.length){h+='<div class="cal-filter-opt header">Companies</div>';filtCos.slice(0,20).forEach(c=>{h+='<div class="cal-filter-opt'+(calFilter==='co:'+c?' active':'')+'" onmousedown="renderCalendar({filter:\'co:'+c.replace(/'/g,"\\'")+'\'})">'+e(c)+'</div>'})}
  if(!filtSectors.length&&!filtCos.length) h+='<div class="cal-filter-opt" style="color:var(--ink-faint)">No matches</div>';
  h+='</div></div></div></div>';

  h+='<div class="cal-weekdays">';wdays.forEach(d=>{h+='<div class="cal-wd">'+d+'</div>'});h+='</div>';

  function matchFilter(item){if(!calFilter)return true;if(calFilter.startsWith('sector:'))return(item.sector||'Other')===calFilter.slice(7);if(calFilter.startsWith('co:')){const co=calFilter.slice(3).toLowerCase();return(item.companies||[]).some(c=>c.toLowerCase().includes(co))}return true}

  const emailsByDate={},eventsByDate={},datesByDate={},emailCountByDate={};
  items.emails.filter(matchFilter).forEach(em=>{const d=(em.received||'').substring(0,10);if(d)(emailsByDate[d]=emailsByDate[d]||[]).push(em)});
  // Use aggregate email counts for calendar dots when individual emails aren't loaded
  if(Agg.daily_stats&&!items.emails.length){
    Object.entries(Agg.daily_stats).forEach(([d,st])=>{emailCountByDate[d]=st.emails||0});
  }
  items.events.filter(matchFilter).forEach(ev=>{const d=(ev.event_date||'').substring(0,10);if(d)(eventsByDate[d]=eventsByDate[d]||[]).push(ev)});
  items.dates.filter(matchFilter).forEach(id=>{const d=id.date;if(d)(datesByDate[d]=datesByDate[d]||[]).push(id)});

  const firstDay=new Date(calYear,calMonth,1);const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=(firstDay.getDay()+6)%7;const totalDays=lastDay.getDate();
  const today=new Date();const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  h+='<div class="cal-grid">';
  for(let i=0;i<startDow;i++){const pd=new Date(calYear,calMonth,-(startDow-i-1));h+='<div class="cal-cell other-month"><div class="cal-day">'+pd.getDate()+'</div></div>'}
  for(let d=1;d<=totalDays;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;const isSel=ds===calDetail;
    const de=emailsByDate[ds]||[],dv=eventsByDate[ds]||[],dd=datesByDate[ds]||[];
    const emailCt=de.length||(emailCountByDate[ds]||0);
    const has=emailCt||dv.length||dd.length;
    h+='<div class="cal-cell'+(isToday?' today':'')+(isSel?' selected':'')+'" onclick="renderCalendar({detail:\''+ds+'\'})">';
    h+='<div class="cal-day">'+d+'</div>';
    if(has){
      h+='<div class="cal-dots">';
      for(let i=0;i<Math.min(emailCt,5);i++) h+='<span class="cal-dot email"></span>';
      for(let i=0;i<Math.min(dv.length,3);i++) h+='<span class="cal-dot event"></span>';
      for(let i=0;i<Math.min(dd.length,3);i++) h+='<span class="cal-dot idate"></span>';
      h+='</div>';
      dv.slice(0,2).forEach(ev=>{h+='<div class="cal-item ev">'+e(ev.event_short_title||ev.one_liner||'').substring(0,30)+'</div>'});
      dd.slice(0,2).forEach(id=>{h+='<div class="cal-item id">'+e(id.description||'').substring(0,30)+'</div>'});
      const maxEm=3-Math.min(dv.length,2)-Math.min(dd.length,2);
      if(maxEm>0) de.slice(0,maxEm).forEach(em=>{h+='<div class="cal-item em">'+e(em.sender_bank||'').substring(0,12)+': '+e(em.one_liner||'').substring(0,20)+'</div>'});
    }
    h+='</div>';
  }
  const endDow=(firstDay.getDay()+totalDays-1+6)%7;
  for(let i=endDow+1;i<7;i++) h+='<div class="cal-cell other-month"><div class="cal-day">'+(i-endDow)+'</div></div>';
  h+='</div>';

  if(calDetail){
    const de=emailsByDate[calDetail]||[],dv=eventsByDate[calDetail]||[],dd=datesByDate[calDetail]||[];
    if(de.length||dv.length||dd.length){
      const dParts=calDetail.split('-');
      h+='<div class="cal-detail">';
      h+='<div class="cal-detail-title">'+parseInt(dParts[2])+' '+months[parseInt(dParts[1])-1]+' '+dParts[0]+'</div>';
      if(dd.length){dd.forEach(d=>{h+='<div class="cal-detail-item"><span class="cal-detail-type" style="background:rgba(212,116,14,0.1);color:var(--accent-warm)">'+e(d.type||'date')+'</span><span>'+e(d.description)+'</span>'+(d.companies||[]).map(c=>' <span class="ss-co-tag">'+e(c)+'</span>').join('')+'</div>'})}
      if(dv.length){dv.forEach(ev=>{h+='<div class="cal-detail-item"><span class="cal-detail-type" style="background:rgba(94,53,177,0.1);color:var(--pinned)">event</span><span>'+e(ev.event_short_title||ev.one_liner||ev.subject)+'</span><span style="color:var(--ink-muted);font-size:11px;margin-left:auto">'+e(ev.sender_bank||'')+'</span></div>'})}
      if(de.length){
        h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--rule)">';
        de.slice(0,10).forEach(em=>{h+='<div class="cal-detail-item"><span style="color:var(--ink-muted);font-size:11px;min-width:80px">'+e(em.sender_bank||'')+'</span><span>'+e(em.one_liner||em.subject)+'</span></div>'});
        if(de.length>10) h+='<div style="color:var(--ink-faint);font-size:11px;padding:4px 0">+'+(de.length-10)+' more emails</div>';
        h+='</div>';
      }
      h+='</div>';
    }
  }

  document.getElementById('out').innerHTML=h;

  const csi=document.getElementById('cal-search');
  if(csi){
    csi.addEventListener('input',function(){
      calSearchQ=this.value;
      const dd=document.getElementById('cal-dd');if(!dd)return;
      const q=calSearchQ.toLowerCase();
      const fs=[...allSectors].sort().filter(s=>!q||s.toLowerCase().includes(q));
      const fc=[...allCos].sort().filter(c=>!q||c.toLowerCase().includes(q));
      let dh='';
      if(fs.length){dh+='<div class="cal-filter-opt header">Sectors</div>';fs.slice(0,10).forEach(s=>{dh+='<div class="cal-filter-opt" onmousedown="renderCalendar({filter:\'sector:'+s.replace(/'/g,"\\'")+'\'})">'+e(s)+'</div>'})}
      if(fc.length){dh+='<div class="cal-filter-opt header">Companies</div>';fc.slice(0,20).forEach(c=>{dh+='<div class="cal-filter-opt" onmousedown="renderCalendar({filter:\'co:'+c.replace(/'/g,"\\'")+'\'})">'+e(c)+'</div>'})}
      if(!fs.length&&!fc.length) dh+='<div class="cal-filter-opt" style="color:var(--ink-faint)">No matches</div>';
      dd.innerHTML=dh;dd.classList.add('open');
    });
    csi.addEventListener('blur',function(){setTimeout(()=>{const dd=document.getElementById('cal-dd');if(dd)dd.classList.remove('open')},150)});
  }
}

// ===== SEARCH =====
let _searchQuery='',_searchFilter='all';

async function renderSearch(opts){
  opts=opts||{};
  if(opts.query!==undefined)_searchQuery=opts.query;
  if(opts.filter)_searchFilter=opts.filter;

  document.getElementById('pg-title').textContent='Search';
  document.getElementById('pg-meta').textContent='Full-text search across videos, emails, and briefs';
  document.getElementById('datepick-area').style.display='none';
  document.getElementById('dash-area').innerHTML='';
  document.getElementById('filter-area').innerHTML='';

  // Lazy-load search index
  if(!SearchIdx.index){
    document.getElementById('out').innerHTML='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Carregando indice de busca...</p>';
    try{
      const r=await fetch('data/search_index.json?t='+Date.now());
      if(r.ok) SearchIdx=await r.json();
    }catch(ex){}
  }

  let h='<div class="search-box"><input class="search-input" id="search-q" type="text" placeholder="Search videos, emails, briefs..." value="'+e(_searchQuery)+'"></div>';

  // Filter pills
  h+='<div class="search-filters">';
  const filters=[['all','All'],['youtube','YouTube'],['sellside','Sell-Side'],['company_brief','Company Briefs']];
  filters.forEach(([val,label])=>{
    h+='<span class="ss-pill'+(_searchFilter===val?' active':'')+'" onclick="renderSearch({filter:\''+val+'\'})">'+label+'</span>';
  });
  h+='</div>';

  // Results
  if(_searchQuery&&SearchIdx.index){
    const results=executeSearch(_searchQuery,_searchFilter);
    h+='<div class="sr-count">'+results.length+' result'+(results.length!==1?'s':'')+' for "'+e(_searchQuery)+'"</div>';
    results.slice(0,50).forEach(doc=>{
      const srcLabel=doc.source_type==='youtube'?(doc.source_subtype==='company_brief'?'Brief':'YouTube'):'Sell-Side';
      const srcClass=doc.source_type==='youtube'?(doc.source_subtype==='company_brief'?'cb':'yt'):'ss';
      h+='<div class="search-result">';
      h+='<div class="sr-row1"><span class="sr-source '+srcClass+'">'+srcLabel+'</span><span class="sr-date">'+e(doc.date)+'</span>';
      if(doc.sender_bank) h+='<span class="sr-bank">'+e(doc.sender_bank)+'</span>';
      h+='</div>';
      if(doc.url){h+='<div class="sr-title"><a href="'+doc.url+'" target="_blank">'+e(doc.title)+'</a></div>'}
      else{h+='<div class="sr-title">'+e(doc.title)+'</div>'}
      // Snippet with highlighted terms
      const snippet=highlightSnippet(doc.snippet||'',_searchQuery);
      h+='<div class="sr-snippet">'+snippet+'</div>';
      if(doc.companies&&doc.companies.length){
        h+='<div class="sr-companies">';
        doc.companies.slice(0,5).forEach(c=>{h+='<span class="ss-co-tag">'+e(c)+'</span>'});
        h+='</div>';
      }
      h+='</div>';
    });
    if(!results.length) h+='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Nenhum resultado encontrado.</p>';
  } else if(_searchQuery&&!SearchIdx.index){
    h+='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Indice de busca nao disponivel.</p>';
  }

  document.getElementById('out').innerHTML=h;

  // Bind search input
  const qi=document.getElementById('search-q');
  if(qi){
    qi.addEventListener('keydown',function(ev){
      if(ev.key==='Enter'){_searchQuery=this.value;renderSearch()}
    });
    qi.focus();
  }
}

function executeSearch(query,filter){
  if(!SearchIdx.index||!SearchIdx.docs)return[];
  const terms=query.toLowerCase().split(/\s+/).filter(t=>t.length>=2);
  if(!terms.length)return[];

  // Find docs matching ALL terms
  let matchSets=terms.map(term=>{
    // Exact match first, then prefix match
    let matches=new Set(SearchIdx.index[term]||[]);
    // Also check prefix matches for partial terms
    if(matches.size===0){
      for(const key of Object.keys(SearchIdx.index)){
        if(key.startsWith(term)){
          (SearchIdx.index[key]||[]).forEach(id=>matches.add(id));
        }
      }
    }
    return matches;
  });

  // Intersect all term match sets
  let resultIds=[...matchSets[0]||[]];
  for(let i=1;i<matchSets.length;i++){
    resultIds=resultIds.filter(id=>matchSets[i].has(id));
  }

  // Score by number of term matches (for ranking)
  let results=resultIds.map(id=>{
    const doc=SearchIdx.docs[id];
    if(!doc)return null;
    // Count how many terms match
    let score=terms.reduce((s,t)=>{
      return s+(SearchIdx.index[t]&&SearchIdx.index[t].includes(id)?2:1);
    },0);
    return {...doc,_id:id,_score:score};
  }).filter(Boolean);

  // Apply source filter
  if(filter!=='all'){
    if(filter==='company_brief') results=results.filter(d=>d.source_subtype==='company_brief');
    else results=results.filter(d=>d.source_type===filter);
  }

  // Sort by score desc, then date desc
  results.sort((a,b)=>b._score-a._score||b.date.localeCompare(a.date));
  return results;
}

function highlightSnippet(snippet,query){
  if(!snippet||!query)return e(snippet);
  let h=e(snippet);
  const terms=query.toLowerCase().split(/\s+/).filter(t=>t.length>=2);
  terms.forEach(term=>{
    const rx=new RegExp('('+term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    h=h.replace(rx,'<mark>$1</mark>');
  });
  return h;
}

// ===== TRENDS =====
function renderTrends(){
  document.getElementById('pg-title').textContent='Trends';
  document.getElementById('pg-meta').textContent='Sell-side volume by sector over time';
  document.getElementById('datepick-area').style.display='none';
  document.getElementById('dash-area').innerHTML='';
  document.getElementById('filter-area').innerHTML='';

  const sectorColors={'Macro':'#5E35B1','Financials':'#4A6580','Oil & Gas':'#C5402E','Metals & Mining':'#8A8A8A','Utilities':'#2D6E45','Real Estate':'#D4740E','Healthcare':'#C5402E','Education':'#4A6580','Retail':'#D4740E','TMT':'#5E35B1','Agro & Food':'#2D6E45','Capital Goods':'#8A8A8A','Transportation':'#4A6580','Other':'#B8B8B8'};

  const dateData=[];const allSectors=new Set();
  // Use aggregate if available
  const aggStats=Agg.daily_stats||{};
  if(Object.keys(aggStats).length){
    Object.keys(aggStats).sort().forEach(d=>{const st=aggStats[d];const sectors=st.sector_counts||{};Object.keys(sectors).forEach(s=>allSectors.add(s));dateData.push({date:d,sectors,total:st.emails||0})});
  } else {
    SSL.slice().reverse().forEach(d=>{const data=SS[d];if(!data)return;const sectors={};(data.emails||[]).forEach(em=>{const s=em.sector||'Other';sectors[s]=(sectors[s]||0)+1;allSectors.add(s)});dateData.push({date:d,sectors,total:(data.emails||[]).length})});
  }

  if(!dateData.length){document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">No trend data yet.</p>';return}

  const maxTotal=Math.max(...dateData.map(d=>d.total),1);
  const sortedSectors=[...allSectors].sort((a,b)=>{const ta=dateData.reduce((s,d)=>s+(d.sectors[a]||0),0);const tb=dateData.reduce((s,d)=>s+(d.sectors[b]||0),0);return tb-ta});

  let h='';
  h+='<div class="section-header"><span class="section-title">Daily Volume</span><hr class="section-rule"/></div>';
  dateData.forEach(d=>{const pct=Math.round((d.total/maxTotal)*100);h+='<div class="trend-row"><span class="trend-label">'+d.date+'</span><div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:var(--ink)"></div></div><span class="trend-count">'+d.total+'</span></div>'});

  h+='<div class="section-header"><span class="section-title">Sector Breakdown</span><hr class="section-rule"/></div>';
  dateData.forEach(d=>{
    h+='<div class="trend-day">'+d.date+' — '+d.total+' emails</div>';
    Object.entries(d.sectors).sort((a,b)=>b[1]-a[1]).forEach(([sector,count])=>{const pct=Math.round((count/d.total)*100);const color=sectorColors[sector]||'#8A8A8A';h+='<div class="trend-row"><span class="trend-label">'+e(sector)+'</span><div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:'+color+'"></div></div><span class="trend-count">'+count+'</span></div>'});
  });

  h+='<div class="section-header"><span class="section-title">All-Time Sector Totals</span><hr class="section-rule"/></div>';
  const maxSector=Math.max(...sortedSectors.map(s=>dateData.reduce((sum,d)=>sum+(d.sectors[s]||0),0)),1);
  sortedSectors.forEach(sector=>{const total=dateData.reduce((sum,d)=>sum+(d.sectors[sector]||0),0);const pct=Math.round((total/maxSector)*100);const color=sectorColors[sector]||'#8A8A8A';h+='<div class="trend-row"><span class="trend-label">'+e(sector)+'</span><div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:'+color+'"></div></div><span class="trend-count">'+total+'</span></div>'});

  document.getElementById('out').innerHTML=h;
}

init();
</script>
