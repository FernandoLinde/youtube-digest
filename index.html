<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube Digest — Tork Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Libre+Franklin:wght@300;400;500;600;700&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --paper: #FFFFFF;
    --ink: #1A1A1A;
    --ink-light: #4A4A4A;
    --ink-muted: #8A8A8A;
    --ink-faint: #B8B8B8;
    --rule: #D4D0C8;
    --rule-light: #E8E5DE;
    --accent: #C5402E;
    --accent-warm: #D4740E;
    --green: #2D6E45;
    --blue-muted: #4A6580;
    --pinned: #5E35B1;
    --pinned-bg: #F6F3FF;
    --s5: #C5402E; --s5-bg: #FEF5F3;
    --s4: #B8610A; --s4-bg: #FFF8F0;
    --s3: #2D6E45; --s3-bg: #F2F9F5;
    --s2: #7A8088; --s2-bg: #F5F5F6;
    --s1: #A0A0A0; --s1-bg: #FAFAFA;
    --display: 'Playfair Display', Georgia, serif;
    --body: 'Newsreader', Georgia, serif;
    --sans: 'Libre Franklin', Helvetica, Arial, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
  body { background:var(--cream); color:var(--ink); font-family:var(--body); font-size:15px; line-height:1.6; }

  /* ===== NAV BAR ===== */
  .navbar {
    background:var(--ink); padding:0 32px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100; height:44px;
  }
  .nav-brand { font-family:var(--sans); font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:2.5px; font-weight:600; }
  .nav-links { display:flex; gap:0; }
  .nav-link {
    font-family:var(--sans); font-size:11px; color:rgba(255,255,255,0.45); text-decoration:none;
    padding:12px 14px; font-weight:500; letter-spacing:0.3px; cursor:pointer;
    border-bottom:2px solid transparent; transition:all 0.15s;
  }
  .nav-link:hover { color:rgba(255,255,255,0.8); }
  .nav-link.active { color:#fff; border-bottom-color:var(--accent); }
  .nav-sep { width:1px; background:rgba(255,255,255,0.1); margin:10px 0; }

  /* ===== CONTAINER ===== */
  .container { max-width:740px; margin:0 auto; padding:0 24px; }

  /* ===== MASTHEAD ===== */
  .masthead { text-align:center; padding:36px 0 20px; border-bottom:3px double var(--rule); }
  .masthead h1 { font-family:var(--display); font-size:36px; font-weight:700; color:var(--ink); letter-spacing:-0.5px; line-height:1.15; }
  .masthead .edition { font-family:var(--sans); font-size:11px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:2px; margin-top:6px; }

  /* ===== STATS DASHBOARD ===== */
  .dashboard { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; border-bottom:1px solid var(--rule); }
  .dash-cell { padding:18px 16px; text-align:center; }
  .dash-cell:not(:last-child) { border-right:1px solid var(--rule-light); }
  .dash-num { font-family:var(--display); font-size:32px; font-weight:700; line-height:1; }
  .dash-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.8px; color:var(--ink-muted); margin-top:4px; }

  .holdings-bar { padding:14px 0; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .holdings-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); font-weight:600; margin-right:4px; }
  .holding-pill { font-family:var(--sans); font-size:10px; padding:3px 10px; border-radius:3px; font-weight:600; cursor:pointer; transition:all 0.12s; text-decoration:none; }
  .holding-pill.mentioned { background:var(--s5-bg); color:var(--s5); }
  .holding-pill.quiet { background:var(--cream); color:var(--ink-faint); border:1px solid var(--rule-light); }
  .holding-pill:hover { opacity:0.8; }

  /* ===== DATE PICKER ===== */
  .datepick { padding:12px 0; border-bottom:1px solid var(--rule); }
  .datepick select { font-family:var(--sans); font-size:12px; padding:6px 10px; border:1px solid var(--rule); border-radius:4px; background:white; color:var(--ink); }

  /* ===== SECTION HEADERS ===== */
  .section-header { padding:20px 0 8px; }
  .section-title { font-family:var(--sans); font-size:10px; text-transform:uppercase; letter-spacing:2px; color:var(--ink-muted); font-weight:600; }
  .section-rule { border:none; border-top:1px solid var(--rule); margin-top:6px; }

  /* ===== TOC / INDEX ===== */
  .index { padding:0 0 8px; border-bottom:1px solid var(--rule); }
  .idx-entry { display:block; text-decoration:none; padding:10px 0; border-bottom:1px solid var(--rule-light); transition:background 0.1s; }
  .idx-entry:last-child { border-bottom:none; }
  .idx-entry:hover { background:rgba(0,0,0,0.015); }
  .idx-row1 { display:flex; align-items:baseline; gap:8px; }
  .idx-title { font-family:var(--display); font-size:15px; font-weight:500; color:var(--ink); flex:1; }
  .idx-score { font-family:var(--sans); font-size:10px; font-weight:700; }
  .idx-channel { font-family:var(--sans); font-size:11px; color:var(--ink-faint); }
  .idx-tags { margin-top:4px; display:flex; flex-wrap:wrap; gap:4px; }
  .idx-brief { font-family:var(--body); font-size:13px; color:var(--ink-light); margin-top:4px; line-height:1.5; }
  .idx-entry.pinned .idx-title { color:var(--pinned); }

  /* ===== TAGS ===== */
  .t { display:inline-block; font-family:var(--sans); font-size:9px; font-weight:600; padding:2px 7px; border-radius:2px; letter-spacing:0.3px; }
  .t-dur { background:var(--rule-light); color:var(--ink-muted); }
  .t-core { font-weight:700; }
  .t-5 { background:var(--s5-bg); color:var(--s5); } .t-4 { background:var(--s4-bg); color:var(--s4); }
  .t-3 { background:var(--s3-bg); color:var(--s3); } .t-pin { background:var(--pinned-bg); color:var(--pinned); }
  .t-def { background:var(--rule-light); color:var(--ink-muted); }

  /* ===== ARTICLE CARDS ===== */
  .article { padding:24px 0; border-bottom:1px solid var(--rule); }
  .art-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .art-channel { font-family:var(--sans); font-size:11px; color:var(--ink-muted); display:flex; align-items:center; gap:6px; }
  .art-av { width:20px; height:20px; border-radius:50%; }
  .art-badge { font-family:var(--sans); font-size:9px; font-weight:700; padding:2px 8px; border-radius:2px; letter-spacing:0.5px; }
  .b5 { background:var(--s5-bg); color:var(--s5); } .b4 { background:var(--s4-bg); color:var(--s4); }
  .b3 { background:var(--s3-bg); color:var(--s3); } .b2 { background:var(--s2-bg); color:var(--s2); }
  .b1 { background:var(--s1-bg); color:var(--s1); } .bp { background:var(--pinned-bg); color:var(--pinned); }

  .art-tags { margin:8px 0; display:flex; flex-wrap:wrap; gap:4px; }
  .art-headline { font-family:var(--display); font-size:20px; font-weight:600; line-height:1.3; margin-bottom:8px; }
  .art-headline a { color:var(--ink); text-decoration:none; }
  .art-headline a:hover { color:var(--accent); }
  .art-visao { font-family:var(--body); font-size:14px; color:var(--ink-light); line-height:1.65; margin-bottom:12px; }

  /* Low relevance muted */
  .article.muted .art-headline a { color:var(--ink-muted); }
  .article.muted .art-visao { color:var(--ink-faint); }

  /* Expandable points */
  details { margin:4px 0; }
  details summary {
    font-family:var(--sans); font-size:10px; font-weight:600; text-transform:uppercase;
    letter-spacing:1px; color:var(--ink-faint); cursor:pointer; padding:4px 0;
    list-style:none; display:flex; align-items:center; gap:4px;
  }
  details summary::-webkit-details-marker { display:none; }
  details summary::before { content:"▸"; font-size:9px; transition:transform 0.15s; }
  details[open] summary::before { transform:rotate(90deg); }

  .pts { list-style:none; padding:8px 0 4px; }
  .pts li { padding:4px 0 4px 16px; font-size:13px; line-height:1.55; color:var(--ink-light); position:relative; }
  .pts li::before { content:""; position:absolute; left:2px; top:11px; width:5px; height:1px; }
  .article.s5 .pts li::before { background:var(--s5); } .article.s4 .pts li::before { background:var(--s4); }
  .article.s3 .pts li::before { background:var(--s3); } .article.s2 .pts li::before { background:var(--s2); }
  .article.s1 .pts li::before { background:var(--s1); } .article.pin .pts li::before { background:var(--pinned); }

  /* Card footer */
  .art-foot { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .art-motivo { font-family:var(--sans); font-size:11px; color:var(--ink-faint); flex:1; margin-right:12px; }
  .dl-link { font-family:var(--sans); font-size:10px; color:var(--accent); text-decoration:none; font-weight:600; padding:3px 8px; border:1px solid var(--accent); border-radius:3px; transition:all 0.12s; white-space:nowrap; }
  .dl-link:hover { background:var(--accent); color:white; }

  /* Daily Brief specifics */
  .db-sec { font-family:var(--sans); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--pinned); margin:14px 0 6px; }
  .db-hl { font-family:var(--sans); font-size:13px; font-weight:700; color:var(--ink); margin:10px 0 4px; }
  .db-hl::before { content:"→ "; color:var(--pinned); }
  .db-ul { list-style:disc; padding-left:18px; margin:4px 0 8px; }
  .db-ul li { font-size:12.5px; color:var(--ink-light); line-height:1.55; padding:1px 0; }
  .db-hr { border:none; border-top:1px solid var(--rule-light); margin:16px 0; }

  /* Skipped */
  .skipped { padding:16px 0; }
  .skipped a { font-family:var(--body); font-size:13px; color:var(--ink-muted); text-decoration:none; }
  .skipped a:hover { color:var(--accent); }

  /* Footer */
  .footer { text-align:center; padding:32px 0 24px; }
  .footer p { font-family:var(--sans); font-size:10px; color:var(--ink-faint); letter-spacing:0.5px; }
  .footer .ft-rule { border:none; border-top:3px double var(--rule); margin-bottom:20px; }

  /* ===== COMPANY BRIEF PANEL ===== */
  .co-brief { background:var(--paper); border:1px solid var(--rule); border-radius:6px; padding:28px; margin-bottom:20px; }
  .co-brief-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--rule-light); }
  .co-brief-title { font-family:var(--display); font-size:20px; font-weight:600; }
  .co-impact { font-family:var(--sans); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:4px 12px; border-radius:3px; }
  .co-impact.bullish { background:#F0FAF4; color:var(--green); }
  .co-impact.bearish { background:var(--s5-bg); color:var(--s5); }
  .co-impact.neutral { background:var(--rule-light); color:var(--ink-muted); }

  .co-section { margin-bottom:16px; }
  .co-section-label { font-family:var(--sans); font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--ink-faint); font-weight:600; margin-bottom:6px; }
  .co-resumo { font-family:var(--body); font-size:14px; color:var(--ink-light); line-height:1.65; }
  .co-impacts { list-style:none; padding:0; }
  .co-impacts li { font-family:var(--body); font-size:13px; color:var(--ink-light); line-height:1.55; padding:4px 0 4px 0; border-bottom:1px solid var(--rule-light); }
  .co-impacts li:last-child { border-bottom:none; }
  .co-narrativa { font-family:var(--body); font-size:14px; color:var(--ink-light); line-height:1.7; }
  .co-tendencias { list-style:none; padding:0; }
  .co-tendencias li { font-family:var(--body); font-size:13px; color:var(--ink-light); line-height:1.5; padding:5px 0 5px 14px; position:relative; }
  .co-tendencias li::before { content:"→"; position:absolute; left:0; color:var(--accent-warm); font-size:12px; }

  .co-date-label { font-family:var(--sans); font-size:11px; color:var(--ink-faint); font-weight:600; margin-bottom:10px; margin-top:20px; padding-bottom:6px; border-bottom:1px solid var(--rule-light); }

  /* ===== SELL SIDE ===== */
  .ss-tabs { display:flex; gap:0; border-bottom:2px solid var(--rule); margin-bottom:0; }
  .ss-tab { font-family:var(--sans); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1px; padding:12px 20px; cursor:pointer; color:var(--ink-faint); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
  .ss-tab:hover { color:var(--ink-light); }
  .ss-tab.active { color:var(--ink); border-bottom-color:var(--accent); }
  .ss-tab .ss-tab-count { font-size:9px; font-weight:400; color:var(--ink-faint); margin-left:4px; }

  .ss-stats { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:0; border-bottom:1px solid var(--rule); }
  .ss-stats .dash-cell:not(:last-child) { border-right:1px solid var(--rule-light); }

  .ss-filters { padding:10px 0; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ss-pill { font-family:var(--sans); font-size:10px; padding:4px 12px; border-radius:20px; font-weight:500; cursor:pointer; transition:all 0.15s; border:1px solid var(--rule-light); background:transparent; color:var(--ink-muted); }
  .ss-pill:hover { border-color:var(--ink-faint); color:var(--ink); }
  .ss-pill.active { background:var(--ink); color:white; border-color:var(--ink); }
  .ss-pill .ss-pill-n { font-weight:400; opacity:0.6; margin-left:2px; }

  .ss-email { padding:12px 0; border-bottom:1px solid var(--rule-light); }
  .ss-email:last-child { border-bottom:none; }
  .ss-row1 { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
  .ss-bank { font-family:var(--sans); font-size:10px; font-weight:600; color:var(--blue-muted); letter-spacing:0.2px; }
  .ss-time { font-family:var(--sans); font-size:10px; color:var(--ink-faint); margin-left:auto; white-space:nowrap; }
  .ss-oneliner { font-family:var(--body); font-size:14px; color:var(--ink); line-height:1.5; }
  .ss-tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:5px; }
  .ss-co-tag { font-family:var(--sans); font-size:9px; font-weight:600; padding:1px 6px; border-radius:2px; background:var(--s4-bg); color:var(--s4); letter-spacing:0.2px; }
  .ss-type-tag { font-family:var(--sans); font-size:9px; font-weight:500; padding:1px 6px; border-radius:2px; background:var(--rule-light); color:var(--ink-muted); }
  .ss-body { font-family:var(--body); font-size:12px; color:var(--ink-light); line-height:1.55; margin-top:8px; white-space:pre-wrap; max-height:250px; overflow-y:auto; padding:10px; background:var(--cream); border-radius:4px; border:1px solid var(--rule-light); }

  .ss-event { padding:10px 0; border-bottom:1px solid var(--rule-light); }
  .ss-event:last-child { border-bottom:none; }
  .ss-ev-row1 { display:flex; align-items:center; gap:8px; margin-bottom:3px; flex-wrap:wrap; }
  .ss-ev-date { font-family:var(--sans); font-size:10px; font-weight:700; color:var(--pinned); white-space:nowrap; }
  .ss-ev-bank { font-family:var(--sans); font-size:10px; font-weight:600; color:var(--blue-muted); white-space:nowrap; }
  .ss-ev-sector { font-family:var(--sans); font-size:9px; font-weight:600; padding:1px 6px; border-radius:2px; background:var(--s3-bg); color:var(--s3); letter-spacing:0.2px; }
  .ss-ev-link { font-family:var(--sans); font-size:9px; color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; padding:2px 8px; border:1px solid var(--accent); border-radius:3px; margin-left:auto; }
  .ss-ev-link:hover { background:var(--accent); color:white; }
  .ss-ev-text { font-family:var(--body); font-size:13px; color:var(--ink); line-height:1.45; }

  .ss-date-row { padding:10px 0 6px; display:flex; align-items:center; gap:6px; }
  .ss-date-pill { font-family:var(--sans); font-size:10px; padding:3px 10px; border-radius:20px; cursor:pointer; border:1px solid var(--rule-light); background:transparent; color:var(--ink-muted); transition:all 0.15s; }
  .ss-date-pill:hover { border-color:var(--ink-faint); }
  .ss-date-pill.active { background:var(--ink); color:white; border-color:var(--ink); }

  /* Floating back-to-top */
  .btt { position:fixed; bottom:20px; right:20px; width:32px; height:32px; border-radius:50%; background:var(--ink); color:white; border:none; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; z-index:50; }
  .btt.show { opacity:0.6; }
  .btt:hover { opacity:1; }

  /* Mobile */
  .mob-menu { display:none; }
  @media(max-width:700px) {
    .navbar { padding:0 12px; }
    .container { padding:0 16px; }
    .masthead h1 { font-size:28px; }
    .dashboard { grid-template-columns:1fr 1fr 1fr; }
    .dash-num { font-size:24px; }
    .nav-links { overflow-x:auto; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <span class="nav-brand">Tork Capital</span>
  <div class="nav-links">
    <a class="nav-link active" data-v="today" onclick="go('today')">Hoje</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="sellside" onclick="go('sellside')">Sell Side</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="archive" onclick="go('archive')">Arquivo</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-co="Meta" onclick="go('co','Meta')">Meta</a>
    <a class="nav-link" data-co="Nvidia" onclick="go('co','Nvidia')">Nvidia</a>
    <a class="nav-link" data-co="Amazon" onclick="go('co','Amazon')">Amazon</a>
    <a class="nav-link" data-co="OpenAI" onclick="go('co','OpenAI')">OpenAI</a>
    <a class="nav-link" data-co="Microsoft" onclick="go('co','Microsoft')">Microsoft</a>
    <a class="nav-link" data-co="TSMC" onclick="go('co','TSMC')">TSMC</a>
    <a class="nav-link" data-co="Anthropic" onclick="go('co','Anthropic')">Anthropic</a>
    <a class="nav-link" data-co="Google" onclick="go('co','Google')">Google</a>
  </div>
</nav>

<div class="container">
  <div class="masthead">
    <h1 id="pg-title">YouTube Digest</h1>
    <p class="edition" id="pg-meta"></p>
  </div>

  <div id="dash-area"></div>
  <div id="datepick-area" style="display:none"><div class="datepick"><select id="datesel" onchange="loadDate(this.value)"></select></div></div>
  <div id="out"></div>

  <div class="footer">
    <hr class="ft-rule"/>
    <p>Gerado com Gemini AI · YouTube Data API</p>
    <p style="margin-top:4px">Tork Capital Research</p>
  </div>
</div>

<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#9650;</button>

<script>
const CORE=['Meta','META','Nvidia','NVDA','Amazon','AMZN','OpenAI','Microsoft','MSFT','TSMC','TSM','Anthropic','Google','GOOGL'];
const CORE_NAMES=['Meta','Nvidia','Amazon','OpenAI','Microsoft','TSMC','Anthropic','Google'];
const SL={5:'CORE',4:'ADJ',3:'REL',2:'TAN',1:'CTX'};
const ALIAS={'Meta':['Meta','META'],'Nvidia':['Nvidia','NVDA'],'Amazon':['Amazon','AMZN','AWS'],'OpenAI':['OpenAI','GPT','ChatGPT'],'Microsoft':['Microsoft','MSFT','Azure','Copilot'],'TSMC':['TSMC','TSM'],'Anthropic':['Anthropic','Claude'],'Google':['Google','GOOGL','Alphabet','Gemini','DeepMind']};
const SC={5:'var(--s5)',4:'var(--s4)',3:'var(--s3)',2:'var(--s2)',1:'var(--s1)'};

let D={},DL=[],SS={},SSL=[];
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('show',window.scrollY>300)});

async function init(){
  try{const r=await fetch('data/manifest.json?t='+Date.now());DL=await r.json()}catch(e){DL=[]}
  for(const d of DL){try{const r=await fetch('data/'+d+'.json?t='+Date.now());D[d]=await r.json()}catch(e){}}
  // Load sell-side data
  try{const r=await fetch('data/sellside_manifest.json?t='+Date.now());SSL=await r.json()}catch(e){SSL=[]}
  for(const d of SSL){try{const r=await fetch('data/sellside_'+d+'.json?t='+Date.now());SS[d]=await r.json()}catch(e){}}
  const s=document.getElementById('datesel');
  DL.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;s.appendChild(o)});
  go('today');
}

function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function eLinks(s){if(!s)return'';let t=e(s);t=t.replace(/https?:\/\/[^\s<]+/g,function(raw){const url=raw.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/[).,;:!?\]}>]+$/,'');const display=url.length>70?url.substring(0,67)+'...':url;return'<a href="'+url.replace(/"/g,'%22')+'" target="_blank" rel="noopener" style="color:var(--accent);word-break:break-all">'+e(display)+'</a>'});return t}

function go(v,co){
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  const sel=co?`.nav-link[data-co="${co}"]`:`.nav-link[data-v="${v}"]`;
  document.querySelector(sel)?.classList.add('active');
  document.getElementById('datepick-area').style.display=v==='archive'?'block':'none';
  if(v==='today'){const l=DL[0];if(l&&D[l])renderDay(D[l],l);else{document.getElementById('pg-title').textContent='YouTube Digest';document.getElementById('pg-meta').textContent='';document.getElementById('dash-area').innerHTML='';document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum digest disponivel.</p>'}}
  else if(v==='sellside'){renderSellSide()}
  else if(v==='archive'){loadDate(document.getElementById('datesel').value||DL[0])}
  else if(v==='co'){renderCo(co)}
}
function loadDate(d){if(D[d])renderDay(D[d],d)}

function renderDay(data,date){
  const all=[...data.daily_brief,...data.summaries];
  const tot=all.length+data.skipped.length;
  document.getElementById('pg-title').textContent='YouTube Digest';
  document.getElementById('pg-meta').textContent=date+' · '+all.length+' resumos de '+tot+' videos';

  // Dashboard
  const mentioned=new Set();
  all.forEach(s=>{(s.empresas||[]).forEach(emp=>{CORE_NAMES.forEach(cn=>{if((ALIAS[cn]||[cn]).some(a=>emp.toLowerCase().includes(a.toLowerCase())))mentioned.add(cn)})})});
  const topVideo=data.summaries.sort((a,b)=>(b.relevancia||1)-(a.relevancia||1))[0];

  let dash='<div class="dashboard">';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--ink)">'+all.length+'</div><div class="dash-label">Videos hoje</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--accent)">'+mentioned.size+'</div><div class="dash-label">Holdings citadas</div></div>';
  const topScore=topVideo?Math.min(Math.max(topVideo.relevancia||1,1),5):0;
  dash+='<div class="dash-cell"><div class="dash-num" style="color:'+SC[topScore]+'">'+topScore+'/5</div><div class="dash-label">Maior relevancia</div></div>';
  dash+='</div>';

  dash+='<div class="holdings-bar"><span class="holdings-label">Core:</span>';
  CORE_NAMES.forEach(cn=>{
    const m=mentioned.has(cn);
    dash+='<a class="holding-pill '+(m?'mentioned':'quiet')+'" onclick="go(\'co\',\''+cn+'\')">'+cn+'</a>';
  });
  dash+='</div>';
  document.getElementById('dash-area').innerHTML=dash;

  // Sort summaries
  data.summaries.sort((a,b)=>(b.relevancia||1)-(a.relevancia||1));

  let h='';
  // Index
  h+='<div class="section-header"><span class="section-title">Neste Digest</span><hr class="section-rule"/></div>';
  h+='<div class="index">';
  let idx=0;
  data.daily_brief.forEach(s=>{
    const ti=e(s.titulo_formatado||s.title||'AI Daily Brief');
    let tags='';(s.empresas||[]).slice(0,5).forEach(x=>{tags+='<span class="t t-pin">'+e(x)+'</span>'});
    const br=(s.temas_episodio||[]).slice(0,3).join(', ');const brief=br.length>130?br.substring(0,130)+'...':br;
    h+='<a href="#a'+idx+'" class="idx-entry pinned"><div class="idx-row1"><span class="idx-title">'+ti+'</span></div><div class="idx-tags">'+tags+'</div>'+(brief?'<div class="idx-brief">'+e(brief)+'</div>':'')+'</a>';
    idx++;
  });
  data.summaries.forEach(s=>{
    const sc=Math.min(Math.max(s.relevancia||1,1),5);
    let tags='';if(s.duration_label)tags+='<span class="t t-dur">'+s.duration_label+'</span>';
    const emp=s.empresas||[];const ct=emp.filter(x=>CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
    const ot=emp.filter(x=>!CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
    [...ct,...ot].slice(0,4).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="t '+(ic?'t-core t-'+sc:'t-def')+'">'+e(x)+'</span>'});
    let vis=s.visao_geral||'';if(vis.length>150)vis=vis.substring(0,150)+'...';
    h+='<a href="#a'+idx+'" class="idx-entry"><div class="idx-row1"><span class="idx-title">'+e(s.title)+'</span><span class="idx-score" style="color:'+SC[sc]+'">'+sc+'/5</span></div><div class="idx-tags">'+tags+'</div>'+(vis?'<div class="idx-brief">'+e(vis)+'</div>':'')+'</a>';
    idx++;
  });
  h+='</div>';

  // Articles
  idx=0;
  if(data.daily_brief.length){
    h+='<div class="section-header"><span class="section-title">AI Daily Brief</span><hr class="section-rule"/></div>';
    data.daily_brief.forEach(s=>{h+=dbArticle(s,'a'+idx);idx++});
  }
  if(data.summaries.length){
    h+='<div class="section-header"><span class="section-title">Videos</span><hr class="section-rule"/></div>';
    data.summaries.forEach(s=>{h+=vidArticle(s,'a'+idx);idx++});
  }
  if(data.skipped.length){
    h+='<div class="section-header"><span class="section-title">Sem Resumo</span><hr class="section-rule"/></div>';
    h+='<div class="skipped">';data.skipped.forEach(v=>{h+='<p style="margin:4px 0"><a href="'+v.url+'" target="_blank">'+e(v.title)+'</a> <span style="color:var(--ink-faint)">— '+e(v.channel)+'</span></p>'});h+='</div>';
  }
  document.getElementById('out').innerHTML=h;
}

function renderCo(company){
  document.getElementById('pg-title').textContent=company;
  const terms=ALIAS[company]||[company];

  // Collect all briefs and videos for this company
  let briefs=[];  // {date, brief}
  let m=[];       // videos
  DL.forEach(date=>{
    const data=D[date];if(!data)return;
    // Get company brief if exists
    const cb=(data.company_briefs||{})[company];
    if(cb)briefs.push({date:date,brief:cb});
    // Get videos
    [...data.daily_brief,...data.summaries].forEach(s=>{
      const emp=(s.empresas||[]).join(' ').toLowerCase();
      const ti=(s.title||s.titulo_formatado||'').toLowerCase();
      if(terms.some(t=>emp.includes(t.toLowerCase())||ti.includes(t.toLowerCase())))
        m.push({...s,_d:date});
    });
  });
  m.sort((a,b)=>b._d.localeCompare(a._d)||(b.relevancia||0)-(a.relevancia||0));
  document.getElementById('pg-meta').textContent=m.length+' videos · '+briefs.length+' dias de analise';
  document.getElementById('dash-area').innerHTML='';

  let h='';
  if(!m.length&&!briefs.length){h='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum video mencionando '+company+'.</p>'}
  else{
    // Company briefs by date
    if(briefs.length){
      briefs.forEach((item,bi)=>{
        const b=item.brief;
        const impactClass=b.impacto_tese==='bullish'?'bullish':(b.impacto_tese==='bearish'?'bearish':'neutral');
        const impactLabel=b.impacto_tese==='bullish'?'BULLISH':(b.impacto_tese==='bearish'?'BEARISH':'NEUTRO');

        h+='<p class="co-date-label">'+item.date+'</p>';
        h+='<div class="co-brief">';
        h+='<div class="co-brief-header"><span class="co-brief-title">'+company+'</span><span class="co-impact '+impactClass+'">'+impactLabel+'</span></div>';

        // Resumo do dia
        h+='<div class="co-section"><p class="co-section-label">Resumo do Dia</p><p class="co-resumo">'+e(b.resumo_dia)+'</p></div>';

        // Impacto na tese
        if(b.impacto_detalhes&&b.impacto_detalhes.length){
          h+='<div class="co-section"><p class="co-section-label">Impacto na Tese</p><ul class="co-impacts">';
          b.impacto_detalhes.forEach(d=>{h+='<li>'+e(d)+'</li>'});
          h+='</ul></div>';
        }

        // Narrativa
        if(b.narrativa){
          h+='<div class="co-section"><p class="co-section-label">Evolucao da Narrativa</p><p class="co-narrativa">'+e(b.narrativa)+'</p></div>';
        }

        // Tendencias
        if(b.tendencias&&b.tendencias.length){
          h+='<div class="co-section"><p class="co-section-label">Tendencias</p><ul class="co-tendencias">';
          b.tendencias.forEach(t=>{h+='<li>'+e(t)+'</li>'});
          h+='</ul></div>';
        }
        h+='</div>';
      });
    }

    // Video index
    if(m.length){
      h+='<div class="section-header" style="margin-top:8px"><span class="section-title">'+m.length+' Videos</span><hr class="section-rule"/></div><div class="index">';
      m.forEach((s,i)=>{
        const isDB=!!(s.noticias_principais);
        const ti=isDB?e(s.titulo_formatado||s.title||'Daily Brief'):e(s.title);
        const sc=Math.min(Math.max(s.relevancia||1,1),5);
        let tags='<span class="t t-dur">'+s._d+'</span>';
        (s.empresas||[]).slice(0,3).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="t '+(isDB?'t-pin':(ic?'t-core t-'+sc:'t-def'))+'">'+e(x)+'</span>'});
        let vis=isDB?(s.temas_episodio||[]).slice(0,3).join(', '):(s.visao_geral||'');if(vis.length>140)vis=vis.substring(0,140)+'...';
        h+='<a href="#c'+i+'" class="idx-entry'+(isDB?' pinned':'')+'"><div class="idx-row1"><span class="idx-title">'+ti+'</span>'+(isDB?'':'<span class="idx-score" style="color:'+SC[sc]+'">'+sc+'/5</span>')+'</div><div class="idx-tags">'+tags+'</div>'+(vis?'<div class="idx-brief">'+e(vis)+'</div>':'')+'</a>';
      });
      h+='</div>';
      h+='<div class="section-header"><span class="section-title">Detalhes</span><hr class="section-rule"/></div>';
      m.forEach((s,i)=>{
        const dt='<span class="t t-dur">'+s._d+'</span>';
        if(s.noticias_principais){h+=dbArticle(s,'c'+i,dt)}else{h+=vidArticle(s,'c'+i,dt)}
      });
    }
  }
  document.getElementById('out').innerHTML=h;
}

function vidArticle(s,id,extraTag){
  const sc=Math.min(Math.max(s.relevancia||1,1),5);
  const av=s.channel_thumb?'<img src="'+s.channel_thumb+'" class="art-av"/>':'';
  let tags='';if(s.duration_label)tags+='<span class="t t-dur">'+s.duration_label+'</span>';
  if(extraTag)tags+=extraTag;
  const emp=s.empresas||[];const ct=emp.filter(x=>CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
  const ot=emp.filter(x=>!CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
  [...ct,...ot].slice(0,5).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="t '+(ic?'t-core t-'+sc:'t-def')+'">'+e(x)+'</span>'});
  let pts='';(s.pontos||[]).slice(0,6).forEach(p=>{pts+='<li>'+e(p)+'</li>'});
  const dl=s.has_transcript&&s.transcript_file?'<a class="dl-link" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>↓ Transcript</a>':'';
  const muted=sc<=2?' muted':'';
  return '<div id="'+id+'" class="article s'+sc+muted+'">'
    +'<div class="art-meta"><span class="art-channel">'+av+e(s.channel)+'</span><span class="art-badge b'+sc+'">'+sc+'/5 '+SL[sc]+'</span></div>'
    +'<div class="art-tags">'+tags+'</div>'
    +'<div class="art-headline"><a href="'+s.url+'" target="_blank">'+e(s.title)+'</a></div>'
    +(s.visao_geral?'<p class="art-visao">'+e(s.visao_geral)+'</p>':'')
    +'<details><summary>Principais pontos</summary><ul class="pts">'+pts+'</ul></details>'
    +'<div class="art-foot"><span class="art-motivo">'+e(s.motivo_relevancia||'')+'</span>'+dl+'</div>'
    +'</div>';
}

function dbArticle(s,id,extraTag){
  const ti=s.titulo_formatado||s.title||'AI Daily Brief';
  let tags='';if(s.duration_label)tags+='<span class="t t-dur">'+s.duration_label+'</span>';
  if(extraTag)tags+=extraTag;
  (s.empresas||[]).slice(0,6).forEach(x=>{tags+='<span class="t t-pin">'+e(x)+'</span>'});
  let temas='';(s.temas_episodio||[]).forEach(t=>{temas+='<li>'+e(t)+'</li>'});
  let news='';(s.noticias_principais||[]).forEach(n=>{news+='<p class="db-hl">'+e(n.manchete)+'</p><ul class="db-ul">';(n.contexto||[]).slice(0,5).forEach(b=>{news+='<li>'+e(b)+'</li>'});news+='</ul>'});
  let deep='';(s.temas_principais||[]).forEach(tp=>{deep+='<p class="db-hl">'+e(tp.tema)+'</p><ul class="db-ul">';(tp.analise||[]).slice(0,10).forEach(b=>{deep+='<li>'+e(b)+'</li>'});deep+='</ul>'});
  const dl=s.has_transcript&&s.transcript_file?'<a class="dl-link" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>↓ Transcript</a>':'';
  return '<div id="'+id+'" class="article pin">'
    +'<div class="art-meta"><span class="art-channel" style="color:var(--pinned);font-weight:600">The AI Daily Brief</span><span class="art-badge bp">PINNED</span></div>'
    +'<div class="art-tags">'+tags+'</div>'
    +'<div class="art-headline"><a href="'+(s.url||'#')+'" target="_blank">'+e(ti)+'</a></div>'
    +'<details><summary><span class="db-sec" style="margin:0">Temas do Episodio</span></summary><ul class="pts">'+temas+'</ul></details>'
    +'<details><summary><span class="db-sec" style="margin:0">1) Noticias Principais</span></summary>'+news+'</details>'
    +'<hr class="db-hr"/>'
    +'<details><summary><span class="db-sec" style="margin:0">2) Temas Principais</span></summary>'+deep+'</details>'
    +'<div class="art-foot"><span></span>'+dl+'</div>'
    +'</div>';
}

// ===== SELL SIDE =====
let ssFilter='all',ssTab='research',ssDate='';

function renderSellSide(opts){
  opts=opts||{};
  if(opts.date)ssDate=opts.date;
  if(opts.tab)ssTab=opts.tab;
  if(opts.sector!==undefined)ssFilter=opts.sector;

  const date=ssDate||SSL[0];
  ssDate=date;
  const data=date?SS[date]:null;
  document.getElementById('pg-title').textContent='Sell Side';
  document.getElementById('datepick-area').style.display='none';

  if(!data||(!data.emails.length&&!(data.events||[]).length)){
    document.getElementById('pg-meta').textContent='';
    document.getElementById('dash-area').innerHTML='';
    document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum email sell-side disponivel.</p>';
    return;
  }

  const emails=data.emails||[];
  const events=data.events||[];
  const stats=data.stats||{};

  document.getElementById('pg-meta').textContent=date+' · '+emails.length+' research · '+events.length+' eventos';

  // Stats + tabs + filters
  let dash='<div class="ss-stats">';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--ink)">'+emails.length+'</div><div class="dash-label">Emails</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--accent)">'+(stats.sectors||0)+'</div><div class="dash-label">Setores</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--green)">'+(stats.banks||0)+'</div><div class="dash-label">Bancos</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--pinned)">'+events.length+'</div><div class="dash-label">Eventos</div></div>';
  dash+='</div>';

  // Sub-tabs: Research | Events
  dash+='<div class="ss-tabs">';
  dash+='<div class="ss-tab'+(ssTab==='research'?' active':'')+'" onclick="renderSellSide({tab:\'research\'})">Research<span class="ss-tab-count">'+emails.length+'</span></div>';
  dash+='<div class="ss-tab'+(ssTab==='events'?' active':'')+'" onclick="renderSellSide({tab:\'events\'})">Eventos<span class="ss-tab-count">'+events.length+'</span></div>';
  dash+='</div>';

  // Date pills
  if(SSL.length>1){
    dash+='<div class="ss-date-row">';
    SSL.forEach(d=>{
      dash+='<span class="ss-date-pill'+(d===date?' active':'')+'" onclick="renderSellSide({date:\''+d+'\'})">'+d+'</span>';
    });
    dash+='</div>';
  }

  // Sector filters (for both research and events tabs)
  {
    const items=ssTab==='events'?events:emails;
    const sectors={};
    items.forEach(em=>{const s=em.sector||'Other';sectors[s]=(sectors[s]||0)+1});
    const sorted=Object.entries(sectors).sort((a,b)=>b[1]-a[1]);

    dash+='<div class="ss-filters">';
    dash+='<span class="ss-pill'+(ssFilter==='all'?' active':'')+'" onclick="renderSellSide({sector:\'all\'})">All<span class="ss-pill-n"> '+items.length+'</span></span>';
    sorted.forEach(([s,c])=>{
      const esc=s.replace(/'/g,"\\'");
      dash+='<span class="ss-pill'+(ssFilter===s?' active':'')+'" onclick="renderSellSide({sector:\''+esc+'\'})">'+e(s)+'<span class="ss-pill-n"> '+c+'</span></span>';
    });
    dash+='</div>';
  }

  document.getElementById('dash-area').innerHTML=dash;

  let h='';

  if(ssTab==='events'){
    // Filter by sector
    let filtEv=ssFilter==='all'?events:events.filter(ev=>(ev.sector||'Other')===ssFilter);
    // Sort chronologically — closest upcoming date first, TBD at the end
    const now=new Date();
    filtEv.sort((a,b)=>{
      const da=a.event_date?new Date(a.event_date.replace(' ','T')):null;
      const db=b.event_date?new Date(b.event_date.replace(' ','T')):null;
      if(!da&&!db)return 0;
      if(!da)return 1;
      if(!db)return -1;
      // Both have dates — upcoming first (closest to now), then past (most recent first)
      const aFuture=da>=now, bFuture=db>=now;
      if(aFuture&&!bFuture)return -1;
      if(!aFuture&&bFuture)return 1;
      if(aFuture&&bFuture)return da-db; // closest upcoming first
      return db-da; // most recent past first
    });

    if(!filtEv.length){
      h+='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Nenhum evento encontrado.</p>';
    } else {
      h+='<div style="padding-top:8px">';
      filtEv.forEach(ev=>{
        // Check if past
        const evDate=ev.event_date?new Date(ev.event_date.replace(' ','T')):null;
        const isPast=evDate&&evDate<now;
        h+='<div class="ss-event"'+(isPast?' style="opacity:0.5"':'')+'>';
        h+='<div class="ss-ev-row1">';
        h+='<span class="ss-ev-date">'+e(ev.event_date||'TBD')+'</span>';
        h+='<span class="ss-ev-bank">'+e(ev.sender_bank||ev.sender)+'</span>';
        if(ev.sector) h+='<span class="ss-ev-sector">'+e(ev.sector)+'</span>';
        (ev.companies||[]).slice(0,4).forEach(c=>{h+='<span class="ss-co-tag">'+e(c)+'</span>'});
        if(ev.event_link) h+='<a class="ss-ev-link" href="'+ev.event_link+'" target="_blank">Link ↗</a>';
        h+='</div>';
        h+='<div class="ss-ev-text">'+e(ev.one_liner||ev.subject)+'</div>';
        h+='</div>';
      });
      h+='</div>';
    }
  } else {
    // Research view — flat list, filtered by sector
    const filtered=ssFilter==='all'?emails:emails.filter(em=>(em.sector||'Other')===ssFilter);

    if(!filtered.length){
      h+='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Nenhum email neste setor.</p>';
    } else {
      filtered.forEach(em=>{
        h+='<div class="ss-email">';
        h+='<div class="ss-row1"><span class="ss-bank">'+e(em.sender_bank||em.sender)+'</span><span class="ss-time">'+e(em.received_time)+'</span></div>';
        h+='<div class="ss-oneliner">'+e(em.one_liner||em.subject)+'</div>';
        h+='<div class="ss-tags">';
        (em.companies||[]).slice(0,6).forEach(c=>{h+='<span class="ss-co-tag">'+e(c)+'</span>'});
        if(em.type&&em.type!=='other') h+='<span class="ss-type-tag">'+e(em.type)+'</span>';
        h+='</div>';
        if(em.body){
          // Extract key links from body — blocklist noise, keep everything useful
          const bodyText=em.body||'';
          const linkRx=/https?:\/\/[^\s<>")\]]+/g;
          const rawLinks=(bodyText.match(linkRx)||[]);
          const noise=/wf\/open|url8477|urldefense|unsubscribe|\.png|\.jpg|\.gif|\.jpeg|sendgrid|mailchimp|click\.|open\?upn|pixel|tracking|beacon|assets\/20|mailing.*distribution|extelinsights.*voting|Disclaimers|Overview\.aspx/i;
          const seen=new Set();
          const keyLinks=rawLinks.filter(l=>{
            if(noise.test(l))return false;
            // Normalize for dedup
            const norm=l.replace(/[?#].*$/,'');
            if(seen.has(norm))return false;
            seen.add(norm);
            return true;
          }).slice(0,5);
          if(keyLinks.length){
            h+='<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">';
            keyLinks.forEach(l=>{
              let label='Link';
              if(/\.pdf/i.test(l))label='PDF';
              else if(/zoom|teams|webinar/i.test(l))label='Call';
              else if(/report|research|matrix|eqr|article/i.test(l))label='Report';
              else if(/jotform|register|signup/i.test(l))label='Register';
              h+='<a href="'+l+'" target="_blank" rel="noopener" style="font-family:var(--sans);font-size:9px;color:var(--accent);text-decoration:none;font-weight:600;padding:2px 8px;border:1px solid var(--accent);border-radius:3px">'+label+' ↗</a>';
            });
            h+='</div>';
          }
          h+='<details><summary>Email completo</summary><div class="ss-body">'+eLinks((bodyText).substring(0,3000))+'</div></details>';
        }
        h+='</div>';
      });
    }
  }

  document.getElementById('out').innerHTML=h;
}

init();
</script>
