<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube Digest — Tork Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --sidebar-bg: #111318;
    --card-bg: #FFFFFF;
    --text: #1C1C1E;
    --text-secondary: #6E6E73;
    --text-muted: #AEAEB2;
    --border: #E5E5EA;
    --border-light: #F2F2F7;
    --accent: #C4650A;
    --accent-light: #FFF5EB;
    --s5: #C4650A; --s5-bg: #FFF5EB;
    --s4: #9A5209; --s4-bg: #FFF8F0;
    --s3: #1D7A42; --s3-bg: #ECFDF3;
    --s2: #6B7280; --s2-bg: #F3F4F6;
    --s1: #9CA3AF; --s1-bg: #F9FAFB;
    --pinned: #6D28D9; --pinned-bg: #F3F0FF;
    --radius: 8px;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --serif: 'Source Serif 4', Georgia, serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); display:flex; min-height:100vh; font-size:14px; line-height:1.5; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width:200px; background:var(--sidebar-bg); position:fixed; top:0; left:0; height:100vh;
    display:flex; flex-direction:column; z-index:100; overflow-y:auto;
    border-right:1px solid rgba(255,255,255,0.06);
  }
  .sb-brand { padding:20px 16px 16px; border-bottom:1px solid rgba(255,255,255,0.06); }
  .sb-brand small { font-size:9px; color:rgba(255,255,255,0.3); text-transform:uppercase; letter-spacing:2.5px; font-weight:600; display:block; margin-bottom:4px; }
  .sb-brand strong { font-family:var(--serif); font-size:17px; color:rgba(255,255,255,0.9); font-weight:600; }

  .sb-group { padding:14px 0 6px; }
  .sb-label { font-size:9px; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:1.8px; font-weight:600; padding:0 16px; margin-bottom:4px; }

  .sb-link {
    display:flex; align-items:center; gap:8px; padding:7px 16px; font-size:12.5px; color:rgba(255,255,255,0.45);
    text-decoration:none; cursor:pointer; transition:all 0.12s; border-left:2px solid transparent;
  }
  .sb-link:hover { color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.03); }
  .sb-link.active { color:rgba(255,255,255,0.95); background:rgba(255,255,255,0.05); border-left-color:var(--accent); }
  .sb-link .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .sb-link .cnt { margin-left:auto; font-size:10px; font-family:var(--mono); color:rgba(255,255,255,0.2); }
  .sb-link.active .cnt { color:var(--accent); }

  /* ===== MAIN ===== */
  .main { margin-left:200px; flex:1; min-height:100vh; }
  .content { max-width:720px; margin:0 auto; padding:28px 32px 60px; }

  /* Page header */
  .pg-header { margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
  .pg-header h2 { font-family:var(--serif); font-size:22px; font-weight:600; color:var(--text); letter-spacing:-0.3px; }
  .pg-header .pg-meta { font-size:12px; color:var(--text-muted); margin-top:3px; }

  /* Date picker */
  .date-pick { margin-bottom:16px; }
  .date-pick select { font-family:var(--sans); font-size:12px; padding:6px 10px; border:1px solid var(--border); border-radius:6px; background:white; color:var(--text); }

  /* ===== TOC ===== */
  .toc-section { padding:12px 0 16px; border-bottom:1px solid var(--border); margin-bottom:4px; }
  .toc-label { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; font-weight:600; margin-bottom:8px; }
  .toc-entry { display:block; text-decoration:none; padding:8px 10px; margin:0 -10px; border-radius:6px; transition:background 0.12s; }
  .toc-entry:hover { background:var(--border-light); }
  .toc-row1 { display:flex; align-items:baseline; gap:6px; }
  .toc-title { font-size:13px; color:var(--text); font-weight:500; }
  .toc-score { font-size:10px; font-family:var(--mono); font-weight:600; }
  .toc-tags { margin-top:4px; display:flex; flex-wrap:wrap; gap:3px; }
  .toc-brief { font-size:11.5px; color:var(--text-secondary); margin-top:3px; line-height:1.45; }
  .toc-entry.pinned .toc-title { color:var(--pinned); font-weight:600; }

  /* ===== TAGS ===== */
  .tag { display:inline-block; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:500; background:var(--border-light); color:var(--text-secondary); }
  .tag.dur { background:#F0F0F0; color:var(--text-muted); font-family:var(--mono); font-size:10px; }
  .tag.core { font-weight:700; }
  .tag.s5 { background:var(--s5-bg); color:var(--s5); } .tag.s4 { background:var(--s4-bg); color:var(--s4); }
  .tag.s3 { background:var(--s3-bg); color:var(--s3); } .tag.pinned-t { background:var(--pinned-bg); color:var(--pinned); font-weight:600; }

  /* ===== CARDS ===== */
  .card { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; }
  .card.s5 { border-left:3px solid var(--s5); } .card.s4 { border-left:3px solid var(--s4); }
  .card.s3 { border-left:3px solid var(--s3); } .card.s2 { border-left:3px solid var(--s2); opacity:0.8; }
  .card.s1 { border-left:3px solid var(--s1); opacity:0.65; } .card.pin { border-left:3px solid var(--pinned); }

  .card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .ch-info { display:flex; align-items:center; gap:6px; }
  .ch-av { width:20px; height:20px; border-radius:50%; }
  .ch-ltr { display:inline-flex; width:20px; height:20px; border-radius:50%; background:var(--border-light); align-items:center; justify-content:center; font-size:9px; color:var(--text-muted); font-weight:600; }
  .ch-name { font-size:11px; color:var(--text-muted); }

  .badge { padding:3px 8px; border-radius:4px; font-size:10px; font-weight:700; font-family:var(--mono); letter-spacing:0.5px; }
  .badge.b5 { background:var(--s5-bg); color:var(--s5); } .badge.b4 { background:var(--s4-bg); color:var(--s4); }
  .badge.b3 { background:var(--s3-bg); color:var(--s3); } .badge.b2 { background:var(--s2-bg); color:var(--s2); }
  .badge.b1 { background:var(--s1-bg); color:var(--s1); } .badge.bp { background:var(--pinned-bg); color:var(--pinned); }

  .card-tags { margin-bottom:10px; display:flex; flex-wrap:wrap; gap:4px; }
  .card-title { display:block; font-family:var(--serif); font-size:16px; font-weight:600; color:var(--text); text-decoration:none; line-height:1.35; margin-bottom:6px; }
  .card-title:hover { color:var(--accent); }
  .card-visao { font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:10px; }

  /* Expandable sections */
  details { margin:6px 0; }
  details summary { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; cursor:pointer; padding:4px 0; user-select:none; }
  details summary:hover { color:var(--text-secondary); }
  details summary::marker { font-size:9px; }

  .pts { list-style:none; padding:6px 0 0; }
  .pts li { padding:4px 0 4px 14px; font-size:12.5px; line-height:1.5; color:var(--text-secondary); position:relative; }
  .pts li::before { content:""; position:absolute; left:0; top:10px; width:5px; height:5px; border-radius:50%; }
  .card.s5 .pts li::before { background:var(--s5); } .card.s4 .pts li::before { background:var(--s4); }
  .card.s3 .pts li::before { background:var(--s3); } .card.s2 .pts li::before { background:var(--s2); }
  .card.s1 .pts li::before { background:var(--s1); } .card.pin .pts li::before { background:var(--pinned); }

  /* Card footer */
  .card-ft { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:8px; border-top:1px solid var(--border-light); }
  .card-ft .motivo { font-size:11px; color:var(--text-muted); flex:1; margin-right:12px; }
  .dl-btn { font-size:10px; color:var(--accent); text-decoration:none; font-weight:600; padding:4px 8px; border:1px solid var(--accent); border-radius:4px; white-space:nowrap; transition:all 0.12s; }
  .dl-btn:hover { background:var(--accent); color:white; }

  /* Daily Brief sections */
  .db-label { font-size:10px; font-weight:700; color:var(--pinned); text-transform:uppercase; letter-spacing:1px; margin:12px 0 6px; }
  .db-headline { font-size:13px; font-weight:700; color:var(--text); margin:10px 0 4px; }
  .db-headline::before { content:"→ "; color:var(--pinned); }
  .db-bullets { list-style:disc; padding-left:18px; margin:4px 0 8px; }
  .db-bullets li { font-size:12px; color:var(--text-secondary); line-height:1.55; padding:1px 0; }
  .db-divider { border:none; border-top:1px solid var(--border); margin:14px 0; }

  /* Floating back-to-top */
  .btt { position:fixed; bottom:24px; right:24px; width:36px; height:36px; border-radius:50%; background:var(--sidebar-bg); color:white; border:none; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; z-index:50; box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .btt.show { opacity:1; }
  .btt:hover { background:var(--accent); }

  /* Empty & footer */
  .empty { text-align:center; padding:48px 0; color:var(--text-muted); font-size:14px; }
  .footer { text-align:center; padding:24px 0; font-size:10px; color:var(--text-muted); }

  /* Skipped */
  .skipped { padding:12px 0; }
  .skipped-label { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; font-weight:600; margin-bottom:6px; }
  .skipped a { font-size:12px; color:var(--text-secondary); text-decoration:none; }
  .skipped a:hover { color:var(--accent); }

  /* Mobile */
  .menu-btn { display:none; position:fixed; top:10px; left:10px; z-index:200; background:var(--sidebar-bg); color:white; border:none; width:36px; height:36px; border-radius:8px; font-size:16px; cursor:pointer; }
  @media(max-width:800px) {
    .sidebar { transform:translateX(-100%); transition:transform 0.25s; z-index:150; }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; }
    .content { padding:20px 16px 60px; }
    .menu-btn { display:flex; align-items:center; justify-content:center; }
  }
</style>
</head>
<body>

<button class="menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">&#9776;</button>

<nav class="sidebar" id="sidebar">
  <div class="sb-brand">
    <small>Tork Capital</small>
    <strong>YouTube Digest</strong>
  </div>
  <div class="sb-group">
    <p class="sb-label">Views</p>
    <a class="sb-link active" data-view="today" onclick="go('today')">Hoje <span class="cnt" id="cnt-today">—</span></a>
    <a class="sb-link" data-view="archive" onclick="go('archive')">Arquivo</a>
  </div>
  <div class="sb-group">
    <p class="sb-label">Posicoes Core</p>
    <a class="sb-link" data-co="Meta" onclick="go('co','Meta')"><span class="dot" style="background:var(--s5)"></span>Meta</a>
    <a class="sb-link" data-co="Nvidia" onclick="go('co','Nvidia')"><span class="dot" style="background:var(--s5)"></span>Nvidia</a>
    <a class="sb-link" data-co="Amazon" onclick="go('co','Amazon')"><span class="dot" style="background:var(--s5)"></span>Amazon</a>
    <a class="sb-link" data-co="OpenAI" onclick="go('co','OpenAI')"><span class="dot" style="background:var(--s5)"></span>OpenAI</a>
    <a class="sb-link" data-co="Microsoft" onclick="go('co','Microsoft')"><span class="dot" style="background:var(--s5)"></span>Microsoft</a>
    <a class="sb-link" data-co="TSMC" onclick="go('co','TSMC')"><span class="dot" style="background:var(--s5)"></span>TSMC</a>
    <a class="sb-link" data-co="Anthropic" onclick="go('co','Anthropic')"><span class="dot" style="background:var(--s5)"></span>Anthropic</a>
    <a class="sb-link" data-co="Google" onclick="go('co','Google')"><span class="dot" style="background:var(--s5)"></span>Google</a>
  </div>
</nav>

<div class="main">
  <div class="content">
    <div class="pg-header">
      <h2 id="pg-title">Carregando...</h2>
      <p class="pg-meta" id="pg-meta"></p>
    </div>
    <div id="datepick" class="date-pick" style="display:none"><select id="datesel" onchange="loadDate(this.value)"></select></div>
    <div id="out"></div>
    <div class="footer"><p>Claude AI · YouTube Data API · Tork Capital</p></div>
  </div>
</div>

<button class="btt" id="btt" onclick="document.getElementById('toc').scrollIntoView({behavior:'smooth'})">&#9650;</button>

<script>
const CORE=['Meta','META','Nvidia','NVDA','Amazon','AMZN','OpenAI','Microsoft','MSFT','TSMC','TSM','Anthropic','Google','GOOGL'];
const SL={5:'CORE',4:'ADJ',3:'REL',2:'TAN',1:'CTX'};
const CO_ALIAS={'Meta':['Meta','META'],'Nvidia':['Nvidia','NVDA'],'Amazon':['Amazon','AMZN','AWS'],'OpenAI':['OpenAI','GPT','ChatGPT'],'Microsoft':['Microsoft','MSFT','Azure','Copilot'],'TSMC':['TSMC','TSM'],'Anthropic':['Anthropic','Claude'],'Google':['Google','GOOGL','Alphabet','Gemini','DeepMind']};

let D={},DL=[];

// Scroll listener for back-to-top button
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('show',window.scrollY>400)});

async function init(){
  try{const r=await fetch('data/manifest.json?t='+Date.now());DL=await r.json()}catch(e){DL=[]}
  for(const d of DL){try{const r=await fetch('data/'+d+'.json?t='+Date.now());D[d]=await r.json()}catch(e){}}
  const s=document.getElementById('datesel');
  DL.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;s.appendChild(o)});
  go('today');
}

function go(v,co){
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('active'));
  const sel=co?`.sb-link[data-co="${co}"]`:`.sb-link[data-view="${v}"]`;
  document.querySelector(sel)?.classList.add('active');
  document.getElementById('datepick').style.display=v==='archive'?'block':'none';
  document.querySelector('.sidebar').classList.remove('open');
  if(v==='today'){const l=DL[0];if(l&&D[l]){renderDay(D[l],l);document.getElementById('cnt-today').textContent=D[l].summaries.length+D[l].daily_brief.length}else{document.getElementById('pg-title').textContent='Nenhum digest';document.getElementById('out').innerHTML='<p class="empty">Execute o script para gerar o primeiro digest.</p>'}}
  else if(v==='archive'){loadDate(document.getElementById('datesel').value||DL[0])}
  else if(v==='co'){renderCo(co)}
}
function loadDate(d){if(D[d])renderDay(D[d],d)}

function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

function renderDay(data,date){
  const tot=data.daily_brief.length+data.summaries.length+data.skipped.length;
  const cnt=data.daily_brief.length+data.summaries.length;
  document.getElementById('pg-title').textContent='Digest — '+date;
  document.getElementById('pg-meta').textContent=cnt+' resumos de '+tot+' videos';
  let h='';
  // TOC
  h+='<div class="toc-section" id="toc"><p class="toc-label">Neste digest</p>';
  data.daily_brief.forEach((s,i)=>{
    const t=e(s.titulo_formatado||s.title||'AI Daily Brief');
    let tags='';(s.empresas||[]).slice(0,4).forEach(x=>{tags+='<span class="tag pinned-t">'+e(x)+'</span>'});
    const br=(s.temas_episodio||[]).slice(0,3).join(', ');
    const brief=br.length>130?br.substring(0,130)+'...':br;
    h+='<a href="#v'+i+'" class="toc-entry pinned"><div class="toc-row1"><span class="toc-title">'+t+'</span></div><div class="toc-tags">'+tags+'</div>'+(brief?'<div class="toc-brief">'+e(brief)+'</div>':'')+'</a>';
  });
  const sorted=[...data.summaries].sort((a,b)=>(b.relevancia||1)-(a.relevancia||1));
  sorted.forEach((s,i)=>{
    const vi=data.daily_brief.length+i;const sc=Math.min(Math.max(s.relevancia||1,1),5);
    const cols={5:'var(--s5)',4:'var(--s4)',3:'var(--s3)',2:'var(--s2)',1:'var(--s1)'};
    let tags='';const emp=s.empresas||[];
    const ct=emp.filter(x=>CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
    const ot=emp.filter(x=>!CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
    [...ct,...ot].slice(0,4).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="tag'+(ic?' core s'+sc:'')+'">'+e(x)+'</span>'});
    let vis=s.visao_geral||'';if(vis.length>140)vis=vis.substring(0,140)+'...';
    h+='<a href="#v'+vi+'" class="toc-entry"><div class="toc-row1"><span class="toc-title">'+e(s.title)+'</span><span class="toc-score" style="color:'+cols[sc]+'">'+sc+'/5</span></div><div class="toc-tags">'+tags+'</div>'+(vis?'<div class="toc-brief">'+e(vis)+'</div>':'')+'</a>';
  });
  h+='</div>';
  // Cards
  data.daily_brief.forEach((s,i)=>{h+='<div id="v'+i+'">'+dbCard(s)+'</div>'});
  sorted.forEach((s,i)=>{h+=vidCard(s,'v'+(data.daily_brief.length+i))});
  if(data.skipped.length){h+='<div class="skipped"><p class="skipped-label">Sem resumo</p>';data.skipped.forEach(v=>{h+='<p><a href="'+v.url+'" target="_blank">'+e(v.title)+'</a> <span style="color:var(--text-muted)">— '+e(v.channel)+'</span></p>'});h+='</div>'}
  document.getElementById('out').innerHTML=h||'<p class="empty">Nenhum video neste dia.</p>';
}

function renderCo(company){
  document.getElementById('pg-title').textContent=company;
  document.getElementById('pg-meta').textContent='Videos mencionando '+company;
  const terms=CO_ALIAS[company]||[company];
  let m=[];
  DL.forEach(date=>{const data=D[date];if(!data)return;[...data.daily_brief,...data.summaries].forEach(s=>{const emp=(s.empresas||[]).join(' ').toLowerCase();const ti=(s.title||s.titulo_formatado||'').toLowerCase();if(terms.some(t=>emp.includes(t.toLowerCase())||ti.includes(t.toLowerCase())))m.push({...s,_d:date})})});
  m.sort((a,b)=>b._d.localeCompare(a._d)||(b.relevancia||0)-(a.relevancia||0));
  let h='';
  if(!m.length){h='<p class="empty">Nenhum video mencionando '+company+'.</p>'}
  else{
    h+='<div class="toc-section" id="toc"><p class="toc-label">'+m.length+' videos</p>';
    m.forEach((s,i)=>{
      const isDB=!!(s.noticias_principais);
      const ti=isDB?e(s.titulo_formatado||s.title||'Daily Brief'):e(s.title);
      const sc=Math.min(Math.max(s.relevancia||1,1),5);
      const cols={5:'var(--s5)',4:'var(--s4)',3:'var(--s3)',2:'var(--s2)',1:'var(--s1)'};
      let tags='<span class="tag dur">'+s._d+'</span>';
      (s.empresas||[]).slice(0,3).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="tag'+(isDB?' pinned-t':(ic?' core s'+sc:''))+'">'+e(x)+'</span>'});
      let vis=isDB?(s.temas_episodio||[]).slice(0,3).join(', '):(s.visao_geral||'');if(vis.length>140)vis=vis.substring(0,140)+'...';
      h+='<a href="#c'+i+'" class="toc-entry'+(isDB?' pinned':'')+'"><div class="toc-row1"><span class="toc-title">'+ti+'</span>'+(isDB?'':'<span class="toc-score" style="color:'+cols[sc]+'">'+sc+'/5</span>')+'</div><div class="toc-tags">'+tags+'</div>'+(vis?'<div class="toc-brief">'+e(vis)+'</div>':'')+'</a>';
    });
    h+='</div>';
    m.forEach((s,i)=>{
      const dt='<span class="tag dur">'+s._d+'</span>';
      if(s.noticias_principais){h+='<div id="c'+i+'">'+dbCard(s,dt)+'</div>'}
      else{h+=vidCard(s,'c'+i,dt)}
    });
  }
  document.getElementById('out').innerHTML=h;
}

function vidCard(s,id,extraTag){
  const sc=Math.min(Math.max(s.relevancia||1,1),5);
  const av=s.channel_thumb?'<img src="'+s.channel_thumb+'" class="ch-av"/>':'<span class="ch-ltr">'+(s.channel||'?')[0]+'</span>';
  let tags='';if(s.duration_label)tags+='<span class="tag dur">'+s.duration_label+'</span>';
  if(extraTag)tags+=extraTag;
  const emp=s.empresas||[];const ct=emp.filter(x=>CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
  const ot=emp.filter(x=>!CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
  [...ct,...ot].slice(0,5).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="tag'+(ic?' core s'+sc:'')+'">'+e(x)+'</span>'});
  let pts='';(s.pontos||[]).slice(0,6).forEach(p=>{pts+='<li>'+e(p)+'</li>'});
  const dl=s.has_transcript&&s.transcript_file?'<a class="dl-btn" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>↓ Transcript</a>':'';
  return '<div id="'+id+'" class="card s'+sc+'">'
    +'<div class="card-top"><div class="ch-info">'+av+'<span class="ch-name">'+e(s.channel)+'</span></div><span class="badge b'+sc+'">'+sc+'/5 '+SL[sc]+'</span></div>'
    +'<div class="card-tags">'+tags+'</div>'
    +'<a href="'+s.url+'" class="card-title" target="_blank">'+e(s.title)+'</a>'
    +(s.visao_geral?'<p class="card-visao">'+e(s.visao_geral)+'</p>':'')
    +'<details><summary>Principais pontos</summary><ul class="pts">'+pts+'</ul></details>'
    +'<div class="card-ft"><span class="motivo">'+e(s.motivo_relevancia||'')+'</span>'+dl+'</div>'
    +'</div>';
}

function dbCard(s,extraTag){
  const ti=s.titulo_formatado||s.title||'AI Daily Brief';
  let tags='';if(s.duration_label)tags+='<span class="tag dur">'+s.duration_label+'</span>';
  if(extraTag)tags+=extraTag;
  (s.empresas||[]).slice(0,6).forEach(x=>{tags+='<span class="tag pinned-t">'+e(x)+'</span>'});
  let temas='';(s.temas_episodio||[]).forEach(t=>{temas+='<li>'+e(t)+'</li>'});
  let news='';(s.noticias_principais||[]).forEach(n=>{news+='<p class="db-headline">'+e(n.manchete)+'</p><ul class="db-bullets">';(n.contexto||[]).slice(0,5).forEach(b=>{news+='<li>'+e(b)+'</li>'});news+='</ul>'});
  let deep='';(s.temas_principais||[]).forEach(tp=>{deep+='<p class="db-headline">'+e(tp.tema)+'</p><ul class="db-bullets">';(tp.analise||[]).slice(0,10).forEach(b=>{deep+='<li>'+e(b)+'</li>'});deep+='</ul>'});
  const dl=s.has_transcript&&s.transcript_file?'<a class="dl-btn" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>↓ Transcript</a>':'';
  return '<div class="card pin">'
    +'<div class="card-top"><div class="ch-info"><span class="ch-name" style="color:var(--pinned);font-weight:600">The AI Daily Brief</span></div><span class="badge bp">PINNED</span></div>'
    +'<div class="card-tags">'+tags+'</div>'
    +'<a href="'+(s.url||'#')+'" class="card-title" target="_blank">'+e(ti)+'</a>'
    +'<details><summary class="db-label" style="margin:0">Temas do Episodio</summary><ul class="pts">'+temas+'</ul></details>'
    +'<details><summary class="db-label" style="margin:0">1) Noticias Principais</summary>'+news+'</details>'
    +'<hr class="db-divider"/>'
    +'<details><summary class="db-label" style="margin:0">2) Temas Principais</summary>'+deep+'</details>'
    +'<div class="card-ft"><span></span>'+dl+'</div>'
    +'</div>';
}

init();
</script>
</body>
</html>
