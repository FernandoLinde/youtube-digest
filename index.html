<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube Digest — Tork Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF;
    --paper: #FFFFFF;
    --hover: #F7F7F5;
    --ink: #191919;
    --ink-light: #5A5A5A;
    --ink-muted: #9B9A97;
    --ink-faint: #CFCDC9;
    --rule: #E9E9E7;
    --rule-light: #F1F1EF;
    --accent: #191919;
    --accent-hover: #000;
    --accent-warm: #CB912F;
    --green: #448361;
    --blue-muted: #527DA5;
    --pinned: #6940A5;
    --pinned-bg: #F4F0FF;
    --red: #D44C47;
    --s5: #D44C47; --s5-bg: #FDEBEC;
    --s4: #CB912F; --s4-bg: #FBF3DB;
    --s3: #448361; --s3-bg: #EDF3EC;
    --s2: #9B9A97; --s2-bg: #F7F7F5;
    --s1: #CFCDC9; --s1-bg: #F7F7F5;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
    --display: 'Inter', sans-serif;
    --body: 'Inter', sans-serif;
    --sans: 'Inter', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  body { background:var(--bg); color:var(--ink); font-family:var(--font); font-size:14px; line-height:1.6; }

  /* ===== NAV BAR ===== */
  .navbar {
    background:#111; padding:0 32px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100; height:44px;
  }
  .nav-brand { font-family:var(--font); font-size:12px; color:rgba(255,255,255,0.5); font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
  .nav-links { display:flex; gap:0; }
  .nav-link {
    font-family:var(--font); font-size:13px; color:rgba(255,255,255,0.45); text-decoration:none;
    padding:12px 14px; font-weight:400; cursor:pointer;
    transition:color 0.15s;
  }
  .nav-link:hover { color:rgba(255,255,255,0.9); }
  .nav-link.active { color:#FFF; font-weight:500; }
  .nav-sep { width:1px; background:rgba(255,255,255,0.08); margin:12px 6px; }

  /* ===== CONTAINER ===== */
  .container { max-width:900px; margin:0 auto; padding:0 40px; }

  /* ===== MASTHEAD ===== */
  .masthead { text-align:left; padding:36px 0 8px; border-bottom:none; }
  .masthead h1 { font-family:var(--font); font-size:32px; font-weight:700; color:var(--ink); letter-spacing:-0.5px; line-height:1.15; }
  .masthead .edition { font-family:var(--font); font-size:13px; color:var(--ink-muted); margin-top:4px; text-transform:none; letter-spacing:0; font-weight:400; }

  /* ===== STATS DASHBOARD ===== */
  .dashboard { display:flex; gap:0; padding:16px 0; border-bottom:1px solid var(--rule); }
  .dash-cell { flex:1; padding:0 24px; text-align:left; }
  .dash-cell:not(:last-child) { border-right:1px solid var(--rule); }
  .dash-cell:first-child { padding-left:0; }
  .dash-num { font-family:var(--font); font-size:28px; font-weight:700; line-height:1; letter-spacing:-0.5px; }
  .dash-label { font-family:var(--font); font-size:11px; color:var(--ink-muted); margin-top:2px; font-weight:400; text-transform:none; letter-spacing:0; }

  .holdings-bar { padding:14px 0; border-bottom:1px solid var(--rule); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .holdings-label { font-family:var(--font); font-size:11px; color:var(--ink-muted); font-weight:500; margin-right:2px; text-transform:none; letter-spacing:0; }
  .holding-pill { font-family:var(--font); font-size:12px; padding:4px 12px; border-radius:4px; font-weight:500; cursor:pointer; transition:background 0.12s; text-decoration:none; }
  .holding-pill.mentioned { background:var(--s5-bg); color:var(--s5); }
  .holding-pill.quiet { background:var(--hover); color:var(--ink-muted); }
  .holding-pill:hover { background:var(--rule); }

  /* ===== DATE PICKER ===== */
  .datepick { padding:12px 0; border-bottom:1px solid var(--rule); }
  .datepick select { font-family:var(--font); font-size:13px; padding:6px 10px; border:1px solid var(--rule); border-radius:4px; background:var(--paper); color:var(--ink); }

  /* ===== SECTION HEADERS ===== */
  .section-header { padding:28px 0 6px; }
  .section-title { font-family:var(--font); font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-muted); font-weight:500; }
  .section-rule { border:none; border-top:1px solid var(--rule); margin-top:8px; }

  /* ===== TOC / INDEX ===== */
  .index { padding:0; border-bottom:none; }
  .idx-entry { display:block; text-decoration:none; padding:12px 10px; margin:0 -10px; border-radius:4px; transition:background 0.1s; border-bottom:none; }
  .idx-entry:last-child { border-bottom:none; }
  .idx-entry:hover { background:var(--hover); }
  .idx-row1 { display:flex; align-items:baseline; gap:8px; }
  .idx-title { font-family:var(--font); font-size:14px; font-weight:500; color:var(--ink); flex:1; line-height:1.4; }
  .idx-score { font-family:var(--mono); font-size:11px; font-weight:500; }
  .idx-channel { font-family:var(--font); font-size:12px; color:var(--ink-faint); }
  .idx-tags { margin-top:4px; display:flex; flex-wrap:wrap; gap:4px; }
  .idx-brief { font-family:var(--font); font-size:12px; color:var(--ink-light); margin-top:3px; line-height:1.5; }
  .idx-entry.pinned { background:var(--pinned-bg); }
  .idx-entry.pinned:hover { background:#EDE8FC; }
  .idx-entry.pinned .idx-title { color:var(--pinned); }

  /* ===== TAGS ===== */
  .t { display:inline-block; font-family:var(--font); font-size:10px; font-weight:500; padding:1px 6px; border-radius:3px; }
  .t-dur { background:var(--rule-light); color:var(--ink-muted); }
  .t-core { font-weight:600; }
  .t-5 { background:var(--s5-bg); color:var(--s5); } .t-4 { background:var(--s4-bg); color:var(--s4); }
  .t-3 { background:var(--s3-bg); color:var(--s3); } .t-pin { background:var(--pinned-bg); color:var(--pinned); }
  .t-def { background:var(--rule-light); color:var(--ink-muted); }

  /* ===== ARTICLE CARDS ===== */
  .article { padding:24px 0; border-bottom:1px solid var(--rule); margin-bottom:0; background:none; border-radius:0; border-left:none; border-right:none; border-top:none; }
  .art-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .art-channel { font-family:var(--font); font-size:12px; color:var(--ink-muted); display:flex; align-items:center; gap:8px; font-weight:400; }
  .art-av { width:20px; height:20px; border-radius:50%; }
  .art-badge { font-family:var(--font); font-size:10px; font-weight:600; padding:2px 8px; border-radius:3px; }
  .b5 { background:var(--s5-bg); color:var(--s5); } .b4 { background:var(--s4-bg); color:var(--s4); }
  .b3 { background:var(--s3-bg); color:var(--s3); } .b2 { background:var(--s2-bg); color:var(--s2); }
  .b1 { background:var(--s1-bg); color:var(--s1); } .bp { background:var(--pinned-bg); color:var(--pinned); }

  .art-tags { margin:6px 0 8px; display:flex; flex-wrap:wrap; gap:4px; }
  .art-headline { font-family:var(--font); font-size:16px; font-weight:600; line-height:1.4; margin-bottom:6px; letter-spacing:-0.2px; }
  .art-headline a { color:var(--ink); text-decoration:none; }
  .art-headline a:hover { text-decoration:underline; }
  .art-visao { font-family:var(--font); font-size:13px; color:var(--ink-light); line-height:1.7; margin-bottom:8px; }

  /* Low relevance muted */
  .article.muted { opacity:0.5; }
  .article.muted:hover { opacity:0.75; }

  /* Expandable points — Notion-style toggles */
  details { margin:4px 0; }
  details summary {
    font-family:var(--font); font-size:12px; font-weight:500;
    color:var(--ink-muted); cursor:pointer; padding:4px 0;
    list-style:none; display:flex; align-items:center; gap:6px;
    transition:color 0.1s; text-transform:none; letter-spacing:0;
  }
  details summary:hover { color:var(--ink); }
  details summary::-webkit-details-marker { display:none; }
  details summary::before { content:""; width:6px; height:6px; border-right:1.5px solid var(--ink-muted); border-bottom:1.5px solid var(--ink-muted); transform:rotate(-45deg); transition:transform 0.15s; margin-top:-1px; }
  details[open] summary::before { transform:rotate(45deg); margin-top:-3px; }

  .pts { list-style:none; padding:4px 0 4px 4px; }
  .pts li { padding:3px 0 3px 16px; font-size:13px; line-height:1.6; color:var(--ink-light); position:relative; }
  .pts li::before { content:""; position:absolute; left:4px; top:12px; width:4px; height:4px; border-radius:50%; }
  .article.s5 .pts li::before { background:var(--s5); } .article.s4 .pts li::before { background:var(--s4); }
  .article.s3 .pts li::before { background:var(--s3); } .article.s2 .pts li::before { background:var(--s2); }
  .article.s1 .pts li::before { background:var(--s1); } .article.pin .pts li::before { background:var(--pinned); }

  /* Card footer */
  .art-foot { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
  .art-motivo { font-family:var(--font); font-size:11px; color:var(--ink-muted); flex:1; margin-right:12px; line-height:1.4; }
  .dl-link { font-family:var(--font); font-size:11px; color:var(--ink); text-decoration:none; font-weight:500; padding:4px 10px; background:var(--hover); border-radius:4px; transition:background 0.1s; white-space:nowrap; border:none; }
  .dl-link:hover { background:var(--rule); }

  /* Daily Brief specifics */
  .db-sec { font-family:var(--font); font-size:12px; font-weight:600; color:var(--pinned); margin:12px 0 4px; text-transform:none; letter-spacing:0; }
  .db-hl { font-family:var(--font); font-size:13px; font-weight:600; color:var(--ink); margin:8px 0 3px; }
  .db-hl::before { content:""; display:inline-block; width:3px; height:12px; background:var(--pinned); border-radius:1px; margin-right:8px; vertical-align:middle; }
  .db-ul { list-style:none; padding-left:11px; margin:2px 0 6px; }
  .db-ul li { font-size:12px; color:var(--ink-light); line-height:1.6; padding:1px 0; }
  .db-hr { border:none; border-top:1px solid var(--rule); margin:14px 0; }

  /* Skipped */
  .skipped { padding:12px 0; }
  .skipped a { font-family:var(--font); font-size:12px; color:var(--ink-muted); text-decoration:none; }
  .skipped a:hover { color:var(--ink); }

  /* Footer */
  .footer { text-align:center; padding:48px 0 32px; }
  .footer p { font-family:var(--font); font-size:11px; color:var(--ink-faint); }
  .footer .ft-rule { border:none; border-top:1px solid var(--rule); margin-bottom:20px; }

  /* ===== COMPANY BRIEF PANEL ===== */
  .co-brief { background:var(--hover); border:none; border-radius:6px; padding:24px; margin-bottom:12px; }
  .co-brief-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--rule); }
  .co-brief-title { font-family:var(--font); font-size:17px; font-weight:700; letter-spacing:-0.3px; }
  .co-impact { font-family:var(--font); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:3px 10px; border-radius:3px; }
  .co-impact.bullish { background:var(--s3-bg); color:var(--green); }
  .co-impact.bearish { background:var(--s5-bg); color:var(--s5); }
  .co-impact.neutral { background:var(--rule-light); color:var(--ink-muted); }

  .co-section { margin-bottom:14px; }
  .co-section-label { font-family:var(--font); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--ink-muted); font-weight:500; margin-bottom:4px; }
  .co-resumo { font-family:var(--font); font-size:13px; color:var(--ink-light); line-height:1.65; }
  .co-impacts { list-style:none; padding:0; }
  .co-impacts li { font-family:var(--font); font-size:13px; color:var(--ink-light); line-height:1.5; padding:4px 0; border-bottom:1px solid var(--rule); }
  .co-impacts li:last-child { border-bottom:none; }
  .co-narrativa { font-family:var(--font); font-size:13px; color:var(--ink-light); line-height:1.7; }
  .co-tendencias { list-style:none; padding:0; }
  .co-tendencias li { font-family:var(--font); font-size:13px; color:var(--ink-light); line-height:1.5; padding:3px 0 3px 14px; position:relative; }
  .co-tendencias li::before { content:""; position:absolute; left:0; top:11px; width:4px; height:4px; border-radius:50%; background:var(--accent-warm); }

  .co-date-label { font-family:var(--font); font-size:12px; color:var(--ink-muted); font-weight:500; margin-bottom:8px; margin-top:20px; padding-bottom:6px; border-bottom:1px solid var(--rule); }

  /* ===== SELL SIDE ===== */
  .ss-tabs { display:flex; gap:0; border-bottom:1px solid var(--rule); margin:20px 0 0; }
  .ss-tab { font-family:var(--font); font-size:13px; font-weight:500; padding:10px 16px; cursor:pointer; color:var(--ink-muted); border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.1s; }
  .ss-tab:hover { color:var(--ink); }
  .ss-tab.active { color:var(--ink); border-bottom-color:var(--ink); font-weight:600; }
  .ss-tab .ss-tab-count { font-size:12px; font-weight:400; color:var(--ink-faint); margin-left:3px; }

  .ss-stats { display:flex; gap:0; border-bottom:1px solid var(--rule); padding:16px 0; }
  .ss-stats .dash-cell { background:none; border:none; border-radius:0; flex:1; padding:0 24px; text-align:left; }
  .ss-stats .dash-cell:not(:last-child) { border-right:1px solid var(--rule); }
  .ss-stats .dash-cell:first-child { padding-left:0; }

  .ss-filters { padding:12px 0; border-bottom:none; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ss-pill { font-family:var(--font); font-size:12px; padding:4px 12px; border-radius:4px; font-weight:400; cursor:pointer; transition:background 0.1s; border:none; background:var(--hover); color:var(--ink-muted); }
  .ss-pill:hover { background:var(--rule); color:var(--ink-light); }
  .ss-pill.active { background:var(--ink); color:white; }
  .ss-pill .ss-pill-n { font-weight:400; opacity:0.5; margin-left:2px; }

  .ss-email { padding:8px 10px; margin:0 -10px; border-bottom:1px solid var(--rule-light); border-radius:4px; transition:background 0.1s; }
  .ss-email:last-child { border-bottom:none; }
  .ss-email:hover { background:var(--hover); }
  .ss-row1 { display:flex; align-items:center; gap:6px; }
  .ss-bank { font-family:var(--font); font-size:11px; font-weight:600; color:var(--ink-muted); white-space:nowrap; }
  .ss-time { font-family:var(--mono); font-size:10px; color:var(--ink-faint); margin-left:auto; white-space:nowrap; }
  .ss-oneliner { font-family:var(--font); font-size:13px; color:var(--ink); line-height:1.45; margin:2px 0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ss-row3 { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
  .ss-tags { display:flex; flex-wrap:wrap; gap:3px; }
  .ss-co-tag { font-family:var(--font); font-size:10px; font-weight:500; padding:1px 6px; border-radius:3px; background:var(--s4-bg); color:var(--s4); }
  .ss-type-tag { font-family:var(--font); font-size:10px; font-weight:400; padding:1px 6px; border-radius:3px; background:var(--rule-light); color:var(--ink-muted); }
  .ss-body { font-family:var(--mono); font-size:11px; color:var(--ink-light); line-height:1.5; margin-top:10px; white-space:pre-wrap; max-height:250px; overflow-y:auto; padding:14px; background:var(--hover); border-radius:4px; border:none; }

  .ss-event { display:flex; align-items:center; gap:10px; padding:8px 10px; margin:0 -10px; border-radius:4px; transition:background 0.1s; flex-wrap:nowrap; border:none; background:none; }
  .ss-event:hover { background:var(--hover); }
  .ss-ev-date { font-family:var(--mono); font-size:12px; font-weight:500; color:var(--pinned); white-space:nowrap; min-width:110px; }
  .ss-ev-bank { font-family:var(--font); font-size:12px; font-weight:500; color:var(--ink-muted); white-space:nowrap; }
  .ss-ev-sep { color:var(--ink-faint); margin:0 2px; font-size:12px; }
  .ss-ev-sector { font-family:var(--font); font-size:10px; font-weight:500; padding:1px 6px; border-radius:3px; background:var(--s3-bg); color:var(--s3); white-space:nowrap; }
  .ss-ev-format { font-family:var(--font); font-size:10px; font-weight:500; padding:1px 6px; border-radius:3px; white-space:nowrap; }
  .ss-ev-format.virtual { background:var(--rule-light); color:var(--ink-muted); }
  .ss-ev-format.in-person { background:var(--s4-bg); color:var(--accent-warm); }
  .ss-ev-format.hybrid { background:var(--pinned-bg); color:var(--pinned); }
  .ss-ev-title { font-family:var(--font); font-size:13px; font-weight:400; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .ss-ev-title a { color:var(--ink); text-decoration:underline; text-decoration-color:var(--ink-faint); text-underline-offset:2px; transition:text-decoration-color 0.1s; }
  .ss-ev-title a:hover { text-decoration-color:var(--ink); }

  .ss-date-row { padding:8px 0; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ss-date-pill { font-family:var(--font); font-size:12px; padding:4px 12px; border-radius:4px; cursor:pointer; border:none; background:var(--hover); color:var(--ink-muted); transition:background 0.1s; }
  .ss-date-pill:hover { background:var(--rule); }
  .ss-date-pill.active { background:var(--ink); color:white; }

  /* Floating back-to-top */
  .btt { position:fixed; bottom:24px; right:24px; width:32px; height:32px; border-radius:50%; background:var(--ink); color:white; border:none; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; z-index:50; }
  .btt.show { opacity:0.3; }
  .btt:hover { opacity:1; }

  /* Mobile */
  .mob-menu { display:none; }
  @media(max-width:700px) {
    .navbar { padding:0 16px; }
    .container { padding:0 16px; }
    .masthead { padding:24px 0 8px; }
    .masthead h1 { font-size:24px; }
    .dashboard, .ss-stats { flex-direction:column; gap:0; }
    .dashboard .dash-cell, .ss-stats .dash-cell { padding:10px 0; border-right:none!important; border-bottom:1px solid var(--rule); }
    .dash-num { font-size:24px; }
    .nav-links { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    .nav-link { padding:12px 10px; font-size:12px; }
    .ss-event { flex-wrap:wrap; }
    .ss-ev-title { white-space:normal; }
    .art-headline { font-size:15px; }
    .cal-grid { grid-template-columns:1fr!important; }
    .cal-cell { min-height:auto!important; }
  }

  /* ===== SEARCH ===== */
  .ss-search { padding:10px 0; }
  .ss-search input { font-family:var(--font); font-size:13px; width:100%; padding:8px 12px; border:1px solid var(--rule); border-radius:4px; background:var(--hover); color:var(--ink); outline:none; transition:border-color 0.15s; }
  .ss-search input:focus { border-color:var(--ink-muted); background:var(--paper); }
  .ss-search input::placeholder { color:var(--ink-faint); }

  /* ===== CALENDAR ===== */
  .cal-nav { display:flex; align-items:center; gap:16px; padding:20px 0 12px; }
  .cal-nav-btn { font-family:var(--font); font-size:18px; background:none; border:none; padding:4px 8px; cursor:pointer; color:var(--ink-muted); transition:color 0.1s; line-height:1; }
  .cal-nav-btn:hover { color:var(--ink); }
  .cal-month { font-family:var(--font); font-size:18px; font-weight:600; color:var(--ink); letter-spacing:-0.3px; }
  .cal-filter-wrap { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .cal-filter-search { font-family:var(--font); font-size:12px; padding:6px 10px; border:1px solid var(--rule); border-radius:4px; background:var(--paper); color:var(--ink); width:200px; outline:none; }
  .cal-filter-search:focus { border-color:var(--ink-muted); }
  .cal-filter-search::placeholder { color:var(--ink-faint); }
  .cal-filter-dropdown { position:relative; }
  .cal-filter-list { display:none; position:absolute; right:0; top:100%; margin-top:4px; background:var(--paper); border:1px solid var(--rule); border-radius:6px; box-shadow:0 8px 24px rgba(0,0,0,0.08); max-height:300px; overflow-y:auto; width:240px; z-index:10; padding:4px; }
  .cal-filter-list.open { display:block; }
  .cal-filter-opt { font-family:var(--font); font-size:12px; padding:6px 10px; border-radius:4px; cursor:pointer; color:var(--ink-light); transition:background 0.08s; }
  .cal-filter-opt:hover { background:var(--hover); color:var(--ink); }
  .cal-filter-opt.active { background:var(--ink); color:white; }
  .cal-filter-opt.header { font-size:10px; font-weight:600; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.5px; cursor:default; padding:8px 10px 4px; }
  .cal-filter-opt.header:hover { background:none; }
  .cal-active-filter { font-family:var(--font); font-size:11px; color:var(--ink-muted); padding:4px 10px; background:var(--hover); border-radius:4px; display:flex; align-items:center; gap:6px; }
  .cal-active-filter .cal-clear { cursor:pointer; color:var(--ink-faint); font-size:14px; line-height:1; }
  .cal-active-filter .cal-clear:hover { color:var(--ink); }

  .cal-weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:0; padding:12px 0 0; border-bottom:1px solid var(--rule); }
  .cal-wd { font-family:var(--font); font-size:10px; font-weight:500; color:var(--ink-muted); text-align:left; padding:0 8px 8px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0; }
  .cal-cell { min-height:100px; padding:8px; border-bottom:1px solid var(--rule-light); border-right:1px solid var(--rule-light); transition:background 0.08s; cursor:pointer; }
  .cal-cell:nth-child(7n) { border-right:none; }
  .cal-cell:hover { background:var(--hover); }
  .cal-cell.other-month { opacity:0.25; }
  .cal-cell.today { background:rgba(105,64,165,0.04); }
  .cal-cell.today .cal-day { color:var(--pinned); }
  .cal-cell.selected { background:var(--hover); }
  .cal-day { font-family:var(--font); font-size:12px; font-weight:500; color:var(--ink); margin-bottom:4px; }
  .cal-dots { display:flex; gap:2px; margin-bottom:3px; }
  .cal-dot { display:inline-block; width:5px; height:5px; border-radius:50%; }
  .cal-dot.email { background:var(--ink-faint); }
  .cal-dot.event { background:var(--pinned); }
  .cal-dot.idate { background:var(--accent-warm); }
  .cal-item { font-family:var(--font); font-size:10px; color:var(--ink-light); line-height:1.35; padding:1px 3px; margin:1px 0; border-radius:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cal-item.ev { background:rgba(105,64,165,0.08); color:var(--pinned); }
  .cal-item.id { background:rgba(203,145,47,0.1); color:var(--accent-warm); }
  .cal-item.em { background:var(--rule-light); color:var(--ink-muted); }
  .cal-detail { margin-top:16px; padding:20px; background:var(--hover); border-radius:8px; }
  .cal-detail-title { font-family:var(--font); font-size:15px; font-weight:600; color:var(--ink); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--rule); }
  .cal-detail-item { font-family:var(--font); font-size:13px; color:var(--ink-light); padding:8px 0; border-bottom:1px solid var(--rule-light); display:flex; align-items:baseline; gap:8px; }
  .cal-detail-item:last-child { border-bottom:none; }
  .cal-detail-type { font-size:10px; font-weight:600; padding:1px 6px; border-radius:3px; white-space:nowrap; }

  /* ===== TRENDS ===== */
  .trend-row { display:flex; align-items:center; gap:8px; padding:6px 0; }
  .trend-label { font-family:var(--font); font-size:12px; color:var(--ink-light); min-width:110px; text-align:right; }
  .trend-bar-wrap { flex:1; height:20px; background:var(--rule-light); border-radius:3px; overflow:hidden; }
  .trend-bar { height:100%; border-radius:3px; transition:width 0.3s; }
  .trend-count { font-family:var(--mono); font-size:11px; color:var(--ink-muted); min-width:28px; }
  .trend-day { font-family:var(--font); font-size:11px; font-weight:500; color:var(--ink-muted); padding:12px 0 4px; }
</style>
</head>
<body>

<!-- NAV -->
<nav class="navbar">
  <span class="nav-brand">Tork Capital</span>
  <div class="nav-links">
    <a class="nav-link active" data-v="today" onclick="go('today')">Hoje</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="sellside" onclick="go('sellside')">Sell Side</a>
    <a class="nav-link" data-v="calendar" onclick="go('calendar')">Calendar</a>
    <a class="nav-link" data-v="trends" onclick="go('trends')">Trends</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-v="archive" onclick="go('archive')">Arquivo</a>
    <div class="nav-sep"></div>
    <a class="nav-link" data-co="Meta" onclick="go('co','Meta')">Meta</a>
    <a class="nav-link" data-co="Nvidia" onclick="go('co','Nvidia')">Nvidia</a>
    <a class="nav-link" data-co="Amazon" onclick="go('co','Amazon')">Amazon</a>
    <a class="nav-link" data-co="OpenAI" onclick="go('co','OpenAI')">OpenAI</a>
    <a class="nav-link" data-co="Microsoft" onclick="go('co','Microsoft')">Microsoft</a>
    <a class="nav-link" data-co="TSMC" onclick="go('co','TSMC')">TSMC</a>
    <a class="nav-link" data-co="Anthropic" onclick="go('co','Anthropic')">Anthropic</a>
    <a class="nav-link" data-co="Google" onclick="go('co','Google')">Google</a>
  </div>
</nav>

<div class="container">
  <div class="masthead">
    <h1 id="pg-title">YouTube Digest</h1>
    <p class="edition" id="pg-meta"></p>
  </div>

  <div id="dash-area"></div>
  <div id="datepick-area" style="display:none"><div class="datepick"><select id="datesel" onchange="loadDate(this.value)"></select></div></div>
  <div id="out"></div>

  <div class="footer">
    <hr class="ft-rule"/>
    <p>Gerado com Gemini AI · YouTube Data API</p>
    <p style="margin-top:4px">Tork Capital Research</p>
  </div>
</div>

<button class="btt" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#9650;</button>

<script>
const CORE=['Meta','META','Nvidia','NVDA','Amazon','AMZN','OpenAI','Microsoft','MSFT','TSMC','TSM','Anthropic','Google','GOOGL'];
const CORE_NAMES=['Meta','Nvidia','Amazon','OpenAI','Microsoft','TSMC','Anthropic','Google'];
const SL={5:'CORE',4:'ADJ',3:'REL',2:'TAN',1:'CTX'};
const ALIAS={'Meta':['Meta','META'],'Nvidia':['Nvidia','NVDA'],'Amazon':['Amazon','AMZN','AWS'],'OpenAI':['OpenAI','GPT','ChatGPT'],'Microsoft':['Microsoft','MSFT','Azure','Copilot'],'TSMC':['TSMC','TSM'],'Anthropic':['Anthropic','Claude'],'Google':['Google','GOOGL','Alphabet','Gemini','DeepMind']};
const SC={5:'var(--s5)',4:'var(--s4)',3:'var(--s3)',2:'var(--s2)',1:'var(--s1)'};

let D={},DL=[],SS={},SSL=[];
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('show',window.scrollY>300)});

async function init(){
  try{const r=await fetch('data/manifest.json?t='+Date.now());DL=await r.json()}catch(e){DL=[]}
  for(const d of DL){try{const r=await fetch('data/'+d+'.json?t='+Date.now());D[d]=await r.json()}catch(e){}}
  // Load sell-side data
  try{const r=await fetch('data/sellside_manifest.json?t='+Date.now());SSL=await r.json()}catch(e){SSL=[]}
  for(const d of SSL){try{const r=await fetch('data/sellside_'+d+'.json?t='+Date.now());SS[d]=await r.json()}catch(e){}}
  const s=document.getElementById('datesel');
  DL.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;s.appendChild(o)});
  go('today');
}

function e(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function eLinks(s){if(!s)return'';let t=e(s);t=t.replace(/https?:\/\/[^\s<]+/g,function(raw){const url=raw.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/[).,;:!?\]}>]+$/,'');const display=url.length>70?url.substring(0,67)+'...':url;return'<a href="'+url.replace(/"/g,'%22')+'" target="_blank" rel="noopener" style="color:var(--blue-muted);text-decoration:underline;text-decoration-color:var(--ink-faint);text-underline-offset:2px;word-break:break-all">'+e(display)+'</a>'});return t}

function go(v,co){
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  const sel=co?`.nav-link[data-co="${co}"]`:`.nav-link[data-v="${v}"]`;
  document.querySelector(sel)?.classList.add('active');
  document.getElementById('datepick-area').style.display=v==='archive'?'block':'none';
  if(v==='today'){const l=DL[0];if(l&&D[l])renderDay(D[l],l);else{document.getElementById('pg-title').textContent='YouTube Digest';document.getElementById('pg-meta').textContent='';document.getElementById('dash-area').innerHTML='';document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum digest disponivel.</p>'}}
  else if(v==='sellside'){renderSellSide()}
  else if(v==='calendar'){renderCalendar()}
  else if(v==='trends'){renderTrends()}
  else if(v==='archive'){loadDate(document.getElementById('datesel').value||DL[0])}
  else if(v==='co'){renderCo(co)}
}
function loadDate(d){if(D[d])renderDay(D[d],d)}

function renderDay(data,date){
  const all=[...data.daily_brief,...data.summaries];
  const tot=all.length+data.skipped.length;
  document.getElementById('pg-title').textContent='YouTube Digest';
  document.getElementById('pg-meta').textContent=date+' · '+all.length+' resumos de '+tot+' videos';

  // Dashboard
  const mentioned=new Set();
  all.forEach(s=>{(s.empresas||[]).forEach(emp=>{CORE_NAMES.forEach(cn=>{if((ALIAS[cn]||[cn]).some(a=>emp.toLowerCase().includes(a.toLowerCase())))mentioned.add(cn)})})});
  const topVideo=data.summaries.sort((a,b)=>(b.relevancia||1)-(a.relevancia||1))[0];

  let dash='<div class="dashboard">';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--ink)">'+all.length+'</div><div class="dash-label">Videos hoje</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--accent)">'+mentioned.size+'</div><div class="dash-label">Holdings citadas</div></div>';
  const topScore=topVideo?Math.min(Math.max(topVideo.relevancia||1,1),5):0;
  dash+='<div class="dash-cell"><div class="dash-num" style="color:'+SC[topScore]+'">'+topScore+'/5</div><div class="dash-label">Maior relevancia</div></div>';
  dash+='</div>';

  dash+='<div class="holdings-bar"><span class="holdings-label">Core:</span>';
  CORE_NAMES.forEach(cn=>{
    const m=mentioned.has(cn);
    dash+='<a class="holding-pill '+(m?'mentioned':'quiet')+'" onclick="go(\'co\',\''+cn+'\')">'+cn+'</a>';
  });
  dash+='</div>';
  document.getElementById('dash-area').innerHTML=dash;

  // Sort summaries
  data.summaries.sort((a,b)=>(b.relevancia||1)-(a.relevancia||1));

  let h='';
  // Index
  h+='<div class="section-header"><span class="section-title">Neste Digest</span><hr class="section-rule"/></div>';
  h+='<div class="index">';
  let idx=0;
  data.daily_brief.forEach(s=>{
    const ti=e(s.titulo_formatado||s.title||'AI Daily Brief');
    let tags='';(s.empresas||[]).slice(0,5).forEach(x=>{tags+='<span class="t t-pin">'+e(x)+'</span>'});
    const br=(s.temas_episodio||[]).slice(0,3).join(', ');const brief=br.length>130?br.substring(0,130)+'...':br;
    h+='<a href="#a'+idx+'" class="idx-entry pinned"><div class="idx-row1"><span class="idx-title">'+ti+'</span></div><div class="idx-tags">'+tags+'</div>'+(brief?'<div class="idx-brief">'+e(brief)+'</div>':'')+'</a>';
    idx++;
  });
  data.summaries.forEach(s=>{
    const sc=Math.min(Math.max(s.relevancia||1,1),5);
    let tags='';if(s.duration_label)tags+='<span class="t t-dur">'+s.duration_label+'</span>';
    const emp=s.empresas||[];const ct=emp.filter(x=>CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
    const ot=emp.filter(x=>!CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
    [...ct,...ot].slice(0,4).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="t '+(ic?'t-core t-'+sc:'t-def')+'">'+e(x)+'</span>'});
    let vis=s.visao_geral||'';if(vis.length>150)vis=vis.substring(0,150)+'...';
    h+='<a href="#a'+idx+'" class="idx-entry"><div class="idx-row1"><span class="idx-title">'+e(s.title)+'</span><span class="idx-score" style="color:'+SC[sc]+'">'+sc+'/5</span></div><div class="idx-tags">'+tags+'</div>'+(vis?'<div class="idx-brief">'+e(vis)+'</div>':'')+'</a>';
    idx++;
  });
  h+='</div>';

  // Articles
  idx=0;
  if(data.daily_brief.length){
    h+='<div class="section-header"><span class="section-title">AI Daily Brief</span><hr class="section-rule"/></div>';
    data.daily_brief.forEach(s=>{h+=dbArticle(s,'a'+idx);idx++});
  }
  if(data.summaries.length){
    h+='<div class="section-header"><span class="section-title">Videos</span><hr class="section-rule"/></div>';
    data.summaries.forEach(s=>{h+=vidArticle(s,'a'+idx);idx++});
  }
  if(data.skipped.length){
    h+='<div class="section-header"><span class="section-title">Sem Resumo</span><hr class="section-rule"/></div>';
    h+='<div class="skipped">';data.skipped.forEach(v=>{h+='<p style="margin:4px 0"><a href="'+v.url+'" target="_blank">'+e(v.title)+'</a> <span style="color:var(--ink-faint)">— '+e(v.channel)+'</span></p>'});h+='</div>';
  }
  document.getElementById('out').innerHTML=h;
}

function renderCo(company){
  document.getElementById('pg-title').textContent=company;
  const terms=ALIAS[company]||[company];

  // Collect all briefs and videos for this company
  let briefs=[];  // {date, brief}
  let m=[];       // videos
  DL.forEach(date=>{
    const data=D[date];if(!data)return;
    // Get company brief if exists
    const cb=(data.company_briefs||{})[company];
    if(cb)briefs.push({date:date,brief:cb});
    // Get videos
    [...data.daily_brief,...data.summaries].forEach(s=>{
      const emp=(s.empresas||[]).join(' ').toLowerCase();
      const ti=(s.title||s.titulo_formatado||'').toLowerCase();
      if(terms.some(t=>emp.includes(t.toLowerCase())||ti.includes(t.toLowerCase())))
        m.push({...s,_d:date});
    });
  });
  m.sort((a,b)=>b._d.localeCompare(a._d)||(b.relevancia||0)-(a.relevancia||0));
  document.getElementById('pg-meta').textContent=m.length+' videos · '+briefs.length+' dias de analise';
  document.getElementById('dash-area').innerHTML='';

  let h='';
  if(!m.length&&!briefs.length){h='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum video mencionando '+company+'.</p>'}
  else{
    // Company briefs by date
    if(briefs.length){
      briefs.forEach((item,bi)=>{
        const b=item.brief;
        const impactClass=b.impacto_tese==='bullish'?'bullish':(b.impacto_tese==='bearish'?'bearish':'neutral');
        const impactLabel=b.impacto_tese==='bullish'?'BULLISH':(b.impacto_tese==='bearish'?'BEARISH':'NEUTRO');

        h+='<p class="co-date-label">'+item.date+'</p>';
        h+='<div class="co-brief">';
        h+='<div class="co-brief-header"><span class="co-brief-title">'+company+'</span><span class="co-impact '+impactClass+'">'+impactLabel+'</span></div>';

        // Resumo do dia
        h+='<div class="co-section"><p class="co-section-label">Resumo do Dia</p><p class="co-resumo">'+e(b.resumo_dia)+'</p></div>';

        // Impacto na tese
        if(b.impacto_detalhes&&b.impacto_detalhes.length){
          h+='<div class="co-section"><p class="co-section-label">Impacto na Tese</p><ul class="co-impacts">';
          b.impacto_detalhes.forEach(d=>{h+='<li>'+e(d)+'</li>'});
          h+='</ul></div>';
        }

        // Narrativa
        if(b.narrativa){
          h+='<div class="co-section"><p class="co-section-label">Evolucao da Narrativa</p><p class="co-narrativa">'+e(b.narrativa)+'</p></div>';
        }

        // Tendencias
        if(b.tendencias&&b.tendencias.length){
          h+='<div class="co-section"><p class="co-section-label">Tendencias</p><ul class="co-tendencias">';
          b.tendencias.forEach(t=>{h+='<li>'+e(t)+'</li>'});
          h+='</ul></div>';
        }
        h+='</div>';
      });
    }

    // Video index
    if(m.length){
      h+='<div class="section-header" style="margin-top:8px"><span class="section-title">'+m.length+' Videos</span><hr class="section-rule"/></div><div class="index">';
      m.forEach((s,i)=>{
        const isDB=!!(s.noticias_principais);
        const ti=isDB?e(s.titulo_formatado||s.title||'Daily Brief'):e(s.title);
        const sc=Math.min(Math.max(s.relevancia||1,1),5);
        let tags='<span class="t t-dur">'+s._d+'</span>';
        (s.empresas||[]).slice(0,3).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="t '+(isDB?'t-pin':(ic?'t-core t-'+sc:'t-def'))+'">'+e(x)+'</span>'});
        let vis=isDB?(s.temas_episodio||[]).slice(0,3).join(', '):(s.visao_geral||'');if(vis.length>140)vis=vis.substring(0,140)+'...';
        h+='<a href="#c'+i+'" class="idx-entry'+(isDB?' pinned':'')+'"><div class="idx-row1"><span class="idx-title">'+ti+'</span>'+(isDB?'':'<span class="idx-score" style="color:'+SC[sc]+'">'+sc+'/5</span>')+'</div><div class="idx-tags">'+tags+'</div>'+(vis?'<div class="idx-brief">'+e(vis)+'</div>':'')+'</a>';
      });
      h+='</div>';
      h+='<div class="section-header"><span class="section-title">Detalhes</span><hr class="section-rule"/></div>';
      m.forEach((s,i)=>{
        const dt='<span class="t t-dur">'+s._d+'</span>';
        if(s.noticias_principais){h+=dbArticle(s,'c'+i,dt)}else{h+=vidArticle(s,'c'+i,dt)}
      });
    }
  }
  document.getElementById('out').innerHTML=h;
}

function vidArticle(s,id,extraTag){
  const sc=Math.min(Math.max(s.relevancia||1,1),5);
  const av=s.channel_thumb?'<img src="'+s.channel_thumb+'" class="art-av"/>':'';
  let tags='';if(s.duration_label)tags+='<span class="t t-dur">'+s.duration_label+'</span>';
  if(extraTag)tags+=extraTag;
  const emp=s.empresas||[];const ct=emp.filter(x=>CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
  const ot=emp.filter(x=>!CORE.some(c=>x.toLowerCase().includes(c.toLowerCase())));
  [...ct,...ot].slice(0,5).forEach(x=>{const ic=CORE.some(c=>x.toLowerCase().includes(c.toLowerCase()));tags+='<span class="t '+(ic?'t-core t-'+sc:'t-def')+'">'+e(x)+'</span>'});
  let pts='';(s.pontos||[]).slice(0,6).forEach(p=>{pts+='<li>'+e(p)+'</li>'});
  const dl=s.has_transcript&&s.transcript_file?'<a class="dl-link" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>↓ Transcript</a>':'';
  const muted=sc<=2?' muted':'';
  return '<div id="'+id+'" class="article s'+sc+muted+'">'
    +'<div class="art-meta"><span class="art-channel">'+av+e(s.channel)+'</span><span class="art-badge b'+sc+'">'+sc+'/5 '+SL[sc]+'</span></div>'
    +'<div class="art-tags">'+tags+'</div>'
    +'<div class="art-headline"><a href="'+s.url+'" target="_blank">'+e(s.title)+'</a></div>'
    +(s.visao_geral?'<p class="art-visao">'+e(s.visao_geral)+'</p>':'')
    +'<details><summary>Principais pontos</summary><ul class="pts">'+pts+'</ul></details>'
    +'<div class="art-foot"><span class="art-motivo">'+e(s.motivo_relevancia||'')+'</span>'+dl+'</div>'
    +'</div>';
}

function dbArticle(s,id,extraTag){
  const ti=s.titulo_formatado||s.title||'AI Daily Brief';
  let tags='';if(s.duration_label)tags+='<span class="t t-dur">'+s.duration_label+'</span>';
  if(extraTag)tags+=extraTag;
  (s.empresas||[]).slice(0,6).forEach(x=>{tags+='<span class="t t-pin">'+e(x)+'</span>'});
  let temas='';(s.temas_episodio||[]).forEach(t=>{temas+='<li>'+e(t)+'</li>'});
  let news='';(s.noticias_principais||[]).forEach(n=>{news+='<p class="db-hl">'+e(n.manchete)+'</p><ul class="db-ul">';(n.contexto||[]).slice(0,5).forEach(b=>{news+='<li>'+e(b)+'</li>'});news+='</ul>'});
  let deep='';(s.temas_principais||[]).forEach(tp=>{deep+='<p class="db-hl">'+e(tp.tema)+'</p><ul class="db-ul">';(tp.analise||[]).slice(0,10).forEach(b=>{deep+='<li>'+e(b)+'</li>'});deep+='</ul>'});
  const dl=s.has_transcript&&s.transcript_file?'<a class="dl-link" href="transcripts/'+encodeURIComponent(s.transcript_file)+'" download>↓ Transcript</a>':'';
  return '<div id="'+id+'" class="article pin">'
    +'<div class="art-meta"><span class="art-channel" style="color:var(--pinned);font-weight:600">The AI Daily Brief</span><span class="art-badge bp">PINNED</span></div>'
    +'<div class="art-tags">'+tags+'</div>'
    +'<div class="art-headline"><a href="'+(s.url||'#')+'" target="_blank">'+e(ti)+'</a></div>'
    +'<details><summary><span class="db-sec" style="margin:0">Temas do Episodio</span></summary><ul class="pts">'+temas+'</ul></details>'
    +'<details><summary><span class="db-sec" style="margin:0">1) Noticias Principais</span></summary>'+news+'</details>'
    +'<hr class="db-hr"/>'
    +'<details><summary><span class="db-sec" style="margin:0">2) Temas Principais</span></summary>'+deep+'</details>'
    +'<div class="art-foot"><span></span>'+dl+'</div>'
    +'</div>';
}

// ===== SELL SIDE =====
let ssFilter='all',ssBank='all',ssTab='research',ssDate='',ssSearch='';

function renderSellSide(opts){
  opts=opts||{};
  if(opts.date)ssDate=opts.date;
  if(opts.tab)ssTab=opts.tab;
  if(opts.sector!==undefined)ssFilter=opts.sector;
  if(opts.bank!==undefined)ssBank=opts.bank;

  const date=ssDate||SSL[0];
  ssDate=date;
  const data=date?SS[date]:null;
  document.getElementById('pg-title').textContent='Sell Side';
  document.getElementById('datepick-area').style.display='none';

  if(!data||(!data.emails.length&&!(data.events||[]).length)){
    document.getElementById('pg-meta').textContent='';
    document.getElementById('dash-area').innerHTML='';
    document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">Nenhum email sell-side disponivel.</p>';
    return;
  }

  const emails=data.emails||[];
  const events=data.events||[];
  const stats=data.stats||{};

  document.getElementById('pg-meta').textContent=date+' · '+emails.length+' research · '+events.length+' eventos';

  // Stats + tabs + filters
  let dash='<div class="ss-stats">';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--ink)">'+emails.length+'</div><div class="dash-label">Emails</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--accent)">'+(stats.sectors||0)+'</div><div class="dash-label">Setores</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--green)">'+(stats.banks||0)+'</div><div class="dash-label">Bancos</div></div>';
  dash+='<div class="dash-cell"><div class="dash-num" style="color:var(--pinned)">'+events.length+'</div><div class="dash-label">Eventos</div></div>';
  dash+='</div>';

  // Sub-tabs: Research | Events
  dash+='<div class="ss-tabs">';
  const idates=data.important_dates||[];
  dash+='<div class="ss-tab'+(ssTab==='research'?' active':'')+'" onclick="renderSellSide({tab:\'research\'})">Research<span class="ss-tab-count">'+emails.length+'</span></div>';
  dash+='<div class="ss-tab'+(ssTab==='events'?' active':'')+'" onclick="renderSellSide({tab:\'events\'})">Eventos<span class="ss-tab-count">'+events.length+'</span></div>';
  dash+='<div class="ss-tab'+(ssTab==='dates'?' active':'')+'" onclick="renderSellSide({tab:\'dates\'})">Datas<span class="ss-tab-count">'+idates.length+'</span></div>';
  dash+='</div>';

  // Date pills
  if(SSL.length>1){
    dash+='<div class="ss-date-row">';
    SSL.forEach(d=>{
      dash+='<span class="ss-date-pill'+(d===date?' active':'')+'" onclick="renderSellSide({date:\''+d+'\'})">'+d+'</span>';
    });
    dash+='</div>';
  }

  // Filters
  {
    dash+='<div class="ss-filters">';
    if(ssTab==='dates'){
      // Type filters for important dates
      const types={};
      idates.forEach(d=>{const t=d.type||'other';types[t]=(types[t]||0)+1});
      const sorted=Object.entries(types).sort((a,b)=>b[1]-a[1]);
      dash+='<span class="ss-pill'+(ssFilter==='all'?' active':'')+'" onclick="renderSellSide({sector:\'all\'})">All<span class="ss-pill-n"> '+idates.length+'</span></span>';
      sorted.forEach(([t,c])=>{
        dash+='<span class="ss-pill'+(ssFilter===t?' active':'')+'" onclick="renderSellSide({sector:\''+t+'\'})">'+e(t)+'<span class="ss-pill-n"> '+c+'</span></span>';
      });
    } else {
      // Sector filters for research and events
      const items=ssTab==='events'?events:emails;
      const sectors={};
      items.forEach(em=>{const s=em.sector||'Other';sectors[s]=(sectors[s]||0)+1});
      const sorted=Object.entries(sectors).sort((a,b)=>b[1]-a[1]);
      dash+='<span class="ss-pill'+(ssFilter==='all'?' active':'')+'" onclick="renderSellSide({sector:\'all\'})">All<span class="ss-pill-n"> '+items.length+'</span></span>';
      sorted.forEach(([s,c])=>{
        const esc=s.replace(/'/g,"\\'");
        dash+='<span class="ss-pill'+(ssFilter===s?' active':'')+'" onclick="renderSellSide({sector:\''+esc+'\'})">'+e(s)+'<span class="ss-pill-n"> '+c+'</span></span>';
      });
    }
    dash+='</div>';

    // Bank filters
    if(ssTab==='research'||ssTab==='events'){
      const bankItems=ssTab==='events'?events:emails;
      const banks={};
      bankItems.forEach(em=>{const b=em.sender_bank||em.sender||'Other';banks[b]=(banks[b]||0)+1});
      const sortedBanks=Object.entries(banks).sort((a,b)=>b[1]-a[1]);
      dash+='<div class="ss-filters">';
      dash+='<span class="ss-pill'+(ssBank==='all'?' active':'')+'" onclick="renderSellSide({bank:\'all\'})">All Banks<span class="ss-pill-n"> '+bankItems.length+'</span></span>';
      sortedBanks.forEach(([b,c])=>{
        const esc=b.replace(/'/g,"\\'");
        dash+='<span class="ss-pill'+(ssBank===b?' active':'')+'" onclick="renderSellSide({bank:\''+esc+'\'})">'+e(b)+'<span class="ss-pill-n"> '+c+'</span></span>';
      });
      dash+='</div>';
    }
  }

  document.getElementById('dash-area').innerHTML=dash;

  let h='';

  if(ssTab==='events'){
    const now=new Date();
    // Filter by sector, remove past events
    let filtEv=events;
    if(ssFilter!=='all') filtEv=filtEv.filter(ev=>(ev.sector||'Other')===ssFilter);
    if(ssBank!=='all') filtEv=filtEv.filter(ev=>(ev.sender_bank||ev.sender||'Other')===ssBank);
    filtEv=filtEv.filter(ev=>{
        if(!ev.event_date)return true; // keep TBD
        const d=new Date(ev.event_date.replace(' ','T'));
        return isNaN(d)||d>=now;
      });
    // Sort chronologically — closest upcoming first, TBD at end
    filtEv.sort((a,b)=>{
      const da=a.event_date?new Date(a.event_date.replace(' ','T')):null;
      const db=b.event_date?new Date(b.event_date.replace(' ','T')):null;
      if(!da&&!db)return 0;
      if(!da)return 1;
      if(!db)return -1;
      return da-db;
    });

    if(!filtEv.length){
      h+='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Nenhum evento futuro encontrado.</p>';
    } else {
      h+='<div style="padding-top:4px">';
      filtEv.forEach(ev=>{
        // Format date as DD/Mon/YY HH:MM
        let dateStr='TBD';
        if(ev.event_date){
          const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
          const d=new Date(ev.event_date.replace(' ','T'));
          if(!isNaN(d)){dateStr=String(d.getDate()).padStart(2,'0')+'/'+months[d.getMonth()]+'/'+String(d.getFullYear()).slice(2)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
        }
        const title=ev.event_short_title||ev.one_liner||ev.subject;

        h+='<div class="ss-event">';
        h+='<span class="ss-ev-date">'+e(dateStr)+'</span>';
        h+='<span class="ss-ev-sep">-</span>';
        h+='<span class="ss-ev-bank">'+e(ev.sender_bank||ev.sender)+'</span>';
        h+='<span class="ss-ev-sep">-</span>';
        if(ev.event_link){
          h+='<span class="ss-ev-title"><a href="'+ev.event_link+'" target="_blank">'+e(title)+'</a></span>';
        } else {
          h+='<span class="ss-ev-title">'+e(title)+'</span>';
        }
        if(ev.sector) h+='<span class="ss-ev-sector">'+e(ev.sector)+'</span>';
        h+='</div>';
      });
      h+='</div>';
    }
  } else if(ssTab==='dates'){
    // Important Dates view
    const now=new Date();
    let filtDates=idates.filter(d=>{
      if(!d.date)return true;
      const dt=new Date(d.date);
      return isNaN(dt)||dt>=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    });
    // Filter by type if sector filter is used for type filtering
    if(ssFilter!=='all') filtDates=filtDates.filter(d=>(d.type||'other')===ssFilter);
    // Sort by date
    filtDates.sort((a,b)=>{
      const da=a.date?new Date(a.date):null;
      const db=b.date?new Date(b.date):null;
      if(!da&&!db)return 0;
      if(!da)return 1;
      if(!db)return -1;
      return da-db;
    });

    if(!filtDates.length){
      h+='<p style="text-align:center;padding:40px 0;color:var(--ink-faint)">Nenhuma data importante encontrada.</p>';
    } else {
      h+='<div style="padding-top:4px">';
      filtDates.forEach(d=>{
        const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        let dateStr='TBD';
        if(d.date){
          const dt=new Date(d.date);
          if(!isNaN(dt))dateStr=String(dt.getDate()).padStart(2,'0')+'/'+months[dt.getMonth()]+'/'+String(dt.getFullYear()).slice(2);
        }
        const typeColors={earnings:'var(--s4)',auction:'var(--pinned)',conference:'var(--blue-muted)',ipo:'var(--green)',dividend:'var(--green)',regulatory:'var(--s5)',macro:'var(--s5)',other:'var(--ink-muted)'};
        const typeBgs={earnings:'var(--s4-bg)',auction:'var(--pinned-bg)',conference:'rgba(82,125,165,0.1)',ipo:'var(--s3-bg)',dividend:'var(--s3-bg)',regulatory:'var(--s5-bg)',macro:'var(--s5-bg)',other:'var(--rule-light)'};
        const tp=d.type||'other';
        h+='<div class="ss-event">';
        h+='<span class="ss-ev-date" style="min-width:80px">'+e(dateStr)+'</span>';
        h+='<span style="font-family:var(--font);font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;background:'+typeBgs[tp]+';color:'+typeColors[tp]+';white-space:nowrap">'+e(tp)+'</span>';
        h+='<span class="ss-ev-title">'+e(d.description)+'</span>';
        if(d.companies&&d.companies.length){
          d.companies.slice(0,3).forEach(c=>{h+='<span class="ss-co-tag">'+e(c)+'</span>'});
        }
        if(d.sector) h+='<span class="ss-ev-sector">'+e(d.sector)+'</span>';
        h+='</div>';
      });
      h+='</div>';
    }
  } else {
    // Research view — flat list, filtered by sector + search
    h+='<div class="ss-search"><input id="ss-search-input" type="text" placeholder="Search emails — bank, company, keyword..." value="'+e(ssSearch)+'"/></div>';
    let filtered=emails;
    if(ssFilter!=='all') filtered=filtered.filter(em=>(em.sector||'Other')===ssFilter);
    if(ssBank!=='all') filtered=filtered.filter(em=>(em.sender_bank||em.sender||'Other')===ssBank);
    if(ssSearch){
      const q=ssSearch.toLowerCase();
      filtered=filtered.filter(em=>{
        return (em.one_liner||'').toLowerCase().includes(q)||
          (em.subject||'').toLowerCase().includes(q)||
          (em.sender_bank||'').toLowerCase().includes(q)||
          (em.sender||'').toLowerCase().includes(q)||
          (em.companies||[]).some(c=>c.toLowerCase().includes(q));
      });
    }

    h+='<div id="ss-email-list">';
    if(!filtered.length){
      h+='<p style="text-align:center;padding:20px 0;color:var(--ink-faint)">No results.</p>';
    } else {
      filtered.forEach(em=>{h+=renderSSEmail(em)});
    }
    h+='</div>';
  }

  document.getElementById('out').innerHTML=h;

  // Bind search without re-rendering the whole page
  const si=document.getElementById('ss-search-input');
  if(si){
    si.addEventListener('input',function(){
      ssSearch=this.value;
      const curPos=this.selectionStart;
      // Only re-render the email list, not the whole page
      const data=SS[ssDate];if(!data)return;
      let emails=data.emails||[];
      let filt=emails;
      if(ssFilter!=='all') filt=filt.filter(em=>(em.sector||'Other')===ssFilter);
      if(ssBank!=='all') filt=filt.filter(em=>(em.sender_bank||em.sender||'Other')===ssBank);
      if(ssSearch){
        const q=ssSearch.toLowerCase();
        filt=filt.filter(em=>(em.one_liner||'').toLowerCase().includes(q)||(em.subject||'').toLowerCase().includes(q)||(em.sender_bank||'').toLowerCase().includes(q)||(em.sender||'').toLowerCase().includes(q)||(em.companies||[]).some(c=>c.toLowerCase().includes(q)));
      }
      // Re-render only the email list container
      const listEl=document.getElementById('ss-email-list');
      if(listEl){
        let lh='';
        if(!filt.length){lh='<p style="text-align:center;padding:20px 0;color:var(--ink-faint)">No results.</p>'}
        else{filt.forEach(em=>{lh+=renderSSEmail(em)})}
        listEl.innerHTML=lh;
      }
      // Keep focus
      this.focus();
      this.selectionStart=this.selectionEnd=curPos;
    });
  }
}

function renderSSEmail(em){
  let h='<div class="ss-email">';
  // Line 1: Bank + tags + time
  h+='<div class="ss-row1">';
  h+='<span class="ss-bank">'+e(em.sender_bank||em.sender)+'</span>';
  (em.companies||[]).slice(0,5).forEach(c=>{h+='<span class="ss-co-tag">'+e(c)+'</span>'});
  if(em.type&&em.type!=='other') h+='<span class="ss-type-tag">'+e(em.type)+'</span>';
  h+='<span class="ss-time">'+e(em.received_time)+'</span>';
  h+='</div>';
  // Line 2: One-liner
  h+='<div class="ss-oneliner">'+e(em.one_liner||em.subject)+'</div>';
  // Line 3: Links + expand
  if(em.body){
    const bodyText=em.body||'';
    const linkRx=/https?:\/\/[^\s<>")\]]+/g;
    const rawLinks=(bodyText.match(linkRx)||[]);
    const noise=/wf\/open|url8477|urldefense|unsubscribe|\.png|\.jpg|\.gif|\.jpeg|sendgrid|mailchimp|click\.|open\?upn|pixel|tracking|beacon|assets\/20|mailing.*distribution|extelinsights.*voting|Disclaimers|Overview\.aspx/i;
    const seen=new Set();
    const keyLinks=rawLinks.filter(l=>{if(noise.test(l))return false;const norm=l.replace(/[?#].*$/,'');if(seen.has(norm))return false;seen.add(norm);return true}).slice(0,4);
    h+='<div class="ss-row3">';
    keyLinks.forEach(l=>{let label='Link';if(/\.pdf/i.test(l))label='PDF';else if(/zoom|teams|webinar/i.test(l))label='Call';else if(/report|research|matrix|eqr|article/i.test(l))label='Report';else if(/jotform|register|signup/i.test(l))label='Register';h+='<a href="'+l+'" target="_blank" rel="noopener" style="font-family:var(--font);font-size:10px;color:var(--ink-light);text-decoration:none;font-weight:500;padding:2px 6px;background:var(--hover);border-radius:3px">'+label+'</a>'});
    h+='<details style="margin:0;flex:1"><summary style="padding:2px 0;font-size:10px">Email completo</summary><div class="ss-body">'+eLinks((bodyText).substring(0,3000))+'</div></details>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

// ===== CALENDAR =====
let calMonth=new Date().getMonth(), calYear=new Date().getFullYear(), calFilter='', calDetail=null, calSearchOpen=false, calSearchQ='';

function getAllSSItems(){
  let items={emails:[],events:[],dates:[]};
  SSL.forEach(d=>{
    const data=SS[d];if(!data)return;
    (data.emails||[]).forEach(em=>items.emails.push({...em,_src:d}));
    (data.events||[]).forEach(ev=>items.events.push({...ev,_src:d}));
    (data.important_dates||[]).forEach(id=>items.dates.push({...id,_src:d}));
  });
  return items;
}

function renderCalendar(opts){
  opts=opts||{};
  if(opts.month!==undefined){calMonth=opts.month;calYear=opts.year;}
  if(opts.filter!==undefined){calFilter=opts.filter;calSearchQ='';calSearchOpen=false;}
  if(opts.detail!==undefined)calDetail=calDetail===opts.detail?null:opts.detail;

  document.getElementById('pg-title').textContent='Calendar';
  document.getElementById('pg-meta').textContent='';
  document.getElementById('datepick-area').style.display='none';
  document.getElementById('dash-area').innerHTML='';

  const items=getAllSSItems();
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const wdays=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Build filter options
  const allCos=new Set();
  const allSectors=new Set();
  [items.emails,items.events,items.dates].forEach(arr=>arr.forEach(x=>{(x.companies||[]).forEach(c=>allCos.add(c));allSectors.add(x.sector||'Other')}));

  let h='';
  const pm=calMonth===0?11:calMonth-1, py=calMonth===0?calYear-1:calYear;
  const nm=calMonth===11?0:calMonth+1, ny=calMonth===11?calYear+1:calYear;

  h+='<div class="cal-nav">';
  h+='<button class="cal-nav-btn" onclick="renderCalendar({month:'+pm+',year:'+py+'})">&#8249;</button>';
  h+='<span class="cal-month">'+months[calMonth]+' '+calYear+'</span>';
  h+='<button class="cal-nav-btn" onclick="renderCalendar({month:'+nm+',year:'+ny+'})">&#8250;</button>';

  // Filter area
  h+='<div class="cal-filter-wrap">';
  if(calFilter){
    const label=calFilter.startsWith('sector:')?calFilter.slice(7):calFilter.slice(3);
    h+='<div class="cal-active-filter">'+e(label)+' <span class="cal-clear" onclick="renderCalendar({filter:\'\'})">&times;</span></div>';
  }
  h+='<div class="cal-filter-dropdown">';
  h+='<input class="cal-filter-search" id="cal-search" placeholder="Filter by company or sector..." value="'+e(calSearchQ)+'" onfocus="document.getElementById(\'cal-dd\').classList.add(\'open\')" />';
  h+='<div class="cal-filter-list" id="cal-dd">';

  // Build filtered options
  const q=calSearchQ.toLowerCase();
  const filtSectors=[...allSectors].sort().filter(s=>!q||s.toLowerCase().includes(q));
  const filtCos=[...allCos].sort().filter(c=>!q||c.toLowerCase().includes(q));

  if(filtSectors.length){
    h+='<div class="cal-filter-opt header">Sectors</div>';
    filtSectors.slice(0,10).forEach(s=>{
      h+='<div class="cal-filter-opt'+(calFilter==='sector:'+s?' active':'')+'" onmousedown="renderCalendar({filter:\'sector:'+s.replace(/'/g,"\\'")+'\'})">'+e(s)+'</div>';
    });
  }
  if(filtCos.length){
    h+='<div class="cal-filter-opt header">Companies</div>';
    filtCos.slice(0,20).forEach(c=>{
      h+='<div class="cal-filter-opt'+(calFilter==='co:'+c?' active':'')+'" onmousedown="renderCalendar({filter:\'co:'+c.replace(/'/g,"\\'")+'\'})">'+e(c)+'</div>';
    });
  }
  if(!filtSectors.length&&!filtCos.length) h+='<div class="cal-filter-opt" style="color:var(--ink-faint)">No matches</div>';

  h+='</div></div></div></div>';

  // Weekdays
  h+='<div class="cal-weekdays">';
  wdays.forEach(d=>{h+='<div class="cal-wd">'+d+'</div>'});
  h+='</div>';

  // Filter function
  function matchFilter(item){
    if(!calFilter)return true;
    if(calFilter.startsWith('sector:'))return(item.sector||'Other')===calFilter.slice(7);
    if(calFilter.startsWith('co:')){const co=calFilter.slice(3).toLowerCase();return(item.companies||[]).some(c=>c.toLowerCase().includes(co))}
    return true;
  }

  // Index items by date
  const emailsByDate={},eventsByDate={},datesByDate={};
  items.emails.filter(matchFilter).forEach(em=>{const d=(em.received||'').substring(0,10);if(d)(emailsByDate[d]=emailsByDate[d]||[]).push(em)});
  items.events.filter(matchFilter).forEach(ev=>{const d=(ev.event_date||'').substring(0,10);if(d)(eventsByDate[d]=eventsByDate[d]||[]).push(ev)});
  items.dates.filter(matchFilter).forEach(id=>{const d=id.date;if(d)(datesByDate[d]=datesByDate[d]||[]).push(id)});

  // Calendar grid
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=(firstDay.getDay()+6)%7;
  const totalDays=lastDay.getDate();
  const today=new Date();
  const todayStr=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  h+='<div class="cal-grid">';
  for(let i=0;i<startDow;i++){
    const pd=new Date(calYear,calMonth,-(startDow-i-1));
    h+='<div class="cal-cell other-month"><div class="cal-day">'+pd.getDate()+'</div></div>';
  }
  for(let d=1;d<=totalDays;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday=ds===todayStr;
    const isSel=ds===calDetail;
    const de=emailsByDate[ds]||[], dv=eventsByDate[ds]||[], dd=datesByDate[ds]||[];
    const has=de.length||dv.length||dd.length;

    h+='<div class="cal-cell'+(isToday?' today':'')+(isSel?' selected':'')+'" onclick="renderCalendar({detail:\''+ds+'\'})">';
    h+='<div class="cal-day">'+d+'</div>';
    if(has){
      h+='<div class="cal-dots">';
      for(let i=0;i<Math.min(de.length,5);i++) h+='<span class="cal-dot email"></span>';
      for(let i=0;i<Math.min(dv.length,3);i++) h+='<span class="cal-dot event"></span>';
      for(let i=0;i<Math.min(dd.length,3);i++) h+='<span class="cal-dot idate"></span>';
      h+='</div>';
      dv.slice(0,2).forEach(ev=>{h+='<div class="cal-item ev">'+e(ev.event_short_title||ev.one_liner||'').substring(0,30)+'</div>'});
      dd.slice(0,2).forEach(id=>{h+='<div class="cal-item id">'+e(id.description||'').substring(0,30)+'</div>'});
      const maxEm=3-Math.min(dv.length,2)-Math.min(dd.length,2);
      if(maxEm>0) de.slice(0,maxEm).forEach(em=>{h+='<div class="cal-item em">'+e(em.sender_bank||'').substring(0,12)+': '+e(em.one_liner||'').substring(0,20)+'</div>'});
    }
    h+='</div>';
  }
  const endDow=(firstDay.getDay()+totalDays-1+6)%7;
  for(let i=endDow+1;i<7;i++) h+='<div class="cal-cell other-month"><div class="cal-day">'+(i-endDow)+'</div></div>';
  h+='</div>';

  // Detail panel
  if(calDetail){
    const de=emailsByDate[calDetail]||[], dv=eventsByDate[calDetail]||[], dd=datesByDate[calDetail]||[];
    if(de.length||dv.length||dd.length){
      const dParts=calDetail.split('-');
      h+='<div class="cal-detail">';
      h+='<div class="cal-detail-title">'+parseInt(dParts[2])+' '+months[parseInt(dParts[1])-1]+' '+dParts[0]+'</div>';
      if(dd.length){dd.forEach(d=>{h+='<div class="cal-detail-item"><span class="cal-detail-type" style="background:rgba(203,145,47,0.1);color:var(--accent-warm)">'+e(d.type||'date')+'</span><span>'+e(d.description)+'</span>'+(d.companies||[]).map(c=>' <span class="ss-co-tag">'+e(c)+'</span>').join('')+'</div>'});}
      if(dv.length){dv.forEach(ev=>{h+='<div class="cal-detail-item"><span class="cal-detail-type" style="background:rgba(105,64,165,0.1);color:var(--pinned)">event</span><span>'+e(ev.event_short_title||ev.one_liner||ev.subject)+'</span><span style="color:var(--ink-muted);font-size:11px;margin-left:auto">'+e(ev.sender_bank||'')+'</span></div>'});}
      if(de.length){
        h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--rule)">';
        de.slice(0,10).forEach(em=>{h+='<div class="cal-detail-item"><span style="color:var(--ink-muted);font-size:11px;min-width:80px">'+e(em.sender_bank||'')+'</span><span>'+e(em.one_liner||em.subject)+'</span></div>'});
        if(de.length>10) h+='<div style="color:var(--ink-faint);font-size:11px;padding:4px 0">+'+(de.length-10)+' more emails</div>';
        h+='</div>';
      }
      h+='</div>';
    }
  }

  document.getElementById('out').innerHTML=h;

  // Bind search input for calendar filter
  const csi=document.getElementById('cal-search');
  if(csi){
    csi.addEventListener('input',function(){
      calSearchQ=this.value;
      // Re-render dropdown only
      const dd=document.getElementById('cal-dd');
      if(!dd)return;
      const q=calSearchQ.toLowerCase();
      const fs=[...allSectors].sort().filter(s=>!q||s.toLowerCase().includes(q));
      const fc=[...allCos].sort().filter(c=>!q||c.toLowerCase().includes(q));
      let dh='';
      if(fs.length){dh+='<div class="cal-filter-opt header">Sectors</div>';fs.slice(0,10).forEach(s=>{dh+='<div class="cal-filter-opt" onmousedown="renderCalendar({filter:\'sector:'+s.replace(/'/g,"\\'")+'\'})">'+e(s)+'</div>'});}
      if(fc.length){dh+='<div class="cal-filter-opt header">Companies</div>';fc.slice(0,20).forEach(c=>{dh+='<div class="cal-filter-opt" onmousedown="renderCalendar({filter:\'co:'+c.replace(/'/g,"\\'")+'\'})">'+e(c)+'</div>'});}
      if(!fs.length&&!fc.length) dh+='<div class="cal-filter-opt" style="color:var(--ink-faint)">No matches</div>';
      dd.innerHTML=dh;
      dd.classList.add('open');
    });
    csi.addEventListener('blur',function(){setTimeout(()=>{const dd=document.getElementById('cal-dd');if(dd)dd.classList.remove('open')},150)});
  }
}

// ===== TRENDS =====
function renderTrends(){
  document.getElementById('pg-title').textContent='Trends';
  document.getElementById('pg-meta').textContent='Sell-side volume by sector over time';
  document.getElementById('datepick-area').style.display='none';
  document.getElementById('dash-area').innerHTML='';

  // Gather data across all dates
  const sectorColors={'Macro':'#6940A5','Financials':'#527DA5','Oil & Gas':'#D44C47','Metals & Mining':'#9B9A97',
    'Utilities':'#448361','Real Estate':'#CB912F','Healthcare':'#D44C47','Education':'#527DA5',
    'Retail':'#CB912F','TMT':'#6940A5','Agro & Food':'#448361','Capital Goods':'#9B9A97',
    'Transportation':'#527DA5','Other':'#CFCDC9'};

  // Per-date sector counts
  const dateData=[];
  const allSectors=new Set();
  SSL.slice().reverse().forEach(d=>{
    const data=SS[d];if(!data)return;
    const sectors={};
    (data.emails||[]).forEach(em=>{const s=em.sector||'Other';sectors[s]=(sectors[s]||0)+1;allSectors.add(s)});
    dateData.push({date:d,sectors,total:(data.emails||[]).length});
  });

  if(!dateData.length){
    document.getElementById('out').innerHTML='<p style="text-align:center;padding:60px 0;color:var(--ink-faint)">No trend data yet.</p>';
    return;
  }

  const maxTotal=Math.max(...dateData.map(d=>d.total),1);
  const sortedSectors=[...allSectors].sort((a,b)=>{
    const ta=dateData.reduce((s,d)=>s+(d.sectors[a]||0),0);
    const tb=dateData.reduce((s,d)=>s+(d.sectors[b]||0),0);
    return tb-ta;
  });

  let h='';

  // Volume by day
  h+='<div class="section-header"><span class="section-title">Daily Volume</span><hr class="section-rule"/></div>';
  dateData.forEach(d=>{
    const pct=Math.round((d.total/maxTotal)*100);
    h+='<div class="trend-row">';
    h+='<span class="trend-label">'+d.date+'</span>';
    h+='<div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:var(--ink)"></div></div>';
    h+='<span class="trend-count">'+d.total+'</span>';
    h+='</div>';
  });

  // Sector breakdown per day
  h+='<div class="section-header"><span class="section-title">Sector Breakdown</span><hr class="section-rule"/></div>';
  dateData.forEach(d=>{
    h+='<div class="trend-day">'+d.date+' — '+d.total+' emails</div>';
    const sorted=Object.entries(d.sectors).sort((a,b)=>b[1]-a[1]);
    sorted.forEach(([sector,count])=>{
      const pct=Math.round((count/d.total)*100);
      const color=sectorColors[sector]||'#9B9A97';
      h+='<div class="trend-row">';
      h+='<span class="trend-label">'+e(sector)+'</span>';
      h+='<div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:'+color+'"></div></div>';
      h+='<span class="trend-count">'+count+'</span>';
      h+='</div>';
    });
  });

  // All-time sector totals
  h+='<div class="section-header"><span class="section-title">All-Time Sector Totals</span><hr class="section-rule"/></div>';
  const maxSector=Math.max(...sortedSectors.map(s=>dateData.reduce((sum,d)=>sum+(d.sectors[s]||0),0)),1);
  sortedSectors.forEach(sector=>{
    const total=dateData.reduce((sum,d)=>sum+(d.sectors[sector]||0),0);
    const pct=Math.round((total/maxSector)*100);
    const color=sectorColors[sector]||'#9B9A97';
    h+='<div class="trend-row">';
    h+='<span class="trend-label">'+e(sector)+'</span>';
    h+='<div class="trend-bar-wrap"><div class="trend-bar" style="width:'+pct+'%;background:'+color+'"></div></div>';
    h+='<span class="trend-count">'+total+'</span>';
    h+='</div>';
  });

  document.getElementById('out').innerHTML=h;
}

init();
</script>
